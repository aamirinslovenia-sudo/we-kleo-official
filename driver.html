<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRIVER | WE KLEO Delivery</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="WeKleo.png">
    <link rel="icon" href="WeKleo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #060a11; color: white; -webkit-tap-highlight-color: transparent; }
        @keyframes text-shimmer {
            0%, 100% { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
            50% { color: #60a5fa; text-shadow: 0 0 25px rgba(96, 165, 250, 0.6); }
        }
        .we-kleo-title { animation: text-shimmer 3s infinite; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        @keyframes pulse-blue { 0%, 100% { border-color: #3b82f6; } 50% { border-color: #60a5fa; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); } }
        .driver-card { animation: pulse-blue 2s infinite; border-width: 2px; }
    </style>
</head>
<body class="pb-20">

    <div class="flex flex-col items-center pt-10 pb-6 border-b border-slate-900 mb-8">
        <h1 class="text-4xl font-[900] italic tracking-tighter uppercase we-kleo-title">WE KLEO</h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-2">Driver Command</p>
    </div>

    <div id="driverList" class="max-w-md mx-auto px-6 space-y-6">
        <div id="emptyState" class="text-center py-20">
            <p class="text-slate-600 font-bold uppercase text-xs tracking-widest">No active deliveries</p>
            <p class="text-slate-800 text-sm mt-2 italic">Waiting for kitchen...</p>
        </div>
    </div>

    <script>
        // --- YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Listen for orders ready for pickup or already in transit
        db.ref('orders').on('value', (snapshot) => {
            const list = document.getElementById('driverList');
            let hasOrders = false;
            list.innerHTML = "";

            snapshot.forEach((child) => {
                const order = child.val();
                if (order.status === "Ready" || order.status === "Delivering") {
                    hasOrders = true;
                    renderDriverCard(child.key, order);
                }
            });

            if (!hasOrders) {
                list.innerHTML = `
                    <div class="text-center py-20">
                        <p class="text-slate-600 font-bold uppercase text-xs tracking-widest">No active deliveries</p>
                        <p class="text-slate-800 text-sm mt-2 italic">Waiting for kitchen...</p>
                    </div>`;
            }
        });

        function renderDriverCard(id, order) {
            const isDelivering = order.status === "Delivering";
            const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(order.address)}`;
            
            const html = `
                <div class="glass p-8 rounded-[40px] border border-slate-800 ${!isDelivering ? 'driver-card' : ''}">
                    <div class="flex justify-between items-center mb-6">
                        <span class="bg-blue-600/20 text-blue-400 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-tighter">
                            ${isDelivering ? '● In Transit' : '● Ready for Pickup'}
                        </span>
                        <span class="text-[10px] text-slate-500 font-bold font-mono">${order.time.split(',')[1]}</span>
                    </div>

                    <h2 class="text-3xl font-[900] italic tracking-tighter uppercase mb-1 text-white">${order.customer}</h2>
                    <p class="text-blue-400 font-bold text-sm mb-6 underline decoration-blue-900 underline-offset-4">${order.address}</p>

                    <div class="space-y-3">
                        <a href="${mapsUrl}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-slate-800/50 text-white py-4 rounded-2xl font-bold text-sm border border-white/5 transition-all active:scale-95">
                            📍 Open Route in Maps
                        </a>
                        
                        ${!isDelivering ? 
                            `<button onclick="updateStatus('${id}', 'Delivering')" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-[24px] font-[900] italic uppercase shadow-xl shadow-blue-900/20 active:scale-95 transition-all">Pick Up Order</button>` :
                            `<button onclick="updateStatus('${id}', 'Completed')" class="w-full bg-green-600 hover:bg-green-500 text-white py-5 rounded-[24px] font-[900] italic uppercase shadow-xl shadow-green-900/20 active:scale-95 transition-all">Mark as Delivered</button>`
                        }
                    </div>

                    <div class="mt-6 pt-4 border-t border-white/5">
                        <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest">Order Details:</p>
                        <p class="text-sm font-bold text-slate-400 mt-1 italic">${order.item} (${order.toppings})</p>
                    </div>
                </div>
            `;
            document.getElementById('driverList').insertAdjacentHTML('beforeend', html);
        }

        function updateStatus(id, newStatus) {
            db.ref('orders/' + id).update({ 
                status: newStatus,
                driverUpdateAt: new Date().toLocaleString()
            });
        }
    </script>
</body>
</html>
