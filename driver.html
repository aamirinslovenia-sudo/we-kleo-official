<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KLEO COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: #000; }
        #map-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111827; z-index: 1; opacity: 0.6; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark-glass { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bottom-sheet { position: fixed; bottom: 20px; left: 15px; right: 15px; border-radius: 35px; z-index: 100; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); padding: 30px; }
        .sheet-minimized { transform: translateY(calc(100% - 130px)); }
        .sheet-expanded { transform: translateY(0); }
        
        #history-sidebar, #chat-overlay { position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: #ffffff; z-index: 2000; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 50px 25px; display: flex; flex-direction: column; }
        .sidebar-active, .chat-active { transform: translateX(0) !important; }
        
        #chat-messages { flex: 1; overflow-y: auto; padding-bottom: 20px; display: flex; flex-direction: column; }
        .msg-driver { align-self: flex-end; background: #3b82f6; color: white; border-radius: 20px 20px 0 20px; padding: 12px 16px; margin-bottom: 8px; max-width: 80%; font-size: 14px; font-weight: 600; }
        .msg-admin { align-self: flex-start; background: #f1f5f9; color: #1e293b; border-radius: 20px 20px 20px 0; padding: 12px 16px; margin-bottom: 8px; max-width: 80%; font-size: 14px; font-weight: 600; }
        .currency { font-weight: 900; font-size: 54px; letter-spacing: -3px; color: #1e293b; line-height: 1; }
    </style>
</head>
<body>
    <div id="map-bg"></div>

    <div class="fixed top-[50px] left-0 w-full z-[150] px-6 flex justify-between items-center">
        <button onclick="toggleHistory()" class="w-14 h-14 glass rounded-2xl flex items-center justify-center text-2xl shadow-xl active:scale-90 transition-all">≡</button>
        <div class="dark-glass text-white px-5 py-3 rounded-2xl flex items-center gap-2">
            <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
            <span class="text-[10px] font-black uppercase tracking-widest">Live Shift</span>
        </div>
    </div>

    <div id="history-sidebar">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black text-slate-900 uppercase italic">Control</h2>
            <button onclick="toggleHistory()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center font-bold">✕</button>
        </div>
        <div class="bg-blue-600 p-6 rounded-[30px] text-white shadow-xl mb-6 text-center">
            <p class="text-blue-100 text-[9px] font-black uppercase tracking-widest mb-1">Today's Total</p>
            <p id="history-total-large" class="text-4xl font-black">€0.00</p>
        </div>
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-3">Recent Tasks</p>
        <div id="history-list" class="flex-1 space-y-3 overflow-y-auto pr-2 mb-6 border-b border-slate-100"></div>
        <div class="mt-auto">
            <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-4">Support</p>
            <button onclick="openChat()" class="w-full bg-slate-900 text-white p-5 rounded-3xl flex items-center justify-between active:scale-95 transition-all mb-3 relative">
                <div class="flex items-center gap-4"><span>🎧</span><p class="text-xs font-black uppercase text-left">Customer Support</p></div>
                <span id="unread-dot" class="hidden absolute right-12 top-1/2 -translate-y-1/2 w-3 h-3 bg-red-500 rounded-full"></span>
                <span>→</span>
            </button>
        </div>
    </div>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-slate-900 uppercase italic">Support Chat</h2>
            <button onclick="closeChat()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center font-bold">✕</button>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-controls" class="pt-4 space-y-3">
            <div class="flex gap-2">
                <input type="text" id="chat-input" placeholder="Type message..." class="flex-1 bg-slate-100 p-4 rounded-2xl font-bold outline-none">
                <button onclick="sendMessage()" class="bg-blue-600 text-white px-6 rounded-2xl font-black uppercase text-xs">Send</button>
            </div>
            <button onclick="endChatSession()" class="w-full py-3 text-[10px] font-black uppercase text-slate-400 hover:text-red-500 tracking-widest transition-colors">End Chat Session</button>
        </div>
    </div>

    <div id="boot-screen" class="fixed inset-0 z-[3000] bg-white flex flex-col items-center justify-center p-12 text-center">
        <div class="text-blue-600 font-black text-6xl tracking-tighter mb-16 italic">KLEO</div>
        <button onclick="goOnline()" class="bg-blue-600 text-white w-full py-6 rounded-3xl text-sm font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Go Online</button>
    </div>

    <div id="order-sheet" class="bottom-sheet glass sheet-minimized shadow-2xl">
        <div class="w-12 h-1 bg-slate-300 rounded-full mx-auto mb-8"></div>
        <div id="waiting-ui" class="text-center py-2"><p class="text-slate-900 font-black text-xl uppercase italic">Online & Active</p><p class="text-slate-400 text-xs">Scanning...</p></div>
        <div id="order-ui" class="hidden">
            <div class="flex justify-between items-end mb-8"><div><div class="currency">€4.00</div><p class="text-blue-500 font-black text-[10px] uppercase">Guaranteed</p></div><button onclick="location.reload()" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black">Decline</button></div>
            <div class="bg-white/50 rounded-[30px] p-6 mb-8 border border-white">
                <div class="mb-6 flex gap-4"><div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 font-bold">1</div><div><p class="text-[9px] font-black text-slate-400 uppercase">Pickup</p><h2 class="text-lg font-black text-slate-800">KLEO Kitchen</h2><p class="text-slate-500 text-xs">Slovenska ulica 15</p></div></div>
                <div class="flex gap-4"><div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 font-bold">2</div><div class="flex-1"><p class="text-[9px] font-black text-slate-400 uppercase">Drop</p><h2 id="c-name" class="text-lg font-black text-slate-800 truncate uppercase">---</h2><p id="c-addr" class="text-indigo-600 text-sm font-bold truncate underline">---</p></div></div>
            </div>
            <div class="flex gap-4"><a id="c-phone" href="#" class="w-20 h-20 bg-white rounded-[25px] flex items-center justify-center text-2xl shadow-sm border border-slate-100">📞</a><button id="action-btn" onclick="processOrder()" class="flex-1 bg-slate-900 text-white rounded-[25px] text-lg font-black uppercase tracking-tight shadow-xl">Accept Task</button></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentOrder = null; let audioCtx = null; let activeTicketId = null;

        function toggleHistory() { document.getElementById('history-sidebar').classList.toggle('sidebar-active'); }
        function openChat() { document.getElementById('chat-overlay').classList.add('chat-active'); document.getElementById('unread-dot').classList.add('hidden'); }
        function closeChat() { document.getElementById('chat-overlay').classList.remove('chat-active'); }
        function goOnline() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); document.getElementById('boot-screen').style.display = 'none'; }

        function endChatSession() { if(confirm("End this support session?")) { if(activeTicketId) db.ref('support_tickets/' + activeTicketId).update({ status: "Resolved" }); closeChat(); } }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            const messageData = { sender: "Driver", text: input.value, timestamp: Date.now() };
            if (activeTicketId) {
                db.ref('support_tickets/' + activeTicketId + '/chat').push(messageData);
                db.ref('support_tickets/' + activeTicketId).update({ lastUpdate: Date.now(), status: "Open" });
            } else {
                const newRef = db.ref('support_tickets').push();
                activeTicketId = newRef.key;
                newRef.set({ customer: currentOrder ? currentOrder.customer : "General", timestamp: Date.now(), status: "Open" });
                db.ref('support_tickets/' + activeTicketId + '/chat').push(messageData);
            }
            input.value = "";
        }

        db.ref('support_tickets').on('value', (snap) => {
            const tickets = snap.val(); 
            if (!tickets) { activeTicketId = null; return; }
            
            const activeKey = Object.keys(tickets).find(k => tickets[k].status === "Open" || (k === activeTicketId && tickets[k].status !== "Resolved"));
            
            if (activeKey) {
                activeTicketId = activeKey; const t = tickets[activeKey];
                let html = ""; if (t.chat) {
                    const messages = Object.values(t.chat);
                    messages.forEach(m => { html += `<div class="${m.sender === 'Driver' ? 'msg-driver' : 'msg-admin'}">${m.text}</div>`; });
                    const last = messages[messages.length-1];
                    if (last.sender === "Admin" && last.timestamp > (Date.now() - 3000)) {
                        playBeep(1000, 0.4); if(!document.getElementById('chat-overlay').classList.contains('chat-active')) document.getElementById('unread-dot').classList.remove('hidden');
                    }
                }
                document.getElementById('chat-messages').innerHTML = html;
                document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
            } else { 
                activeTicketId = null; 
                document.getElementById('chat-messages').innerHTML = "<p class='text-center text-slate-400 mt-10 text-xs font-bold uppercase'>No active support thread</p>"; 
            }
        });

        db.ref('orders').on('value', (snap) => {
            let active = null; let count = 0; const list = document.getElementById('history-list'); list.innerHTML = "";
            snap.forEach(c => {
                const o = c.val(); if (o.status === "Ready" || o.status === "Delivering") active = {id: c.key, ...o};
                else if (o.status === "Completed") { count++; list.insertAdjacentHTML('afterbegin', `<div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center"><div class="truncate"><p class="text-slate-900 font-bold text-sm">${o.customer}</p><p class="text-slate-400 text-[10px] uppercase">${o.address}</p></div><div class="text-blue-600 font-black">€4.00</div></div>`); }
            });
            document.getElementById('history-total-large').innerText = "€" + (count * 4).toFixed(2);
            if (active) {
                currentOrder = active; document.getElementById('c-name').innerText = active.customer; document.getElementById('c-addr').innerText = active.address; document.getElementById('c-phone').href = "tel:" + active.phone;
                document.getElementById('action-btn').innerText = active.status === "Ready" ? "Confirm Pickup" : "End Mission";
                document.getElementById('waiting-ui').classList.add('hidden'); document.getElementById('order-ui').classList.remove('hidden');
                document.getElementById('order-sheet').classList.replace('sheet-minimized', 'sheet-expanded'); if (active.status === "Ready") playBeep(800, 0.2);
            } else { currentOrder = null; document.getElementById('waiting-ui').classList.remove('hidden'); document.getElementById('order-ui').classList.add('hidden'); document.getElementById('order-sheet').classList.replace('sheet-expanded', 'sheet-minimized'); }
        });

        function processOrder() { if (!currentOrder) return; const next = currentOrder.status === "Ready" ? "Delivering" : "Completed"; db.ref('orders/' + currentOrder.id).update({status: next}); if(next === "Delivering") window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(currentOrder.address)}`); }
        function playBeep(f, d) { if (!audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + d); }
    </script>
</body>
</html>
