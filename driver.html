<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIVER | WE KLEO Delivery</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #060a11; color: white; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        @keyframes pulse-blue { 0%, 100% { border-color: #3b82f6; } 50% { border-color: #60a5fa; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); } }
        .driver-card { animation: pulse-blue 2s infinite; }
    </style>
</head>
<body class="pb-20">
    <div class="p-6 text-center border-b border-slate-900 mb-6">
        <h1 class="text-3xl font-[900] italic text-blue-500 uppercase italic tracking-tighter">WE KLEO DRIVER</h1>
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Available Deliveries</p>
    </div>

    <div id="driverList" class="max-w-md mx-auto px-6 space-y-6">
        </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Listen for orders marked "Ready" by the kitchen
        db.ref('orders').on('value', (snapshot) => {
            const list = document.getElementById('driverList');
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const order = child.val();
                if (order.status === "Ready" || order.status === "Delivering") {
                    renderDriverCard(child.key, order);
                }
            });
        });

        function renderDriverCard(id, order) {
            const isDelivering = order.status === "Delivering";
            const html = `
                <div class="glass p-8 rounded-[40px] border border-slate-800 ${!isDelivering ? 'driver-card' : ''}">
                    <div class="flex justify-between mb-4">
                        <span class="text-xs font-black uppercase text-blue-400">${order.status}</span>
                        <span class="text-xs text-slate-500">${order.time.split(',')[1]}</span>
                    </div>
                    <h2 class="text-2xl font-black italic mb-1">${order.customer}</h2>
                    <p class="text-slate-400 text-sm mb-6">${order.address}</p>

                    <div class="space-y-3">
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(order.address)}" target="_blank" class="block w-full bg-slate-800 text-center py-4 rounded-2xl font-bold text-sm">📍 Open Maps</a>
                        
                        ${!isDelivering ? 
                            `<button onclick="updateStatus('${id}', 'Delivering')" class="w-full bg-blue-600 py-4 rounded-2xl font-black italic uppercase">Pick Up Order</button>` :
                            `<button onclick="updateStatus('${id}', 'Completed')" class="w-full bg-green-600 py-4 rounded-2xl font-black italic uppercase">Mark Finished</button>`
                        }
                    </div>
                </div>
            `;
            document.getElementById('driverList').insertAdjacentHTML('beforeend', html);
        }

        function updateStatus(id, newStatus) {
            db.ref('orders/' + id).update({ status: newStatus });
        }
    </script>
</body>
</html>
