<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KLEO | DRIVER UNIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #060a11; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .radar-scan { border: 2px solid #3b82f6; border-radius: 50%; animation: pulse 2s infinite; position: absolute; }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        .status-pill { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .offline { display: flex; }
        .online { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="offline-screen" class="fixed inset-0 z-[5000] bg-[#060a11] offline flex-col items-center justify-center p-10">
        <div class="mb-12 text-center">
            <h1 class="text-6xl font-[900] italic tracking-tighter text-blue-600 mb-2">KLEO.</h1>
            <p class="text-slate-500 font-bold uppercase text-[10px] tracking-[0.3em]">Driver Intelligence</p>
        </div>
        <button onclick="startShift()" class="w-full bg-white text-black py-6 rounded-[32px] font-[900] text-xl uppercase italic tracking-tighter active:scale-95 transition-all shadow-2xl">Start Shift</button>
    </div>

    <header class="p-6 flex justify-between items-center border-b border-white/5">
        <div>
            <h2 class="text-2xl font-[900] italic tracking-tighter uppercase">Operations</h2>
            <p class="text-[9px] font-black text-green-500 uppercase tracking-widest">Unit Active: Maribor</p>
        </div>
        <button onclick="location.reload()" class="glass w-10 h-10 rounded-full flex items-center justify-center text-xs">🛑</button>
    </header>

    <div id="radar-section" class="h-40 relative flex items-center justify-center overflow-hidden">
        <div class="radar-scan w-20 h-20"></div>
        <div class="radar-scan w-20 h-20" style="animation-delay: 1s"></div>
        <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.3em] z-10">Scanning for Missions...</p>
    </div>

    <div id="orders-container" class="px-6 space-y-4">
        </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "we-kleo.firebaseapp.com", 
            databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "we-kleo", 
            storageBucket: "we-kleo.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function startShift() {
            document.getElementById('offline-screen').style.display = 'none';
            trackMissions();
        }

        function trackMissions() {
            db.ref('orders').on('value', (snapshot) => {
                const orders = snapshot.val();
                const container = document.getElementById('orders-container');
                container.innerHTML = '';

                if (!orders) return;

                Object.keys(orders).forEach(id => {
                    const order = orders[id];

                    // Hide completed orders
                    if (order.status !== 'Completed') {
                        const card = document.createElement('div');
                        card.className = "glass p-6 rounded-[32px] border border-white/10 animate-in slide-in-from-bottom duration-500";
                        
                        // Check if Card payment (Auto-unlock) or Cash (Lock)
                        const isCash = (order.paymentType === 'Cash');

                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">Pick up from</p>
                                    <h3 class="text-xl font-[900] italic uppercase tracking-tighter">${order.restaurant || 'KLEO PARTNER'}</h3>
                                </div>
                                <div class="status-pill ${order.status === 'Delivering' ? 'bg-blue-600' : 'bg-white/10 text-slate-400'}">
                                    ${order.status}
                                </div>
                            </div>

                            <div class="space-y-3 mb-6">
                                <p class="text-sm font-bold text-slate-300">📦 ${order.item}</p>
                                <p class="text-xs font-semibold text-slate-500">📍 ${order.address}</p>
                                <p class="text-lg font-black text-white italic">💰 ${order.totalPrice}</p>
                            </div>

                            ${order.status === 'Ready' ? `
                                <button onclick="acceptMission('${id}')" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase italic tracking-tighter shadow-xl shadow-blue-900/30">Accept Mission</button>
                            ` : ''}

                            ${order.status === 'Delivering' ? `
                                <div class="bg-blue-500/5 border border-white/5 p-4 rounded-2xl mb-4">
                                    <div class="flex items-center gap-3">
                                        <input type="checkbox" id="cash-check-${id}" onchange="toggleEndBtn('${id}')" class="w-6 h-6 rounded-lg bg-white/5 border-white/10">
                                        <label class="text-[10px] font-black text-blue-400 uppercase tracking-widest">
                                            Confirm ${order.paymentType} Collection: ${order.totalPrice}
                                        </label>
                                    </div>
                                </div>
                                <button id="end-btn-${id}" disabled onclick="completeMission('${id}')" class="w-full bg-white/5 text-slate-600 py-5 rounded-2xl font-black uppercase italic tracking-tighter transition-all">
                                    ${isCash ? 'Collect Cash First' : 'End Mission'}
                                </button>
                            ` : ''}
                        `;
                        container.appendChild(card);
                    }
                });
            });
        }

        function toggleEndBtn(id) {
            const check = document.getElementById(`cash-check-${id}`);
            const btn = document.getElementById(`end-btn-${id}`);
            if(check.checked) {
                btn.disabled = false;
                btn.classList.replace('bg-white/5', 'bg-green-600');
                btn.classList.replace('text-slate-600', 'text-white');
                btn.innerText = "Complete Mission";
            } else {
                btn.disabled = true;
                btn.classList.replace('bg-green-600', 'bg-white/5');
                btn.classList.replace('text-white', 'text-slate-600');
                btn.innerText = "Collect Cash First";
            }
        }

        function acceptMission(id) {
            db.ref('orders/' + id).update({ status: 'Delivering' });
        }

        function completeMission(id) {
            db.ref('orders/' + id).update({ status: 'Completed' });
        }
    </script>
</body>
</html>
