<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLEO | DRIVER HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Outfit', sans-serif; }
        .driver-card { background: #111; border-radius: 24px; padding: 20px; border: 1px solid #222; margin-bottom: 15px; }
        .btn-claim { background: #3b82f6; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; text-transform: uppercase; margin-top: 10px; }
        .btn-finish { background: #10b981; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; text-transform: uppercase; margin-top: 10px; }
        .btn-locked { background: #222; color: #444; cursor: not-allowed; }
    </style>
</head>
<body class="p-6">
    <h1 class="text-3xl font-black italic mb-8">DRIVER <span class="text-blue-500">HUB</span></h1>
    <div id="driverOrders"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const driverName = "Courier_1"; // Change this for different drivers

        db.ref('orders').on('value', (snap) => {
            const container = document.getElementById('driverOrders');
            container.innerHTML = "";

            snap.forEach((child) => {
                const o = child.val(); o.id = child.key;
                
                // Show if New, Preparing, or Ready (but not Completed)
                if (o.status !== "Completed") {
                    renderDriverCard(o);
                }
            });
        });

        function renderDriverCard(o) {
            const isClaimedByMe = o.claimedBy === driverName;
            const isReady = o.isFoodReady === true;

            let actionButton = "";
            if (!o.claimedBy) {
                actionButton = `<button onclick="claimOrder('${o.id}')" class="btn-claim">Claim Order</button>`;
            } else if (isClaimedByMe) {
                if (isReady) {
                    actionButton = `<button onclick="completeOrder('${o.id}')" class="btn-finish">End Mission (Handover)</button>`;
                } else {
                    actionButton = `<button disabled class="btn-finish btn-locked italic">Waiting for Kitchen...</button>`;
                }
            } else {
                actionButton = `<div class="text-center p-4 text-slate-600 text-[10px] font-black uppercase tracking-widest">Claimed by ${o.claimedBy}</div>`;
            }

            const html = `
                <div class="driver-card">
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] font-bold text-blue-500">${o.status}</span>
                        <span class="font-bold">${o.totalPrice}</span>
                    </div>
                    <h2 class="text-xl font-black italic uppercase">${o.item}</h2>
                    <p class="text-xs text-slate-400 mb-4">${o.address || 'No Address'}</p>
                    ${actionButton}
                </div>
            `;
            document.getElementById('driverOrders').insertAdjacentHTML('beforeend', html);
        }

        function claimOrder(id) { db.ref('orders/' + id).update({ claimedBy: driverName, status: "Delivering" }); }
        function completeOrder(id) { db.ref('orders/' + id).update({ status: "Completed" }); }
    </script>
</body>
</html>
