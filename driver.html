<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KLEO | DRIVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #000; color: white; overflow: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; }
        .bottom-sheet { position: fixed; bottom: 30px; left: 12px; right: 12px; z-index: 100; transition: 0.5s; }
        .ready-status { color: #10b981; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="boot-screen" class="fixed inset-0 z-[3000] bg-black flex flex-col items-center justify-center p-10 text-center">
        <h1 class="text-blue-500 font-black text-7xl italic mb-10">KLEO</h1>
        <button onclick="document.getElementById('boot-screen').style.display='none'" class="bg-blue-600 text-white w-full py-6 rounded-[30px] font-black uppercase">Start Shift</button>
    </div>

    <div id="order-sheet" class="bottom-sheet glass-panel p-8 translate-y-[calc(100%-140px)]">
        <div id="waiting" class="text-center py-4 font-bold uppercase tracking-widest opacity-40">Scanning for orders...</div>
        <div id="ui" class="hidden">
            <div class="flex justify-between items-start mb-6">
                <div><p class="text-[10px] font-black text-blue-500 uppercase">Status</p><div id="timer" class="text-5xl font-black italic">--:--</div></div>
            </div>
            <div class="space-y-4 mb-8">
                <div><p class="text-[9px] text-white/30 uppercase">Customer</p><h4 id="c-name" class="text-xl font-bold">---</h4><p id="c-addr" class="text-blue-400 font-bold">---</p></div>
            </div>
            <button id="btn" onclick="act()" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-lg">Accept</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const drId = localStorage.getItem('drId') || "D-"+Math.floor(Math.random()*999); localStorage.setItem('drId', drId);

        let cur = null; let tInt = null;

        db.ref('orders').on('value', (snap) => {
            let active = null, avail = null;
            snap.forEach(c => {
                const o = c.val(); o.id = c.key;
                if (o.status === "Delivering" && o.claimedBy === drId) active = o;
                else if (!o.claimedBy && (o.status === "Preparing" || o.status === "New" || o.status === "Ready")) avail = o;
            });

            if (active) { cur = active; showUI(active, active.isFoodReady ? "End Mission" : "Waiting for Chef..."); }
            else if (avail) { cur = avail; showUI(avail, "Accept"); }
            else { cur = null; resetUI(); }
        });

        function showUI(o, txt) {
            document.getElementById('c-name').innerText = o.customer;
            document.getElementById('c-addr').innerText = o.address;
            const btn = document.getElementById('btn');
            btn.innerText = txt;
            btn.disabled = (o.status === "Delivering" && !o.isFoodReady);
            btn.style.opacity = btn.disabled ? "0.3" : "1";
            
            document.getElementById('ui').classList.remove('hidden');
            document.getElementById('waiting').classList.add('hidden');
            document.getElementById('order-sheet').style.transform = "translateY(0)";
            
            clearInterval(tInt);
            tInt = setInterval(() => {
                const el = document.getElementById('timer');
                if (o.isFoodReady) { el.innerText = "READY"; el.className = "text-5xl font-black italic ready-status"; }
                else if (o.readyTimestamp) {
                    const d = o.readyTimestamp - Date.now();
                    const abs = Math.abs(d); const m = Math.floor(abs/60000); const s = Math.floor((abs%60000)/1000).toString().padStart(2,'0');
                    el.innerText = (d < 0 ? "-" : "") + m + ":" + s;
                    el.className = "text-5xl font-black italic " + (d < 0 ? "text-red-500" : "text-white");
                }
            }, 1000);
        }

        function act() {
            if (!cur) return;
            if (cur.status !== "Delivering") db.ref('orders/'+cur.id).update({ status: "Delivering", claimedBy: drId });
            else if (cur.isFoodReady) db.ref('orders/'+cur.id).update({ status: "Completed" });
        }

        function resetUI() { document.getElementById('ui').classList.add('hidden'); document.getElementById('waiting').classList.remove('hidden'); document.getElementById('order-sheet').style.transform = "translateY(calc(100% - 140px))"; clearInterval(tInt); }
    </script>
</body>
</html>
