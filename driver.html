<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KLEO PRO | DRIVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #000000; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; -webkit-tap-highlight-color: transparent; }
        .bottom-sheet { position: fixed; bottom: 30px; left: 12px; right: 12px; z-index: 100; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); padding-bottom: env(safe-area-inset-bottom); }
        .sheet-minimized { transform: translateY(calc(100% - 160px)); }
        .sheet-expanded { transform: translateY(0); }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; }
        #history-sidebar, #chat-overlay, #stats-overlay { position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: #000000; z-index: 2000; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 70px 25px; display: flex; flex-direction: column; }
        .sidebar-active, .chat-active, .stats-active { transform: translateX(0) !important; }
        .status-online { background: #10b981; box-shadow: 0 0 15px #10b981; }
        .status-offline { background: #ef4444; box-shadow: 0 0 15px #ef4444; }
        .tab-btn { padding: 10px 18px; border-radius: 14px; font-weight: 700; font-size: 13px; color: #64748b; border: 1px solid transparent; }
        .tab-btn.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-color: rgba(59, 130, 246, 0.3); }
        .stat-row { display: flex; justify-content: space-between; padding: 22px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .radar-ring { border: 2px solid rgba(59, 130, 246, 0.2); border-radius: 50%; position: absolute; animation: radar 3s infinite ease-out; pointer-events: none; }
        @keyframes radar { from { width: 50px; height: 50px; opacity: 1; } to { width: 180px; height: 180px; opacity: 0; } }
        
        .timer-normal { color: #3b82f6; font-weight: 900; }
        .timer-late { color: #ef4444; font-weight: 900; }
        .ready-status { color: #10b981; animation: pulse-green 2s infinite; font-weight: 900; }
        @keyframes pulse-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* New Map Icon Style */
        .map-trigger { position: absolute; top: 20px; right: 25px; width: 50px; height: 50px; background: #3b82f6; border-radius: 50%; display: flex; items-center: center; justify-content: center; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); z-index: 50; }

        .msg-driver { align-self: flex-end; background: #3b82f6; padding: 12px 18px; border-radius: 20px 20px 4px 20px; font-size: 14px; max-width: 80%; margin-bottom: 10px; }
        .msg-admin { align-self: flex-start; background: rgba(255,255,255,0.1); padding: 12px 18px; border-radius: 20px 20px 20px 4px; font-size: 14px; max-width: 80%; margin-bottom: 10px; }
        .cash-alert { background: rgba(234, 179, 8, 0.1); border: 1px solid rgba(234, 179, 8, 0.2); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: #eab308; }
    </style>
</head>
<body>

    <div class="fixed top-[60px] left-0 w-full z-[150] px-6 flex justify-between items-center">
        <button onclick="toggleSidebar()" class="w-14 h-14 glass-panel flex items-center justify-center text-2xl active:scale-90 transition-all">≡</button>
        <div class="glass-panel px-5 py-3 flex items-center gap-3">
            <span id="conn-dot" class="w-2.5 h-2.5 rounded-full status-online"></span>
            <span id="conn-text" class="text-[10px] font-black uppercase tracking-widest">Live Shift</span>
        </div>
    </div>

    <div id="stats-overlay">
        <div class="flex items-center gap-6 mb-10">
            <button onclick="closeStats()" class="text-2xl font-bold">←</button>
            <h2 class="text-3xl font-black italic tracking-tighter text-white">YOUR <span class="text-blue-500">STATS</span></h2>
        </div>
        <div class="flex justify-between glass-panel p-1 mb-10">
            <button onclick="filterStats('today')" id="tab-today" class="tab-btn active flex-1">Today</button>
            <button onclick="filterStats('week')" id="tab-week" class="tab-btn flex-1">Week</button>
            <button onclick="filterStats('month')" id="tab-month" class="tab-btn flex-1">Month</button>
            <button onclick="showCustomRange()" id="tab-custom" class="tab-btn flex-1">Custom</button>
        </div>
        <div id="custom-picker" class="hidden grid grid-cols-2 gap-4 mb-8">
            <input type="date" id="date-from" onchange="runCustomFilter()" class="bg-white/10 p-4 rounded-2xl text-xs text-white">
            <input type="date" id="date-to" onchange="runCustomFilter()" class="bg-white/10 p-4 rounded-2xl text-xs text-white">
        </div>
        <p id="stat-date-label" class="text-xs font-black text-blue-500 uppercase tracking-widest mb-6"></p>
        <div class="space-y-1">
            <div class="stat-row"><span class="text-slate-400">Orders</span><span id="stat-count" class="font-bold">0</span></div>
            <div class="stat-row"><span class="text-slate-400">Income</span><span id="stat-total" class="font-bold text-blue-400">€0.00</span></div>
            <div class="stat-row"><span class="text-slate-400">Base Pay</span><span id="stat-base" class="font-bold">€0.00</span></div>
            <div class="stat-row border-none"><span class="text-slate-400">Tips</span><span class="font-bold text-green-500">€0.00</span></div>
        </div>
    </div>

    <div id="history-sidebar">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-4xl font-black italic tracking-tighter text-blue-500">KLEO</h2>
            <button onclick="toggleSidebar()" class="w-12 h-12 glass-panel flex items-center justify-center">✕</button>
        </div>
        <div class="space-y-4">
            <button onclick="openStats()" class="w-full flex items-center gap-5 p-6 glass-panel text-left active:scale-95 transition-all">
                <span class="text-2xl">📊</span><div><p class="font-bold text-lg text-white">Your Stats</p><p class="text-[10px] text-slate-500 uppercase">Track Income</p></div>
            </button>
            <button onclick="openChat()" class="w-full flex items-center gap-5 p-6 glass-panel text-left active:scale-95 transition-all">
                <span class="text-2xl">🎧</span><div><p class="font-bold text-lg text-white">Support</p><p class="text-[10px] text-slate-500 uppercase">Live Help</p></div>
            </button>
        </div>
        <div class="mt-auto p-6 border-t border-white/10">
            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Device Identity</p>
            <p id="display-driver-id" class="text-sm font-mono text-blue-400">---</p>
        </div>
    </div>

    <div id="boot-screen" class="fixed inset-0 z-[3000] bg-black flex flex-col items-center justify-center p-12 text-center">
        <div class="text-blue-500 font-black text-7xl tracking-tighter italic mb-10">KLEO</div>
        <button onclick="goOnline()" class="bg-blue-600 text-white w-full py-7 rounded-[35px] text-lg font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Start Shift</button>
    </div>

    <div id="order-sheet" class="bottom-sheet glass-panel sheet-minimized">
        <div id="order-content" class="px-8 pt-4 pb-10 relative">
            <div class="w-16 h-1 bg-white/10 rounded-full mx-auto mb-10"></div>
            
            <button id="map-btn" onclick="openMaps()" class="map-trigger hidden">
                <span class="text-xl">📍</span>
            </button>

            <div id="waiting-ui" class="text-center py-6 relative flex flex-col items-center justify-center">
                <div class="radar-ring"></div>
                <div class="radar-ring" style="animation-delay: 1.5s"></div>
                <h3 class="text-xl font-black uppercase italic tracking-tighter z-10 text-white">Ready for Orders</h3>
                <p class="text-slate-500 font-bold text-[10px] uppercase tracking-[0.3em] z-10 mt-1">Scanning Maribor</p>
            </div>

            <div id="order-ui" class="hidden">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p id="timer-label" class="text-blue-500 font-black text-[10px] uppercase tracking-widest mb-1">PREPARATION</p>
                        <div id="display-timer" class="text-5xl font-black tracking-tighter italic text-white">--:--</div>
                    </div>
                    <button onclick="confirmDecline()" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Skip</button>
                </div>

                <div id="cash-collection-ui" class="hidden">
                    <div class="cash-alert">
                        <label class="flex items-center gap-4 cursor-pointer">
                            <input type="checkbox" id="cash-collected-check" onchange="toggleFinishButton()">
                            <div>
                                <p class="text-[10px] font-black text-yellow-500 uppercase tracking-widest">Payment: CASH</p>
                                <p class="text-sm font-bold text-white">Collect <span id="cash-amount" class="text-yellow-500">€0.00</span> from customer</p>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="space-y-6 mb-10">
                    <div class="flex gap-4">
                        <div class="w-10 h-10 glass-panel flex items-center justify-center font-black text-white">A</div>
                        <div><p id="res-name" class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">KLEO Kitchen</p><h4 class="text-lg font-bold text-white">Slovenska ulica 15</h4></div>
                    </div>
                    <div class="flex gap-4">
                        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-white">B</div>
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Customer</p>
                            <h4 id="c-name" class="text-lg font-bold truncate text-white">---</h4>
                            <p id="c-addr" class="text-blue-400 text-sm font-bold truncate">---</p>
                        </div>
                    </div>
                </div>
                <div class="flex gap-4">
                    <a id="c-phone" href="#" class="w-20 h-20 glass-panel flex items-center justify-center text-2xl">📞</a>
                    <button id="action-btn" onclick="processOrder()" class="flex-1 bg-blue-600 text-white rounded-[24px] font-black uppercase text-lg tracking-widest active:scale-95 transition-all">Accept</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase initialization & Driver ID setup remains the same
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let driverId = localStorage.getItem('kleo_driver_id');
        if (!driverId) { driverId = "D-" + Math.floor(Math.random() * 10000); localStorage.setItem('kleo_driver_id', driverId); }
        document.getElementById('display-driver-id').innerText = driverId;

        let currentOrder = null; let audioCtx = null; let alertInterval = null;
        let allCompletedOrders = [];
        let globalTimerInterval = null;

        // UI Helpers remain the same
        function toggleSidebar() { document.getElementById('history-sidebar').classList.toggle('sidebar-active'); }
        function openStats() { document.getElementById('stats-overlay').classList.add('stats-active'); toggleSidebar(); }
        function closeStats() { document.getElementById('stats-overlay').classList.remove('stats-active'); }
        function confirmDecline() { if(confirm("Decline mission?")) location.reload(); }

        db.ref('orders').on('value', (snap) => {
            let activeTask = null; let availableOrder = null;
            snap.forEach(c => {
                const o = c.val(); o.id = c.key;
                if (o.status === "Delivering" && o.claimedBy === driverId) activeTask = o;
                if (!o.claimedBy && (o.status === "Preparing" || o.status === "Ready" || (o.status === "New" && o.readyTimestamp))) availableOrder = o;
                if (o.status === "Completed") allCompletedOrders.push(o);
            });
            if (activeTask) {
                currentOrder = activeTask; renderUI(activeTask, "End Mission");
                document.getElementById('map-btn').classList.remove('hidden'); // Show map icon
                clearInterval(alertInterval); alertInterval = null;
            } else if (availableOrder) {
                currentOrder = availableOrder; renderUI(availableOrder, "Accept");
                document.getElementById('map-btn').classList.add('hidden'); // Hide map icon
                if (!alertInterval) { playBeep(); alertInterval = setInterval(() => playBeep(), 2000); }
            } else {
                currentOrder = null; clearInterval(alertInterval); alertInterval = null;
                document.getElementById('order-ui').classList.add('hidden');
                document.getElementById('waiting-ui').classList.remove('hidden');
                document.getElementById('map-btn').classList.add('hidden');
                document.getElementById('order-sheet').classList.replace('sheet-expanded', 'sheet-minimized');
                clearInterval(globalTimerInterval);
            }
        });

        function openMaps() {
            if (currentOrder && currentOrder.address) {
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(currentOrder.address)}`);
            }
        }

        function processOrder() { 
            if (!currentOrder) return; 
            if (currentOrder.status !== "Delivering") {
                // Now just updates Firebase, doesn't open maps automatically
                db.ref('orders/' + currentOrder.id).update({ status: "Delivering", claimedBy: driverId });
            } else {
                db.ref('orders/' + currentOrder.id).update({status: "Completed", completedAt: Date.now()});
            }
        }

        // Rest of the supporting functions (Timer, renderUI, etc.) remain exactly as in the previous version
        function renderUI(o, btnText) {
            document.getElementById('c-name').innerText = o.customer;
            document.getElementById('c-addr').innerText = o.address;
            document.getElementById('res-name').innerText = o.restaurant || "KLEO Kitchen";
            document.getElementById('c-phone').href = "tel:" + o.phone;
            document.getElementById('action-btn').innerText = btnText;
            document.getElementById('order-ui').classList.remove('hidden');
            document.getElementById('waiting-ui').classList.add('hidden');
            document.getElementById('order-sheet').classList.replace('sheet-minimized', 'sheet-expanded');
            startWoltTimer(o);
            const cashUI = document.getElementById('cash-collection-ui');
            const actionBtn = document.getElementById('action-btn');
            if (o.status === "Delivering" && o.paymentType === "Cash") {
                cashUI.classList.remove('hidden');
                document.getElementById('cash-amount').innerText = o.totalPrice;
                toggleFinishButton();
            } else {
                cashUI.classList.add('hidden');
                actionBtn.disabled = false;
                actionBtn.style.opacity = "1";
            }
        }

        function startWoltTimer(o) {
            clearInterval(globalTimerInterval);
            const timerEl = document.getElementById('display-timer');
            const labelEl = document.getElementById('timer-label');
            globalTimerInterval = setInterval(() => {
                if (o.status === "Ready") {
                    timerEl.innerText = "READY";
                    timerEl.className = "text-5xl font-black italic ready-status";
                    labelEl.innerText = "FOOD READY";
                    return;
                }
                if (!o.readyTimestamp) {
                    timerEl.innerText = "WAITING...";
                    timerEl.className = "text-5xl font-black italic text-slate-500";
                    labelEl.innerText = "WAITING FOR KITCHEN";
                    return;
                }
                const now = Date.now();
                const target = parseInt(o.readyTimestamp);
                const diff = target - now;
                const absSecs = Math.floor(Math.abs(diff) / 1000);
                const mins = Math.floor(absSecs / 60);
                const secs = (absSecs % 60).toString().padStart(2, '0');
                if (diff > 0) {
                    timerEl.innerText = `${mins}:${secs}M`;
                    timerEl.className = "text-5xl font-black italic timer-normal";
                    labelEl.innerText = "PREPARATION";
                } else {
                    timerEl.innerText = `-${mins}:${secs}`;
                    timerEl.className = "text-5xl font-black italic timer-late";
                    labelEl.innerText = "RESTAURANT LATE";
                }
            }, 1000);
        }

        function toggleFinishButton() {
            const check = document.getElementById('cash-collected-check');
            const btn = document.getElementById('action-btn');
            if (currentOrder && currentOrder.status === "Delivering" && currentOrder.paymentType === "Cash") {
                if (check.checked) {
                    btn.disabled = false; btn.style.opacity = "1"; btn.innerText = "End Mission";
                } else {
                    btn.disabled = true; btn.style.opacity = "0.3"; btn.innerText = "Collect Cash First";
                }
            }
        }

        function goOnline() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if(audioCtx.state === 'suspended') audioCtx.resume(); document.getElementById('boot-screen').style.display = 'none'; }
        
        function playBeep() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            [0, 0.15].forEach(delay => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(1200, t + delay);
                gain.gain.setValueAtTime(0.1, t + delay);
                gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.1);
                osc.start(t + delay); osc.stop(t + delay + 0.1);
            });
        }
    </script>
</body>
</html>
