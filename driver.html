<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KLEO COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: #000000; }
        #map-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000000; z-index: 1; opacity: 0.4; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark-glass { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #history-sidebar, #chat-overlay, #stats-overlay { position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: #ffffff; z-index: 2000; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 50px 25px; display: flex; flex-direction: column; }
        .sidebar-active, .chat-active, .stats-active { transform: translateX(0) !important; }
        .tab-btn { padding: 8px 14px; border-radius: 12px; font-weight: 600; font-size: 13px; color: #64748b; transition: all 0.2s; }
        .tab-btn.active { background: #f1f5f9; color: #000; }
        .stat-row { display: flex; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid #f8fafc; }
        .stat-label { color: #1e293b; font-weight: 500; font-size: 15px; }
        .stat-value { color: #64748b; font-weight: 600; }
        .bottom-sheet { position: fixed; bottom: 20px; left: 15px; right: 15px; border-radius: 35px; z-index: 100; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); padding: 30px; }
        .sheet-minimized { transform: translateY(calc(100% - 130px)); }
        .sheet-expanded { transform: translateY(0); }
        .status-online { background: #4ade80; box-shadow: 0 0 10px #4ade80; }
        .status-offline { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
    </style>
</head>
<body>
    <div id="map-bg"></div>

    <div class="fixed top-[50px] left-0 w-full z-[150] px-6 flex justify-between items-center">
        <button onclick="toggleSidebar()" class="w-14 h-14 glass rounded-2xl flex items-center justify-center text-2xl shadow-xl active:scale-90 transition-all">≡</button>
        <div class="dark-glass text-white px-5 py-3 rounded-2xl flex items-center gap-2">
            <span id="conn-dot" class="w-2 h-2 rounded-full animate-pulse status-online"></span>
            <span id="conn-text" class="text-[10px] font-black uppercase tracking-widest">Live Shift</span>
        </div>
    </div>

    <div id="history-sidebar">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-black text-slate-900 uppercase italic">Menu</h2>
            <button onclick="toggleSidebar()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center font-bold">✕</button>
        </div>
        <div class="space-y-6">
            <button onclick="openStats()" class="w-full flex items-center gap-5 p-5 hover:bg-slate-50 rounded-3xl transition-all">
                <span class="text-2xl">📊</span><span class="text-lg font-bold text-slate-800 tracking-tight">Your stats</span>
            </button>
            <button onclick="openChat()" class="w-full flex items-center gap-5 p-5 hover:bg-slate-50 rounded-3xl transition-all">
                <span class="text-2xl">🎧</span><span class="text-lg font-bold text-slate-800 tracking-tight">Support</span>
            </button>
        </div>
    </div>

    <div id="stats-overlay">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="closeStats()" class="text-2xl font-bold">←</button>
            <h2 class="text-3xl font-black text-slate-900">Your stats</h2>
        </div>
        <div class="flex justify-between bg-slate-50 p-1 rounded-2xl mb-8">
            <button onclick="filterStats('today')" id="tab-today" class="tab-btn active">Today</button>
            <button onclick="filterStats('week')" id="tab-week" class="tab-btn">Week</button>
            <button onclick="filterStats('month')" id="tab-month" class="tab-btn">Month</button>
            <button onclick="showCustomRange()" id="tab-custom" class="tab-btn">Custom</button>
        </div>
        <div id="custom-picker" class="hidden grid grid-cols-2 gap-3 mb-6">
            <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-2">From</label><input type="date" id="date-from" onchange="runCustomFilter()" class="w-full bg-slate-50 p-3 rounded-xl border-none font-bold text-xs"></div>
            <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-2">To</label><input type="date" id="date-to" onchange="runCustomFilter()" class="w-full bg-slate-50 p-3 rounded-xl border-none font-bold text-xs"></div>
        </div>
        <h3 id="stat-date-label" class="text-lg font-black mb-4">-- --</h3>
        <div class="space-y-1">
            <div class="stat-row"><span class="stat-label">Deliveries completed</span><span id="stat-count" class="stat-value">0</span></div>
            <div class="stat-row"><span class="stat-label">Earnings (estimate)</span><span id="stat-total" class="stat-value text-slate-900">€0.00</span></div>
            <div class="stat-row"><span class="stat-label">Earnings without tips</span><span id="stat-base" class="stat-value">€0.00</span></div>
            <div class="stat-row border-none"><span class="stat-label">Tips</span><span class="stat-value">€0.00</span></div>
        </div>
    </div>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-black text-slate-900 uppercase italic">Support Chat</h2><button onclick="closeChat()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center font-bold">✕</button></div>
        <div id="chat-messages" class="flex-1 overflow-y-auto mb-4"></div>
        <div class="flex gap-2"><input type="text" id="chat-input" placeholder="Type..." class="flex-1 bg-slate-100 p-4 rounded-2xl font-bold"><button onclick="sendMessage()" class="bg-blue-600 text-white px-6 rounded-2xl font-black uppercase text-xs">Send</button></div>
    </div>

    <div id="boot-screen" class="fixed inset-0 z-[3000] bg-white flex flex-col items-center justify-center p-12 text-center">
        <div class="text-blue-600 font-black text-6xl tracking-tighter mb-16 italic">KLEO</div>
        <button onclick="goOnline()" class="bg-blue-600 text-white w-full py-6 rounded-3xl text-sm font-black uppercase tracking-widest shadow-2xl">Go Online</button>
    </div>

    <div id="order-sheet" class="bottom-sheet glass sheet-minimized shadow-2xl">
        <div class="w-12 h-1 bg-slate-300 rounded-full mx-auto mb-8"></div>
        <div id="waiting-ui" class="text-center py-2"><p class="text-slate-900 font-black text-xl uppercase italic">Online & Active</p></div>
        <div id="order-ui" class="hidden">
            <div class="flex justify-between items-end mb-8"><div><div class="currency">€4.00</div><p class="text-blue-500 font-black text-[10px] uppercase">Guaranteed</p></div><button onclick="confirmDecline()" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black">Decline</button></div>
            <div class="bg-white/50 rounded-[30px] p-6 mb-8 border border-white">
                <div class="mb-6 flex gap-4"><div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 font-bold">1</div><div><p class="text-[9px] font-black text-slate-400 uppercase">Pickup</p><h2 class="text-lg font-black text-slate-800">KLEO Kitchen</h2></div></div>
                <div class="flex gap-4"><div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 font-bold">2</div><div class="flex-1"><p class="text-[9px] font-black text-slate-400 uppercase">Drop</p><h2 id="c-name" class="text-lg font-black text-slate-800 truncate uppercase">---</h2><p id="c-addr" class="text-indigo-600 text-sm font-bold truncate underline">---</p></div></div>
            </div>
            <div class="flex gap-4"><a id="c-phone" href="#" class="w-20 h-20 bg-white rounded-[25px] flex items-center justify-center text-2xl shadow-sm border border-slate-100">📞</a><button id="action-btn" onclick="processOrder()" class="flex-1 bg-slate-900 text-white rounded-[25px] text-lg font-black uppercase tracking-tight shadow-xl">Accept Task</button></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Permanent Driver ID logic
        let driverId = localStorage.getItem('kleo_driver_id');
        if (!driverId) {
            driverId = "D-" + Math.floor(Math.random() * 10000);
            localStorage.setItem('kleo_driver_id', driverId);
        }

        let currentOrder = null; let audioCtx = null; let alertInterval = null; let activeTicketId = null;
        let allCompletedOrders = [];

        db.ref(".info/connected").on("value", (snap) => {
            const dot = document.getElementById('conn-dot');
            if (snap.val() === true) dot.className = "w-2 h-2 rounded-full animate-pulse status-online";
            else dot.className = "w-2 h-2 rounded-full status-offline";
        });

        function confirmDecline() { if(confirm("Are you sure you want to decline this €4.00 task?")) location.reload(); }
        function toggleSidebar() { document.getElementById('history-sidebar').classList.toggle('sidebar-active'); }
        function openStats() { document.getElementById('stats-overlay').classList.add('stats-active'); toggleSidebar(); filterStats('today'); }
        function closeStats() { document.getElementById('stats-overlay').classList.remove('stats-active'); document.getElementById('custom-picker').classList.add('hidden'); }
        function openChat() { document.getElementById('chat-overlay').classList.add('chat-active'); toggleSidebar(); }
        function closeChat() { document.getElementById('chat-overlay').classList.remove('chat-active'); }
        function showCustomRange() { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('tab-custom').classList.add('active'); document.getElementById('custom-picker').classList.remove('hidden'); }

        function updateStatDisplay(count, label) {
            document.getElementById('stat-count').innerText = count;
            document.getElementById('stat-total').innerText = "€" + (count * 4).toFixed(2);
            document.getElementById('stat-base').innerText = "€" + (count * 4).toFixed(2);
            document.getElementById('stat-date-label').innerText = label;
        }

        function filterStats(range) {
            document.getElementById('custom-picker').classList.add('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + range).classList.add('active');
            const now = new Date(); let count = 0;
            allCompletedOrders.forEach(o => {
                const oDate = new Date(o.completedAt || o.timestamp);
                // Personal check + Date check
                if (o.claimedBy === driverId) {
                    if(range === 'today' && oDate.toDateString() === now.toDateString()) count++;
                    else if(range === 'week' && (now - oDate) < 7 * 24 * 60 * 60 * 1000) count++;
                    else if(range === 'month' && oDate.getMonth() === now.getMonth()) count++;
                }
            });
            updateStatDisplay(count, range === 'today' ? now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long' }) : range.toUpperCase());
        }

        function runCustomFilter() {
            const from = new Date(document.getElementById('date-from').value).setHours(0,0,0,0);
            const to = new Date(document.getElementById('date-to').value).setHours(23,59,59,999);
            if(!from || !to) return;
            let count = 0;
            allCompletedOrders.forEach(o => {
                const oDate = (o.completedAt || o.timestamp);
                if(o.claimedBy === driverId && oDate >= from && oDate <= to) count++;
            });
            updateStatDisplay(count, "Custom Range");
        }

        db.ref('orders').on('value', (snap) => {
            let active = null; allCompletedOrders = [];
            snap.forEach(c => {
                const o = c.val(); o.id = c.key;
                if ((o.status === "Ready" && !o.claimedBy) || (o.status === "Delivering" && o.claimedBy === driverId)) active = o;
                if (o.status === "Completed") allCompletedOrders.push(o);
            });
            if (active) {
                currentOrder = active; document.getElementById('c-name').innerText = active.customer; document.getElementById('c-addr').innerText = active.address; document.getElementById('c-phone').href = "tel:" + active.phone;
                document.getElementById('action-btn').innerText = active.status === "Ready" ? "Confirm Pickup" : "End Mission";
                document.getElementById('order-ui').classList.remove('hidden'); document.getElementById('waiting-ui').classList.add('hidden');
                document.getElementById('order-sheet').classList.replace('sheet-minimized', 'sheet-expanded'); 
                if (active.status === "Ready" && !alertInterval) alertInterval = setInterval(() => playBeep(800, 0.5), 1500);
            } else { currentOrder = null; clearInterval(alertInterval); alertInterval = null; document.getElementById('order-ui').classList.add('hidden'); document.getElementById('waiting-ui').classList.remove('hidden'); document.getElementById('order-sheet').classList.replace('sheet-expanded', 'sheet-minimized'); }
        });

        function processOrder() { 
            if (!currentOrder) return; 
            if (currentOrder.status === "Ready") {
                db.ref('orders/' + currentOrder.id).update({ status: "Delivering", claimedBy: driverId });
                window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(currentOrder.address)}`);
            } else {
                db.ref('orders/' + currentOrder.id).update({status: "Completed", completedAt: Date.now()});
            }
        }

        function goOnline() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); document.getElementById('boot-screen').style.display = 'none'; }
        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            const msg = { sender: "Driver", text: input.value, timestamp: Date.now() };
            if (activeTicketId) {
                db.ref('support_tickets/' + activeTicketId + '/chat').push(msg);
                db.ref('support_tickets/' + activeTicketId).update({ lastUpdate: Date.now(), status: "Open" });
            } else {
                const newRef = db.ref('support_tickets').push(); activeTicketId = newRef.key;
                newRef.set({ customer: currentOrder ? currentOrder.customer : "Driver", timestamp: Date.now(), status: "Open" });
                db.ref('support_tickets/' + activeTicketId + '/chat').push(msg);
            }
            input.value = "";
        }

        db.ref('support_tickets').on('value', (snap) => {
            const tickets = snap.val(); if (!tickets) { activeTicketId = null; return; }
            const activeKey = Object.keys(tickets).find(k => tickets[k].status === "Open" || (k === activeTicketId && tickets[k].status !== "Resolved"));
            if (activeKey) {
                activeTicketId = activeKey; const t = tickets[activeKey];
                let html = ""; if (t.chat) {
                    const messages = Object.values(t.chat);
                    messages.forEach(m => { html += `<div class="${m.sender === 'Driver' ? 'msg-driver' : 'msg-admin'}">${m.text}</div>`; });
                    const last = messages[messages.length-1];
                    if (last.sender === "Admin" && last.timestamp > (Date.now() - 3000)) {
                        playBeep(1000, 0.4); if(!document.getElementById('chat-overlay').classList.contains('chat-active')) document.getElementById('unread-dot').classList.remove('hidden');
                    }
                }
                document.getElementById('chat-messages').innerHTML = html;
                document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
            } else { activeTicketId = null; document.getElementById('chat-messages').innerHTML = "<p class='text-center text-slate-400 mt-10 text-xs font-bold uppercase'>No active support thread</p>"; }
        });

        function playBeep(f, d) { if (!audioCtx) return; if (audioCtx.state === 'suspended') audioCtx.resume(); const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + d); }
    </script>
</body>
</html>
