<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRIVER | WE KLEO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; overflow: hidden; height: 100vh; }
        
        /* Map Background Emulation */
        #map-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 60%;
            background: url('https://www.google.com/maps/vt/pb=!1m4!1m3!1i14!2i8931!3i5684!2m3!1e0!2sm!3i605151525!3m8!2ssl!3sUS!5e1105!12m4!1e68!2m2!1sset!2sRoadmap!4e0!5m1!5f2');
            background-size: cover; z-index: 1;
        }

        /* Wolt-Style Bottom Sheet */
        .bottom-sheet {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: white; border-top-left-radius: 30px; border-top-right-radius: 30px;
            z-index: 100; box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
            padding: 24px; padding-bottom: env(safe-area-inset-bottom, 24px);
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .sheet-visible { transform: translateY(0); }

        .payout-text { color: #1e293b; font-size: 42px; font-weight: 900; letter-spacing: -1px; }
        .btn-accept { background-color: #009de0; color: white; transition: all 0.2s; }
        .btn-accept:active { transform: scale(0.96); background-color: #0082ba; }
        
        #overlay { background: #000; z-index: 5000; }
        .decline-btn { position: absolute; top: 20px; right: 20px; background: white; padding: 10px 20px; border-radius: 20px; font-weight: 700; color: #cc0000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="overlay" class="fixed inset-0 flex flex-col items-center justify-center p-10 text-center">
        <h1 class="text-white text-4xl font-black italic mb-8 uppercase tracking-tighter">WE KLEO DRIVER</h1>
        <button onclick="init()" class="bg-blue-500 text-white px-12 py-5 rounded-full font-black text-xl uppercase tracking-widest">Go Online</button>
    </div>

    <div id="map-bg"></div>
    <button class="decline-btn">Decline</button>

    <div id="order-sheet" class="bottom-sheet">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
        
        <div id="sheet-content">
            </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let audioCtx = null;

        function init() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('overlay').style.display = 'none';
        }

        db.ref('orders').on('value', (snapshot) => {
            let activeOrder = null;
            snapshot.forEach(child => {
                const order = child.val();
                if (order.status === "Ready" || order.status === "Delivering") {
                    activeOrder = { id: child.key, ...order };
                }
            });

            const sheet = document.getElementById('order-sheet');
            if (activeOrder) {
                renderSheet(activeOrder);
                sheet.classList.add('sheet-visible');
                playPing();
            } else {
                sheet.classList.remove('sheet-visible');
            }
        });

        function renderSheet(order) {
            const isPickup = order.status === "Ready";
            const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=Slovenska+ulica+15+Maribor&destination=${encodeURIComponent(order.address)}&travelmode=bicycling`;
            
            document.getElementById('sheet-content').innerHTML = `
                <div class="mb-2">
                    <h1 class="payout-text">€4.00</h1>
                    <p class="text-gray-500 font-semibold text-sm -mt-2">Payout for this delivery</p>
                </div>

                <div class="py-6 border-t border-gray-100 mt-4">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Delivery from</p>
                    <h2 class="text-xl font-extrabold text-slate-800">WE KLEO Kitchen</h2>
                    <p class="text-gray-500 text-sm italic">Slovenska ulica 15, Maribor</p>
                </div>

                <div class="pb-6">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Drop-off to</p>
                    <h2 class="text-xl font-extrabold text-blue-600 truncate">${order.customer}</h2>
                    <p class="text-gray-800 font-medium text-sm leading-tight">${order.address}</p>
                </div>

                <div class="flex gap-3 mb-6">
                    <a href="${mapsUrl}" target="_blank" class="flex-1 bg-gray-100 text-center py-4 rounded-2xl font-bold text-gray-700">Open Maps</a>
                    <a href="tel:${order.phone}" class="w-16 bg-gray-100 flex items-center justify-center rounded-2xl">📞</a>
                </div>

                <button onclick="updateStatus('${order.id}', '${isPickup ? 'Delivering' : 'Completed'}')" 
                        class="btn-accept w-full py-5 rounded-2xl text-xl font-black uppercase tracking-tight">
                    ${isPickup ? 'Accept' : 'Delivered'}
                </button>
            `;
        }

        function playPing() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function updateStatus(id, s) { db.ref('orders/' + id).update({ status: s }); }
    </script>
</body>
</html>
