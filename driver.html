<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DRIVER COMMAND | WE KLEO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a0c10; font-family: 'Inter', sans-serif; }
        
        /* Map Background with Dark Overlay */
        #map-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #111827; z-index: 1; opacity: 0.4;
        }

        /* Premium Bottom Panel */
        .premium-panel {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #ffffff; border-top-left-radius: 40px; border-top-right-radius: 40px;
            z-index: 100; box-shadow: 0 -20px 50px rgba(0,0,0,0.4);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 30px 30px 60px 30px; 
        }

        .panel-minimized { transform: translateY(calc(100% - 140px)); background: #111827; border-top: 1px solid #1f2937; }
        .panel-expanded { transform: translateY(0); background: #ffffff; }

        .currency { font-family: 'Space Grotesk', sans-serif; font-size: 56px; font-weight: 700; color: #0f172a; letter-spacing: -3px; }
        
        .top-status { position: fixed; top: 60px; left: 0; width: 100%; z-index: 50; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; }
        .menu-btn { width: 45px; height: 45px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .payout-pill { background: #fbbf24; color: #000; padding: 6px 16px; border-radius: 100px; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Step Indicator */
        .step-line { width: 2px; height: 100%; background: #e2e8f0; position: absolute; left: 7px; top: 20px; }
        .step-dot { width: 16px; height: 16px; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; z-index: 2; }
    </style>
</head>
<body>

    <div id="map-bg"></div>

    <div class="top-status">
        <div class="menu-btn text-xl">≡</div>
        <div id="active-payout" class="payout-pill hidden">Order Available</div>
    </div>

    <div id="boot-screen" class="fixed inset-0 z-[1000] bg-[#0a0c10] flex flex-col items-center justify-center p-12 text-center">
        <div class="text-white font-light text-5xl tracking-tighter mb-2">WE <span class="font-black text-amber-400">KLEO</span></div>
        <p class="text-gray-500 uppercase tracking-[0.5em] text-[10px] mb-16">Premium Logistics</p>
        <button onclick="goOnline()" class="bg-white text-black w-full py-5 rounded-full text-sm font-bold uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Go Online</button>
    </div>

    <div id="order-sheet" class="premium-panel panel-minimized">
        <div class="w-16 h-1 bg-gray-600/20 rounded-full mx-auto mb-10"></div>
        
        <div id="waiting-ui" class="flex flex-col items-center py-2">
            <div class="flex items-center gap-4">
                <div class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-amber-500"></span>
                </div>
                <p class="text-white font-medium tracking-wide">Searching for Deliveries</p>
            </div>
            <p id="clock" class="text-gray-500 text-xs mt-2 font-mono uppercase tracking-widest"></p>
        </div>

        <div id="order-ui" class="hidden">
            <div class="flex justify-between items-end mb-10">
                <div>
                    <p class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-1">Commission</p>
                    <div class="currency">€4,00</div>
                </div>
                <div onclick="location.reload()" class="text-red-500 text-xs font-bold uppercase tracking-widest mb-4">Decline</div>
            </div>

            <div class="relative pl-10 space-y-10 mb-12">
                <div class="step-line"></div>
                <div class="relative">
                    <div class="step-dot bg-amber-500 absolute -left-[33px]"></div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Store Pickup</p>
                    <h2 class="text-xl font-bold text-gray-900">WE KLEO Kitchen</h2>
                    <p class="text-gray-400 text-sm">Slovenska ulica 15, Maribor</p>
                </div>
                <div class="relative">
                    <div class="step-dot bg-black absolute -left-[33px]"></div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Client Destination</p>
                    <h2 id="c-name" class="text-xl font-bold text-gray-900 truncate">---</h2>
                    <p id="c-addr" class="text-gray-500 text-sm leading-tight">---</p>
                </div>
            </div>

            <div class="flex gap-4">
                <a id="c-phone" href="#" class="w-20 h-20 bg-gray-50 border border-gray-100 rounded-3xl flex items-center justify-center text-2xl shadow-sm">📞</a>
                <button id="action-btn" onclick="processOrder()" class="flex-1 bg-black text-white rounded-3xl text-lg font-bold uppercase tracking-tighter shadow-xl">
                    Accept Order
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentOrder = null;
        let audioCtx = null;

        // Simple Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        }, 1000);

        function goOnline() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('boot-screen').style.display = 'none', 500);
        }

        db.ref('orders').on('value', (snap) => {
            let active = null;
            snap.forEach(c => {
                const o = c.val();
                if (o.status === "Ready" || o.status === "Delivering") active = {id: c.key, ...o};
            });

            const sheet = document.getElementById('order-sheet');
            const waiting = document.getElementById('waiting-ui');
            const orderUi = document.getElementById('order-ui');
            const pill = document.getElementById('active-payout');

            if (active) {
                currentOrder = active;
                document.getElementById('c-name').innerText = active.customer;
                document.getElementById('c-addr').innerText = active.address;
                document.getElementById('c-phone').href = "tel:" + active.phone;
                document.getElementById('action-btn').innerText = active.status === "Ready" ? "Accept Pickup" : "Complete Task";
                
                waiting.classList.add('hidden');
                orderUi.classList.remove('hidden');
                pill.classList.remove('hidden');
                sheet.classList.replace('panel-minimized', 'panel-expanded');
                playHaptic();
            } else {
                currentOrder = null;
                waiting.classList.remove('hidden');
                orderUi.classList.add('hidden');
                pill.classList.add('hidden');
                sheet.classList.replace('panel-expanded', 'panel-minimized');
            }
        });

        function processOrder() {
            if (!currentOrder) return;
            const next = currentOrder.status === "Ready" ? "Delivering" : "Completed";
            db.ref('orders/' + currentOrder.id).update({status: next});
            if(next === "Delivering") window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(currentOrder.address)}`);
        }

        function playHaptic() {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.type = 'sine'; o.frequency.setValueAtTime(440, audioCtx.currentTime);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            o.start(); o.stop(audioCtx.currentTime + 0.1);
        }
    </script>
</body>
</html>
