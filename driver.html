<script>
    // ... (Keep your Firebase Config exactly the same) ...

    const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Generate a unique ID for this specific driver/phone session
    const driverSessionId = "Driver_" + Math.floor(Math.random() * 10000);
    
    let currentOrder = null; let audioCtx = null; let alertInterval = null; 

    // ... (Keep toggleHistory, openChat, closeChat, goOnline, sendMessage, support_tickets logic SAME) ...

    db.ref('orders').on('value', (snap) => {
        let active = null; let count = 0; const list = document.getElementById('history-list'); list.innerHTML = "";
        
        snap.forEach(c => {
            const o = c.val();
            const id = c.key;

            // NEW LOGIC: Only show order if it's Ready (unclaimed) OR if THIS driver already claimed it
            if ((o.status === "Ready" && !o.claimedBy) || (o.status === "Delivering" && o.claimedBy === driverSessionId)) {
                active = {id: id, ...o};
            }
            else if (o.status === "Completed" && o.claimedBy === driverSessionId) { 
                count++; 
                list.insertAdjacentHTML('afterbegin', `<div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center"><div class="truncate"><p class="text-slate-900 font-bold text-sm">${o.customer}</p></div><div class="text-blue-600 font-black">€4.00</div></div>`); 
            }
        });

        document.getElementById('history-total-large').innerText = "€" + (count * 4).toFixed(2);
        
        if (active) {
            currentOrder = active; 
            document.getElementById('c-name').innerText = active.customer; 
            document.getElementById('c-addr').innerText = active.address; 
            document.getElementById('c-phone').href = "tel:" + active.phone;
            document.getElementById('action-btn').innerText = active.status === "Ready" ? "Confirm Pickup" : "End Mission";
            document.getElementById('waiting-ui').classList.add('hidden'); 
            document.getElementById('order-ui').classList.remove('hidden');
            document.getElementById('order-sheet').classList.replace('sheet-minimized', 'sheet-expanded'); 
            
            if (active.status === "Ready") {
                if (!alertInterval) {
                    playBeep(800, 0.5);
                    alertInterval = setInterval(() => { playBeep(800, 0.5); }, 1500);
                }
            } else {
                clearInterval(alertInterval);
                alertInterval = null;
            }
        } else { 
            currentOrder = null;
            clearInterval(alertInterval);
            alertInterval = null;
            document.getElementById('waiting-ui').classList.remove('hidden'); 
            document.getElementById('order-ui').classList.add('hidden'); 
            document.getElementById('order-sheet').classList.replace('sheet-expanded', 'sheet-minimized'); 
        }
    });

    function processOrder() { 
        if (!currentOrder) return; 

        if (currentOrder.status === "Ready") {
            // CLAIM THE ORDER
            db.ref('orders/' + currentOrder.id).update({
                status: "Delivering",
                claimedBy: driverSessionId // Lock the order to this driver
            });
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(currentOrder.address)}`);
        } else {
            // COMPLETE THE ORDER
            db.ref('orders/' + currentOrder.id).update({status: "Completed"});
        }
    }

    // ... (Keep playBeep exactly the same) ...
</script>
