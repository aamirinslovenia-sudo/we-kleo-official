<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLEO | DRIVER HUB PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Outfit', sans-serif; }
        .driver-card { background: #0a0a0a; border-radius: 28px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; transition: 0.3s; }
        .btn-claim { background: #3b82f6; width: 100%; padding: 18px; border-radius: 18px; font-weight: 900; text-transform: uppercase; margin-top: 15px; }
        .btn-finish { background: #10b981; width: 100%; padding: 18px; border-radius: 18px; font-weight: 900; text-transform: uppercase; margin-top: 15px; }
        .btn-locked { background: #1a1a1a; color: #444; border: 1px solid #222; cursor: not-allowed; }
        .empty-state { height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.3; }
    </style>
</head>
<body class="p-6">

    <header class="mb-10 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter">DRIVER <span class="text-blue-500">HUB</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Live Dispatch System</p>
        </div>
        <div class="text-right">
            <div id="status-dot" class="w-3 h-3 bg-green-500 rounded-full inline-block shadow-[0_0_10px_#10b981]"></div>
            <span class="text-[10px] font-black uppercase ml-2">Online</span>
        </div>
    </header>

    <div id="driverOrders">
        </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "we-kleo.firebaseapp.com", 
            databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "we-kleo", 
            storageBucket: "we-kleo.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const driverID = "COURIER_01"; // Unique ID for this driver

        db.ref('orders').on('value', (snap) => {
            const container = document.getElementById('driverOrders');
            let hasVisibleOrders = false;
            container.innerHTML = "";

            snap.forEach((child) => {
                const o = child.val(); 
                o.id = child.key;
                
                // --- THE INVISIBLE FILTER ---
                // We ONLY show the order if it's currently being prepared or is ready.
                // We HIDE it if it's "New" (Kitchen hasn't touched it) or "Completed".
                if (o.status === "Preparing" || o.status === "Ready" || (o.status === "Delivering" && o.claimedBy === driverID)) {
                    hasVisibleOrders = true;
                    renderDriverCard(o);
                }
            });

            if (!hasVisibleOrders) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="text-6xl mb-4">🛰️</div>
                        <p class="font-black uppercase tracking-widest text-xs text-center">Scanning for active <br> kitchen tasks...</p>
                    </div>`;
            }
        });

        function renderDriverCard(o) {
            const isMine = o.claimedBy === driverID;
            const canFinish = o.isFoodReady === true;

            let actionArea = "";

            if (!o.claimedBy) {
                // If nobody claimed it yet
                actionArea = `<button onclick="claimOrder('${o.id}')" class="btn-claim">Accept Delivery</button>`;
            } else if (isMine) {
                // If I claimed it
                if (canFinish) {
                    actionArea = `<button onclick="completeOrder('${o.id}')" class="btn-finish">Confirm Handover</button>`;
                } else {
                    actionArea = `<button disabled class="btn-finish btn-locked italic">Kitchen is cooking...</button>`;
                }
            } else {
                // If someone else claimed it
                actionArea = `<div class="bg-white/5 p-4 rounded-xl text-center text-[10px] font-black uppercase text-slate-500">Claimed by ${o.claimedBy}</div>`;
            }

            const html = `
                <div class="driver-card border-l-4 ${o.status === 'Ready' ? 'border-green-500' : 'border-blue-500'}">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black px-3 py-1 bg-white/5 rounded-full uppercase tracking-tighter text-blue-400">
                            ${o.status === 'Ready' ? '✅ Food Ready' : '⏳ ' + o.status}
                        </span>
                        <span class="text-xl font-black italic">${o.totalPrice}</span>
                    </div>
                    <h2 class="text-3xl font-black italic uppercase tracking-tighter leading-none mb-2">${o.item}</h2>
                    <p class="text-slate-400 font-bold text-sm mb-6">${o.address || 'Standard Delivery'}</p>
                    ${actionArea}
                </div>
            `;
            document.getElementById('driverOrders').insertAdjacentHTML('beforeend', html);
        }

        function claimOrder(id) { 
            db.ref('orders/' + id).update({ 
                claimedBy: driverID, 
                status: "Delivering" 
            }); 
        }

        function completeOrder(id) { 
            db.ref('orders/' + id).update({ 
                status: "Completed" 
            }); 
        }
    </script>
</body>
</html>
