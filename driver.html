<script>
    // ... (Keep Firebase Config and DriverID logic the same) ...

    function filterStats(range) {
        document.getElementById('custom-picker').classList.add('hidden');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + range).classList.add('active');
        
        const now = new Date();
        let count = 0;

        allCompletedOrders.forEach(o => {
            // FIX: Use completedAt OR the original timestamp as a fallback
            const timeValue = o.completedAt || o.timestamp;
            const oDate = new Date(timeValue);

            if (o.claimedBy === driverId) {
                if(range === 'today' && oDate.toDateString() === now.toDateString()) {
                    count++;
                } else if(range === 'week' && (now - oDate) < 7 * 24 * 60 * 60 * 1000) {
                    count++;
                } else if(range === 'month' && oDate.getMonth() === now.getMonth()) {
                    count++;
                }
            }
        });

        updateStatDisplay(count, range === 'today' ? now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long' }) : range.toUpperCase());
    }

    // ... (Keep the rest of the script exactly the same) ...

    function processOrder() { 
        if (!currentOrder) return; 
        if (currentOrder.status === "Ready") {
            db.ref('orders/' + currentOrder.id).update({ 
                status: "Delivering", 
                claimedBy: driverId 
            });
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(currentOrder.address)}`);
        } else {
            // FIX: Ensure timestamp is saved correctly on completion
            db.ref('orders/' + currentOrder.id).update({
                status: "Completed", 
                completedAt: Date.now()
            });
        }
    }
</script>
