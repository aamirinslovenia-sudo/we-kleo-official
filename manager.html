<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLEO | COMMAND CENTER v1.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); }
        .stat-card { padding: 30px; border-radius: 24px; border-left: 4px solid #3b82f6; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: #ef4444; color: white; }
        .msg-bubble { max-width: 85%; padding: 12px; border-radius: 18px; font-size: 13px; line-height: 1.4; margin-bottom: 8px; }
        
        .driver-tab { 
            padding: 12px 20px; 
            border-radius: 14px; 
            font-size: 11px; 
            font-weight: 900; 
            white-space: nowrap; 
            transition: all 0.3s ease; 
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tab-active { background: #3b82f6 !important; color: white !important; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); border-color: #3b82f6; }
        .tab-inactive { background: rgba(255,255,255,0.05); color: #64748b; }
        .tab-inactive:hover { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body class="p-8 flex gap-8">

    <div class="w-1/4 flex flex-col gap-6">
        <h1 class="text-4xl font-black italic tracking-tighter uppercase">KLEO <span class="text-blue-500">HQ</span></h1>
        <div class="glass stat-card">
            <p class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Revenue Today</p>
            <h2 id="total-revenue" class="text-5xl font-black mt-2 text-blue-400">€0.00</h2>
            <p id="order-count" class="text-xs font-bold text-slate-400 mt-2">0 Missions Completed</p>
        </div>
        <div class="glass rounded-[32px] p-6 flex-1 flex flex-col">
            <h3 class="text-xs font-black uppercase text-blue-500 mb-6 tracking-widest">Active Couriers</h3>
            <div id="driver-list" class="space-y-4 overflow-y-auto scroll-hide"></div>
            <button onclick="resetDay()" class="mt-auto w-full py-4 btn-danger rounded-2xl font-black uppercase text-[10px] tracking-widest">Reset System</button>
        </div>
    </div>

    <div class="flex-1 glass rounded-[32px] p-8 flex flex-col">
        <h3 class="text-xl font-black italic uppercase mb-8">Mission Control</h3>
        <div class="overflow-y-auto scroll-hide flex-1">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-[10px] font-black uppercase text-slate-600 border-b border-white/5">
                        <th class="pb-4">Status</th>
                        <th class="pb-4">Item</th>
                        <th class="pb-4">Client</th>
                        <th class="pb-4">Courier</th>
                        <th class="pb-4">Total</th>
                        <th class="pb-4">Action</th>
                    </tr>
                </thead>
                <tbody id="master-order-list"></tbody>
            </table>
        </div>
    </div>

    <div class="w-1/4 glass rounded-[32px] p-6 flex flex-col">
        <h3 class="text-xs font-black uppercase text-blue-500 mb-4 tracking-widest">Courier Support</h3>
        
        <div id="driver-selector" class="flex gap-2 overflow-x-auto pb-4 mb-4 border-b border-white/10 scroll-hide"></div>

        <div id="chat-box" class="flex-1 overflow-y-auto scroll-hide mb-4 space-y-2 flex flex-col">
            <div class="text-center text-[10px] text-slate-600 uppercase mt-40">Select a driver tab</div>
        </div>

        <div class="flex gap-2 bg-white/5 p-2 rounded-2xl border border-white/10">
            <input type="text" id="chat-input" onkeypress="if(event.key==='Enter') sendAdminMsg()" class="flex-1 bg-transparent p-2 text-sm outline-none" placeholder="Reply...">
            <button onclick="sendAdminMsg()" class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center font-bold transition active:scale-90">➤</button>
        </div>
        <button onclick="endSelectedChat()" class="mt-2 text-[8px] text-red-500/50 uppercase font-bold tracking-widest hover:text-red-500 transition">Close Ticket</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let selectedTicketId = localStorage.getItem('kleo_active_chat') || null;

        // --- ORDER & REVENUE LOGIC ---
        db.ref('orders').on('value', (snap) => {
            const list = document.getElementById('master-order-list');
            const driverDiv = document.getElementById('driver-list');
            list.innerHTML = "";
            let revenue = 0; let orders = 0; let drivers = {};
            snap.forEach(child => {
                const o = child.val();
                if(o.status === "Completed") revenue += parseFloat(o.totalPrice.replace('€','')) || 0;
                orders++;
                if(o.claimedBy) drivers[o.claimedBy] = (drivers[o.claimedBy] || 0) + (o.status === "Completed" ? 1 : 0);
                const sColor = o.status === "Completed" ? "text-green-500" : (o.status === "New" ? "text-blue-500" : "text-yellow-500");
                list.innerHTML += `<tr class="border-b border-white/5"><td class="py-4 font-black uppercase text-[9px] ${sColor}">${o.status}</td><td class="py-4 font-bold">${o.item}</td><td class="py-4 text-xs text-slate-400">${o.customer}</td><td class="py-4 text-xs font-mono text-blue-400">${o.claimedBy || 'NONE'}</td><td class="py-4 font-black">${o.totalPrice}</td><td class="py-4"><button onclick="deleteOrder('${child.key}')" class="opacity-20 hover:opacity-100 transition">✕</button></td></tr>`;
            });
            document.getElementById('total-revenue').innerText = "€" + revenue.toFixed(2);
            document.getElementById('order-count').innerText = orders + " Total Orders Today";
            driverDiv.innerHTML = Object.keys(drivers).map(dId => `<div class="flex justify-between items-center p-3 glass rounded-xl border-l-2 border-blue-500"><div><p class="text-[9px] font-black text-blue-400 font-mono">${dId}</p><p class="text-[10px] font-bold">Courier Active</p></div><div class="text-right"><p class="text-lg font-black">${drivers[dId]}</p></div></div>`).join('');
        });

        // --- ISOLATED CHAT LOGIC ---
        db.ref('support_tickets').on('value', (snap) => {
            const selector = document.getElementById('driver-selector');
            const chatBox = document.getElementById('chat-box');
            const tickets = snap.val();
            
            if(!tickets) { 
                selector.innerHTML = ""; 
                chatBox.innerHTML = "<div class='text-center text-[10px] text-slate-600 uppercase mt-40'>No tickets open</div>";
                return; 
            }

            // 1. Render Unique Tabs for each Driver ID
            let tabsHtml = "";
            Object.keys(tickets).forEach(ticketKey => {
                if(tickets[ticketKey].status === "Open") {
                    const isSelected = (selectedTicketId === ticketKey);
                    tabsHtml += `<button onclick="setChatTarget('${ticketKey}')" class="driver-tab ${isSelected ? 'tab-active' : 'tab-inactive'}">${ticketKey}</button>`;
                }
            });
            selector.innerHTML = tabsHtml;

            // 2. Render Chat ONLY for the selected Driver ID
            if(selectedTicketId && tickets[selectedTicketId]) {
                const currentTicket = tickets[selectedTicketId];
                if(currentTicket.chat) {
                    let chatHtml = "";
                    Object.values(currentTicket.chat).forEach(m => {
                        const isAdmin = m.sender === "Admin";
                        chatHtml += `
                            <div class="flex ${isAdmin ? 'justify-end' : 'justify-start'}">
                                <div class="msg-bubble ${isAdmin ? 'bg-blue-600 text-white' : 'bg-white/10 text-slate-200'}">
                                    <p class="text-[8px] font-black uppercase opacity-50 mb-1">${m.sender}</p>
                                    ${m.text}
                                </div>
                            </div>`;
                    });
                    chatBox.innerHTML = chatHtml;
                    chatBox.scrollTop = chatBox.scrollHeight;
                } else {
                    chatBox.innerHTML = "<div class='text-center text-[10px] text-slate-700 uppercase mt-40'>Waiting for first message...</div>";
                }
            } else {
                chatBox.innerHTML = "<div class='text-center text-[10px] text-slate-600 uppercase mt-40'>Select a driver to chat</div>";
            }
        });

        function setChatTarget(key) {
            selectedTicketId = key;
            localStorage.setItem('kleo_active_chat', key);
            // Force re-render of chat
            db.ref('support_tickets').once('value', () => {}); 
        }
        
        function sendAdminMsg() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !selectedTicketId) return;
            
            db.ref('support_tickets/' + selectedTicketId + '/chat').push({
                sender: "Admin",
                text: text,
                timestamp: Date.now()
            });
            db.ref('support_tickets/' + selectedTicketId).update({ lastUpdate: Date.now() });
            input.value = "";
        }

        function endSelectedChat() {
            if(selectedTicketId && confirm("End this session?")) {
                db.ref('support_tickets/' + selectedTicketId).update({ status: "Resolved" });
                selectedTicketId = null;
                localStorage.removeItem('kleo_active_chat');
            }
        }

        function deleteOrder(id) { if(confirm("Delete record?")) db.ref('orders/' + id).remove(); }
        function resetDay() { if(confirm("Wipe all data?")) { db.ref('orders').remove(); db.ref('support_tickets').remove(); localStorage.removeItem('kleo_active_chat'); } }
    </script>
</body>
</html>
