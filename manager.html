<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WE KLEO | COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #060a11; color: white; }
        .stat-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 30px; }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-white/10 pb-8">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter">HQ<span class="text-blue-500">CONTROL</span></h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">Master Operations View</p>
            </div>
            <div class="text-right">
                <p id="live-time" class="text-xl font-bold">00:00:00</p>
                <p class="text-[10px] text-blue-500 font-black uppercase">System Live</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="stat-card glow-blue">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Total Revenue</p>
                <h2 id="total-rev" class="text-4xl font-black text-green-400">€0.00</h2>
            </div>
            <div class="stat-card">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-2">In Kitchen</p>
                <h2 id="kitchen-count" class="text-4xl font-black text-blue-500">0</h2>
            </div>
            <div class="stat-card border-amber-500/30">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Out for Delivery</p>
                <h2 id="delivery-count" class="text-4xl font-black text-amber-500">0</h2>
            </div>
            <div class="stat-card">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Active Support</p>
                <h2 id="support-count" class="text-4xl font-black text-red-500">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="stat-card">
                <h3 class="text-xl font-black uppercase mb-6 italic border-l-4 border-blue-500 pl-4">Live Logistics</h3>
                <div id="logistics-list" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                    </div>
            </div>

            <div class="stat-card bg-white/5">
                <h3 class="text-xl font-black uppercase mb-6 italic border-l-4 border-green-500 pl-4">Completed Sales</h3>
                <div id="completed-list" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 text-slate-400">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "we-kleo.firebaseapp.com", 
            databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "we-kleo", 
            storageBucket: "we-kleo.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Clock
        setInterval(() => { document.getElementById('live-time').innerText = new Date().toLocaleTimeString(); }, 1000);

        // Core Monitoring Logic
        db.ref('orders').on('value', (snap) => {
            let kitchen = 0; let delivery = 0; let completed = 0;
            const logisticsList = document.getElementById('logistics-list');
            const completedList = document.getElementById('completed-list');
            
            logisticsList.innerHTML = "";
            completedList.innerHTML = "";

            snap.forEach(child => {
                const o = child.val();
                if(o.status === "New") {
                    kitchen++;
                    addLogisticsItem(o, "KITCHEN", "text-blue-500");
                } else if(o.status === "Ready" || o.status === "Delivering") {
                    delivery++;
                    addLogisticsItem(o, "ON ROAD", "text-amber-500");
                } else if(o.status === "Completed") {
                    completed++;
                    completedList.insertAdjacentHTML('afterbegin', `
                        <div class="flex justify-between items-center py-2 border-b border-white/5 text-xs">
                            <span>${o.customer}</span>
                            <span class="font-bold text-white">€4.00</span>
                        </div>
                    `);
                }
            });

            document.getElementById('kitchen-count').innerText = kitchen;
            document.getElementById('delivery-count').innerText = delivery;
            document.getElementById('total-rev').innerText = "€" + (completed * 4).toFixed(2);
        });

        db.ref('support_tickets').on('value', snap => {
            let active = 0;
            snap.forEach(c => { if(c.val().status !== "Resolved") active++; });
            document.getElementById('support-count').innerText = active;
        });

        function addLogisticsItem(o, label, colorClass) {
            const list = document.getElementById('logistics-list');
            list.insertAdjacentHTML('beforeend', `
                <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <div>
                        <p class="text-white font-bold">${o.customer}</p>
                        <p class="text-[10px] text-slate-500 uppercase">${o.address}</p>
                    </div>
                    <div class="text-right">
                        <p class="${colorClass} font-black text-[10px] tracking-widest">${label}</p>
                        <p class="text-[9px] text-slate-600">${o.item || 'Order'}</p>
                    </div>
                </div>
            `);
        }
    </script>
</body>
</html>
