<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLEO | SUPPORT COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f1f5f9; }
        .ticket-card { background: white; border-radius: 35px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); border-left: 12px solid #3b82f6; }
        #login-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 5000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-8">

    <div id="login-overlay">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-md text-center">
            <h2 class="text-3xl font-black mb-2 italic text-blue-600">WE KLEO</h2>
            <input type="password" id="pass-input" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 text-center font-bold outline-none">
            <button onclick="checkPass()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase">Login</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-12">
            <div><h1 class="text-5xl font-black text-slate-900 italic tracking-tighter">SUPPORT<span class="text-blue-600">HQ</span></h1></div>
            <div class="bg-white px-8 py-4 rounded-[25px] text-center border shadow-sm"><p id="active-count" class="text-4xl font-black text-blue-600">0</p><p class="text-[10px] font-bold text-slate-400 uppercase">Active Threads</p></div>
        </header>

        <div id="ticket-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
    </div>

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <script>
        const ADMIN_PASSWORD = "KLEO2026";
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkPass() { if(document.getElementById('pass-input').value === ADMIN_PASSWORD) document.getElementById('login-overlay').style.display = 'none'; else alert("Wrong Pass"); }

        db.ref('support_tickets').on('value', (snap) => {
            const container = document.getElementById('ticket-container');
            let html = ""; let count = 0;
            snap.forEach(child => {
                const t = child.val(); const id = child.key;
                if(t.status !== "Resolved") {
                    count++;
                    const lastReply = t.adminReply ? `<p class="mt-2 text-[11px] text-blue-500 font-bold uppercase tracking-widest italic">Last Sent: "${t.adminReply}"</p>` : "";
                    html += `
                    <div class="ticket-card p-8">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-2xl font-black text-slate-800 italic leading-tight">"${t.issue}"</h3>
                            <button onclick="resolveTicket('${id}')" class="text-slate-300 hover:text-red-500 font-bold">✕</button>
                        </div>
                        <p class="text-[10px] font-black text-slate-400 border-b pb-4 mb-4 uppercase">Customer: ${t.customer}</p>
                        
                        <div class="bg-slate-50 p-4 rounded-2xl mb-6">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Status</p>
                            <p class="text-sm font-medium text-slate-700">Driver is waiting for reply...</p>
                            ${lastReply}
                        </div>

                        <div class="flex gap-2">
                            <input type="text" id="reply-${id}" placeholder="Type reply..." class="flex-1 p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 transition-all">
                            <button onclick="sendReply('${id}')" class="bg-blue-600 text-white px-8 rounded-2xl font-black uppercase text-xs">Reply</button>
                        </div>
                        <button onclick="resolveTicket('${id}')" class="w-full mt-4 py-3 text-[10px] font-black uppercase text-slate-300 hover:text-red-500">Close Case</button>
                    </div>`;
                }
            });
            container.innerHTML = html;
            document.getElementById('active-count').innerText = count;
            if(count > 0) document.getElementById('alert-sound').play().catch(()=>{});
        });

        function sendReply(id) {
            const reply = document.getElementById(`reply-${id}`).value;
            if(reply.trim() !== "") {
                db.ref('support_tickets/' + id).update({ adminReply: reply, replyTime: Date.now() }).then(() => {
                    alert("Reply Sent!"); document.getElementById(`reply-${id}`).value = "";
                });
            }
        }

        function resolveTicket(id) { db.ref('support_tickets/' + id).update({ status: "Resolved" }); }
    </script>
</body>
</html>
