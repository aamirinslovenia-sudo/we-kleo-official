<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLEO | SUPPORT DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; }
        .ticket-card { transition: all 0.3s ease; border-left: 6px solid #ef4444; }
        .ticket-card:hover { transform: translateX(5px); }
        .resolved { border-left-color: #10b981; opacity: 0.6; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">SUPPORT <span class="text-blue-600">CENTER</span></h1>
                <p class="text-slate-500 font-medium">Real-time Driver Assistance Portal</p>
            </div>
            <div id="stats" class="bg-white px-6 py-3 rounded-2xl shadow-sm border border-slate-200 text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Active Tickets</p>
                <p id="active-count" class="text-2xl font-black text-blue-600">0</p>
            </div>
        </header>

        <div id="ticket-container" class="space-y-4">
            <div id="no-tickets" class="text-center py-20 bg-white rounded-[40px] border-2 border-dashed border-slate-200">
                <p class="text-slate-400 font-medium text-lg">All quiet. No active support requests.</p>
            </div>
        </div>
    </div>

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('support_tickets').on('value', (snap) => {
            const container = document.getElementById('ticket-container');
            const noTickets = document.getElementById('no-tickets');
            const activeCount = document.getElementById('active-count');
            
            let html = "";
            let count = 0;

            snap.forEach(child => {
                const t = child.val();
                const id = child.key;
                const time = new Date(t.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                if(t.status !== "Resolved") {
                    count++;
                    html = `
                    <div class="ticket-card bg-white p-6 rounded-[30px] shadow-sm border border-slate-100 flex justify-between items-center animate-in fade-in slide-in-from-right-4 duration-500">
                        <div class="flex-1 pr-6">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="bg-red-100 text-red-600 text-[10px] font-black px-2 py-1 rounded-md uppercase uppercase tracking-widest">${t.status}</span>
                                <span class="text-slate-400 text-xs font-bold">${time}</span>
                            </div>
                            <h3 class="text-xl font-bold text-slate-800 mb-1 italic">"${t.issue}"</h3>
                            <p class="text-sm text-slate-500 font-medium">Order: <span class="text-blue-600 font-bold">#${t.orderId.substring(0,6)}</span> | Customer: <span class="text-slate-900 font-bold">${t.customer}</span></p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="resolveTicket('${id}')" class="bg-slate-900 text-white px-6 py-3 rounded-2xl text-xs font-black uppercase hover:bg-green-600 transition-colors">Mark Resolved</button>
                        </div>
                    </div>` + html;
                }
            });

            if(count > 0) {
                noTickets.style.display = 'none';
                container.innerHTML = html;
                // Play sound for new tickets
                if(count > parseInt(activeCount.innerText)) {
                    document.getElementById('alert-sound').play().catch(e => console.log("Sound blocked"));
                }
            } else {
                noTickets.style.display = 'block';
                container.innerHTML = "";
            }
            activeCount.innerText = count;
        });

        function resolveTicket(id) {
            if(confirm("Have you assisted the driver?")) {
                db.ref('support_tickets/' + id).update({ status: "Resolved" });
            }
        }
    </script>
</body>
</html>
