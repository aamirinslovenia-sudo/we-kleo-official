<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KLEO | MARIBOR EATS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f3f4f6; color: #111827; }
        .category-pill { transition: 0.3s; flex: 0 0 auto; }
        .food-card { border-radius: 24px; overflow: hidden; background: white; transition: 0.3s; border: 1px solid #eee; }
        .food-card.selected { border-color: #3b82f6; ring: 4px; ring-color: #3b82f6/20; transform: scale(0.98); }
        .status-float { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #111827; color: white; border-radius: 20px; padding: 20px; display: none; z-index: 1000; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .pay-btn { border: 2px solid #e5e7eb; border-radius: 16px; transition: 0.2s; }
        .pay-btn.active { border-color: #3b82f6; background: #eff6ff; color: #3b82f6; }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 bg-white sticky top-0 z-50 border-b border-gray-100">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-[900] italic tracking-tighter text-blue-600">KLEO.</h1>
            <div class="bg-gray-100 p-2 rounded-full text-xs font-bold">Maribor, SI 🇸🇮</div>
        </div>
        <div class="relative">
            <input type="text" id="address" placeholder="Enter Delivery Address..." class="w-full bg-gray-100 border-none rounded-2xl py-4 pl-12 pr-4 text-sm font-semibold focus:ring-2 focus:ring-blue-500">
            <span class="absolute left-4 top-4">📍</span>
        </div>
    </header>

    <div class="flex gap-4 overflow-x-auto p-6 scroll-hide">
        <div class="category-pill text-center"><div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm mb-2 text-2xl">🍱</div><p class="text-[10px] font-black uppercase">Sushi</p></div>
        <div class="category-pill text-center"><div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm mb-2 text-2xl">🍔</div><p class="text-[10px] font-black uppercase">Burgers</p></div>
        <div class="category-pill text-center"><div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm mb-2 text-2xl">🍕</div><p class="text-[10px] font-black uppercase">Pizza</p></div>
        <div class="category-pill text-center"><div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm mb-2 text-2xl">🥩</div><p class="text-[10px] font-black uppercase">Steaks</p></div>
        <div class="category-pill text-center"><div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm mb-2 text-2xl">🥗</div><p class="text-[10px] font-black uppercase">Salads</p></div>
    </div>

    <div class="px-6 space-y-6">
        <h2 class="text-xl font-black">Local Favorites</h2>
        
        <div id="item-luft" onclick="selectItem('Luft Bento Box', '14.50', 'item-luft')" class="food-card p-4 flex gap-4">
            <div class="w-24 h-24 bg-gray-200 rounded-xl flex-shrink-0 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?auto=format&fit=crop&w=300" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <p class="text-[10px] font-bold text-blue-500 uppercase">Luft 360°</p>
                <h3 class="font-bold text-lg">Bento Luxury Box</h3>
                <p class="text-gray-500 text-xs mb-2">Sushi, Salmon, & Gyoza</p>
                <p class="font-black text-blue-600">€14.50</p>
            </div>
        </div>

        <div id="item-ancora" onclick="selectItem('Pizza Ancora', '9.80', 'item-ancora')" class="food-card p-4 flex gap-4">
            <div class="w-24 h-24 bg-gray-200 rounded-xl flex-shrink-0 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=300" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <p class="text-[10px] font-bold text-blue-500 uppercase">Ancora Maribor</p>
                <h3 class="font-bold text-lg">Classic Margarita</h3>
                <p class="text-gray-500 text-xs mb-2">Fresh Basil & Mozzarella</p>
                <p class="font-black text-blue-600">€9.80</p>
            </div>
        </div>
    </div>

    <div class="p-6 mt-6 bg-white border-t border-gray-100">
        <input type="text" id="customerName" placeholder="Your Name" class="w-full mb-3 p-4 bg-gray-50 rounded-xl border-none font-semibold">
        <input type="text" id="customerPhone" placeholder="Phone Number" class="w-full mb-6 p-4 bg-gray-50 rounded-xl border-none font-semibold">
        
        <p class="text-xs font-black uppercase text-gray-400 mb-3 tracking-widest">Payment Method</p>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button id="pay-cash" onclick="setPayment('Cash')" class="pay-btn py-4 font-bold text-sm">💵 Cash</button>
            <button id="pay-card" onclick="setPayment('Card')" class="pay-btn py-4 font-bold text-sm">💳 Card</button>
        </div>

        <button onclick="sendOrder()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-200 active:scale-95 transition-all">Place Order</button>
    </div>

    <div id="live-status" class="status-float">
        <div class="flex justify-between items-center mb-4">
            <div>
                <p id="status-text" class="text-blue-400 text-[10px] font-black uppercase tracking-[0.2em]">Preparing...</p>
                <h4 id="status-item" class="font-bold text-lg">Order Received</h4>
            </div>
            <div class="text-3xl" id="status-icon">👨‍🍳</div>
        </div>
        <div class="w-full bg-white/10 h-1.5 rounded-full overflow-hidden">
            <div id="status-progress" class="bg-blue-500 h-full transition-all duration-1000" style="width: 20%"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedFood = null;
        let selectedPrice = null;
        let paymentMethod = null;
        let currentOrderId = null;

        function selectItem(name, price, id) {
            selectedFood = name;
            selectedPrice = price;
            document.querySelectorAll('.food-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
        }

        function setPayment(method) {
            paymentMethod = method;
            document.getElementById('pay-cash').classList.remove('active');
            document.getElementById('pay-card').classList.remove('active');
            document.getElementById('pay-' + method.toLowerCase()).classList.add('active');
        }

        function sendOrder() {
            const name = document.getElementById('customerName').value;
            const phone = document.getElementById('customerPhone').value;
            const addr = document.getElementById('address').value;

            if(!selectedFood || !paymentMethod || !name || !addr) {
                alert("Please fill all details and select payment!");
                return;
            }

            const newOrderRef = db.ref('orders').push();
            currentOrderId = newOrderRef.key;

            newOrderRef.set({
                customer: name,
                phone: phone,
                address: addr,
                item: selectedFood,
                totalPrice: "€" + selectedPrice,
                paymentType: paymentMethod,
                status: "Preparing",
                timestamp: Date.now()
            });

            // Show Live Status Bar
            document.getElementById('live-status').style.display = 'block';
            trackStatus();
        }

        function trackStatus() {
            db.ref('orders/' + currentOrderId).on('value', (snap) => {
                const o = snap.val();
                if(!o) return;

                const text = document.getElementById('status-text');
                const title = document.getElementById('status-item');
                const progress = document.getElementById('status-progress');
                const icon = document.getElementById('status-icon');

                title.innerText = o.item;

                if(o.status === "Preparing") {
                    text.innerText = "👨‍🍳 Chef is cooking";
                    progress.style.width = "30%";
                    icon.innerText = "🍱";
                } else if(o.status === "Ready") {
                    text.innerText = "📦 Packaged & Ready";
                    progress.style.width = "50%";
                    icon.innerText = "🛍️";
                } else if(o.status === "Delivering") {
                    text.innerText = "🛵 Driver on the way";
                    progress.style.width = "80%";
                    icon.innerText = "⚡";
                } else if(o.status === "Completed") {
                    text.innerText = "✅ Enjoy your meal!";
                    progress.style.width = "100%";
                    progress.classList.replace('bg-blue-500', 'bg-green-500');
                    icon.innerText = "🍴";
                    setTimeout(() => { document.getElementById('live-status').style.fadeOut; }, 5000);
                }
            });
        }
    </script>
</body>
</html>
