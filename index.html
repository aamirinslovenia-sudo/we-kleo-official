<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WE KLEO | Maribor Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#f3f4f5] pb-32 font-sans text-gray-900">
    
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <h1 class="text-xl font-black italic text-blue-600">WE KLEO <span class="text-gray-400 not-italic font-medium text-xs ml-2">Maribor Center</span></h1>
    </div>

    <div class="max-w-md mx-auto px-4 py-6 space-y-8">
        
        <div class="bg-white rounded-[24px] shadow-md overflow-hidden border border-gray-50">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800" class="w-full h-40 object-cover">
            <div class="p-5 flex justify-between items-center">
                <div>
                    <h3 class="font-bold text-lg">Kleo Special Pizza</h3>
                    <p class="text-blue-600 font-black">€9.50</p>
                </div>
                <button onclick="selectItem('Kleo Special Pizza', '9.50')" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold hover:bg-blue-600 hover:text-white transition-all">Add +</button>
            </div>
        </div>

        <div class="bg-white rounded-[24px] shadow-md overflow-hidden border border-gray-50">
            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800" class="w-full h-40 object-cover">
            <div class="p-5 flex justify-between items-center">
                <div>
                    <h3 class="font-bold text-lg">Kleo Smash Burger</h3>
                    <p class="text-blue-600 font-black">€8.90</p>
                </div>
                <button onclick="selectItem('Kleo Smash Burger', '8.90')" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold hover:bg-blue-600 hover:text-white transition-all">Add +</button>
            </div>
        </div>

        <div class="bg-white rounded-[24px] p-6 shadow-md border-2 border-blue-100">
            <h3 class="font-black text-gray-400 text-[10px] uppercase tracking-widest mb-4">Finalize Order</h3>
            
            <div id="orderPreview" class="mb-4 p-3 bg-blue-50 rounded-xl text-blue-700 font-bold text-sm hidden">
                Selected: <span id="selectedItemName">None</span>
            </div>

            <div class="space-y-3">
                <input id="userName" type="text" placeholder="Your Name" class="w-full bg-gray-50 rounded-xl px-4 py-3 border border-gray-100 focus:ring-2 focus:ring-blue-500 outline-none">
                <input id="userPhone" type="tel" placeholder="Phone Number" class="w-full bg-gray-50 rounded-xl px-4 py-3 border border-gray-100 focus:ring-2 focus:ring-blue-500 outline-none">
                <input id="userAddress" type="text" placeholder="Address in Maribor" class="w-full bg-gray-50 rounded-xl px-4 py-3 border border-gray-100 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button onclick="sendToFirebase()" class="w-full mt-6 bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-100 active:scale-95 transition-all uppercase tracking-tighter">
                Send Order to Kitchen
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentSelection = "";

        function selectItem(name, price) {
            currentSelection = name;
            document.getElementById('orderPreview').classList.remove('hidden');
            document.getElementById('selectedItemName').innerText = name + " (€" + price + ")";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function sendToFirebase() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const addr = document.getElementById('userAddress').value;

            if (!currentSelection) { alert("Please select a Pizza or Burger first!"); return; }
            if (!name || !phone || !addr) { alert("We need your details to deliver!"); return; }

            db.ref('orders').push({
                item: currentSelection,
                customer: name,
                phone: phone,
                address: addr,
                time: new Date().toLocaleString(),
                status: 'New'
            }).then(() => {
                alert('🚀 DONE! WE KLEO is preparing your ' + currentSelection);
                location.reload(); // Refresh to clear
            });
        }
    </script>
</body>
</html>
