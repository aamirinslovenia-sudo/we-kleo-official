<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KLEO | CUSTOMER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f9fafb; color: #111827; }
        .onboarding-screen { position: fixed; inset: 0; background: #3b82f6; z-index: 2000; display: flex; flex-direction: column; padding: 40px; justify-content: center; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .food-item { background: white; border: 1px solid #eee; border-radius: 20px; padding: 20px; margin-bottom: 15px; transition: 0.3s; cursor: pointer; }
        .food-item.selected { border-color: #3b82f6; background: #eff6ff; transform: scale(0.98); }
        .pay-btn { border: 2px solid #eee; border-radius: 15px; padding: 15px; font-weight: 800; transition: 0.2s; }
        .pay-btn.active { border-color: #3b82f6; background: #eff6ff; color: #3b82f6; }
        .status-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #111827; color: white; border-radius: 20px; padding: 20px; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .hide-login { transform: translateY(-100%); opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="p-6 pb-32">

    <div id="onboarding" class="onboarding-screen">
        <h1 class="text-5xl font-[900] italic tracking-tighter text-white mb-2">KLEO.</h1>
        <p class="text-white/70 font-bold uppercase text-[10px] tracking-widest mb-10">Maribor Logistics</p>
        <div class="space-y-3">
            <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-4 rounded-xl border-none font-bold">
            <input type="email" id="reg-email" placeholder="Email" class="w-full p-4 rounded-xl border-none font-bold">
            <input type="tel" id="reg-phone" placeholder="Phone Number" class="w-full p-4 rounded-xl border-none font-bold">
            <input type="text" id="reg-address" placeholder="Delivery Address" class="w-full p-4 rounded-xl border-none font-bold">
            <button onclick="saveUser()" class="w-full bg-black text-white py-5 rounded-xl font-black text-lg mt-4 shadow-xl active:scale-95 transition-all">Start Ordering</button>
        </div>
    </div>

    <header class="mb-10 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-[900] italic tracking-tighter text-blue-600">KLEO</h1>
            <p id="display-address" class="text-[10px] font-black text-gray-400 uppercase tracking-widest mt-1">---</p>
        </div>
        <button onclick="logout()" class="text-xs font-black text-gray-300 uppercase underline">Logout</button>
    </header>

    <div class="space-y-4">
        <div id="item-1" onclick="selectItem('Bento Luxury Box', '14.50', 'item-1')" class="food-item shadow-sm flex justify-between items-center">
            <div>
                <h3 class="font-bold text-lg">Bento Luxury Box</h3>
                <p class="text-gray-500 text-xs">Luft 360° • Maribor</p>
            </div>
            <p class="font-black text-blue-600">€14.50</p>
        </div>

        <div id="item-2" onclick="selectItem('Pizza Ancora', '9.80', 'item-2')" class="food-item shadow-sm flex justify-between items-center">
            <div>
                <h3 class="font-bold text-lg">Pizza Ancora</h3>
                <p class="text-gray-500 text-xs">Classic Margherita</p>
            </div>
            <p class="font-black text-blue-600">€9.80</p>
        </div>
    </div>

    <div class="mt-10 pt-10 border-t border-gray-100">
        <p class="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-widest">Select Payment</p>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button id="pay-Cash" onclick="setPayment('Cash')" class="pay-btn">💵 Cash</button>
            <button id="pay-Card" onclick="setPayment('Card')" class="pay-btn">💳 Card</button>
        </div>
        <button onclick="placeOrder()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-200 active:scale-95 transition-all">Initiate Mission</button>
    </div>

    <div id="live-status" class="status-bar">
        <div class="flex justify-between items-center">
            <div>
                <p id="st-label" class="text-blue-400 text-[10px] font-black uppercase tracking-widest">Preparing</p>
                <h4 id="st-item" class="font-bold text-white">---</h4>
            </div>
            <div id="st-icon" class="text-2xl">👨‍🍳</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = JSON.parse(localStorage.getItem('kleo_user'));
        let selectedFood = null;
        let selectedPrice = null;
        let paymentMethod = null;

        if (user) {
            document.getElementById('onboarding').classList.add('hide-login');
            document.getElementById('display-address').innerText = user.address;
        }

        function saveUser() {
            const data = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                phone: document.getElementById('reg-phone').value,
                address: document.getElementById('reg-address').value
            };
            if(!data.name || !data.phone || !data.address) return alert("Fill all fields!");
            localStorage.setItem('kleo_user', JSON.stringify(data));
            user = data;
            document.getElementById('display-address').innerText = user.address;
            document.getElementById('onboarding').classList.add('hide-login');
        }

        function logout() { localStorage.removeItem('kleo_user'); location.reload(); }

        function selectItem(name, price, id) {
            selectedFood = name;
            selectedPrice = price;
            document.querySelectorAll('.food-item').forEach(i => i.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
        }

        function setPayment(method) {
            paymentMethod = method;
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('pay-' + method).classList.add('active');
        }

        function placeOrder() {
            if(!selectedFood || !paymentMethod) return alert("Select Food & Payment!");
            const ref = db.ref('orders').push();
            ref.set({
                customer: user.name,
                phone: user.phone,
                address: user.address,
                item: selectedFood,
                totalPrice: "€" + selectedPrice,
                paymentType: paymentMethod,
                status: "Preparing",
                timestamp: Date.now()
            });
            document.getElementById('live-status').style.display = 'block';
            track(ref.key);
        }

        function track(id) {
            db.ref('orders/' + id).on('value', snap => {
                const o = snap.val();
                document.getElementById('st-item').innerText = o.item;
                const label = document.getElementById('st-label');
                const icon = document.getElementById('st-icon');
                
                if(o.status === "Preparing") { label.innerText = "👨‍🍳 Preparing"; }
                if(o.status === "Ready") { label.innerText = "🛍️ Ready for Pickup"; }
                if(o.status === "Delivering") { label.innerText = "🛵 Driver on way"; icon.innerText = "🛵"; }
                if(o.status === "Completed") { 
                    label.innerText = "✅ Delivered!"; 
                    label.className = "text-green-400 text-[10px] font-black uppercase tracking-widest";
                    icon.innerText = "🍽️";
                }
            });
        }
    </script>
</body>
</html>
