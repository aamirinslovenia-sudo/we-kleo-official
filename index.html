<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WE KLEO | Maribor Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#f3f4f5] pb-24 font-sans">
    
    <div class="bg-white px-4 py-3 border-b border-gray-100 flex items-center justify-between sticky top-0 z-50">
        <div>
            <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Delivery from</p>
            <h2 class="text-sm font-black italic text-gray-800">WE KLEO Maribor</h2>
        </div>
    </div>

    <div class="px-4 mt-6 max-w-md mx-auto">
        <div class="bg-white rounded-[32px] shadow-lg overflow-hidden border border-gray-50">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800" class="w-full h-52 object-cover">
            
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-black italic text-blue-600">Kleo Pizza</h2>
                    <span class="text-xl font-black text-gray-900">€9.50</span>
                </div>

                <div class="space-y-3 mb-6">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Delivery Details</p>
                    <input id="userName" type="text" placeholder="Your Name" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input id="userPhone" type="tel" placeholder="Phone Number" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input id="userAddress" type="text" placeholder="Full Delivery Address" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <button onclick="placeOrder('Kleo Pizza')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-200 active:scale-95 transition-all text-center uppercase tracking-widest text-sm">
                    Place Order
                </button>
            </div>
        </div>
    </div>

    <script>
        // YOUR FIREBASE CONFIG
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function placeOrder(itemName) {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const address = document.getElementById('userAddress').value;

            // Simple check to make sure they filled the info
            if (!name || !phone || !address) {
                alert('Please fill in your name, phone, and address!');
                return;
            }

            db.ref('orders').push({
                item: itemName,
                customer: name,
                phone: phone,
                address: address,
                time: new Date().toLocaleString(),
                status: 'New'
            }).then(() => {
                alert('🚀 Thanks ' + name + '! Your order is on the way!');
                // Clear the form
                document.getElementById('userName').value = "";
                document.getElementById('userPhone').value = "";
                document.getElementById('userAddress').value = "";
            });
        }
    </script>
</body>
</html>
