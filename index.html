<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLEO | MAIN COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; }
        .stat-card { background: white; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .order-row { transition: all 0.3s ease; }
        .order-row:hover { background-color: #f8fafc; transform: scale(1.01); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-end mb-12">
            <div>
                <h1 class="text-5xl font-black text-slate-900 italic tracking-tighter">KLEO<span class="text-blue-600">HUB</span></h1>
                <p class="text-slate-400 font-bold uppercase text-[10px] tracking-[0.4em]">Global Logistics Control</p>
            </div>
            <div class="flex gap-4">
                <div class="stat-card px-8 py-4 text-center">
                    <p id="total-revenue" class="text-3xl font-black text-slate-900">€0.00</p>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Total Revenue</p>
                </div>
                <div class="stat-card px-8 py-4 text-center border-l-4 border-l-blue-600">
                    <p id="active-orders-count" class="text-3xl font-black text-blue-600">0</p>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Active Tasks</p>
                </div>
            </div>
        </header>

        <main class="grid grid-cols-1 gap-8">
            <div class="stat-card p-8">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-xl font-black uppercase italic text-slate-800">Mission Registry</h2>
                    <span class="bg-green-100 text-green-600 text-[10px] font-black px-4 py-1 rounded-full uppercase">Live Database</span>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] font-black uppercase text-slate-400 border-b border-slate-100">
                                <th class="pb-4 px-4">Client</th>
                                <th class="pb-4 px-4">Destination</th>
                                <th class="pb-4 px-4">Status</th>
                                <th class="pb-4 px-4 text-right">Value</th>
                                <th class="pb-4 px-4 text-center">Control</th>
                            </tr>
                        </thead>
                        <tbody id="order-table-body" class="text-sm font-bold text-slate-600">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "we-kleo.firebaseapp.com", 
            databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "we-kleo", 
            storageBucket: "we-kleo.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('orders').on('value', (snap) => {
            const tbody = document.getElementById('order-table-body');
            tbody.innerHTML = "";
            let revenue = 0;
            let activeCount = 0;

            snap.forEach(child => {
                const o = child.val();
                const id = child.key;
                
                // Revenue calculated only for completed orders
                if (o.status === "Completed") revenue += 4;
                if (o.status !== "Completed") activeCount++;

                const statusColors = {
                    "Pending": "bg-amber-100 text-amber-600",
                    "New": "bg-green-100 text-green-600",
                    "Ready": "bg-blue-100 text-blue-600",
                    "Delivering": "bg-indigo-600 text-white animate-pulse",
                    "Completed": "bg-slate-100 text-slate-400"
                };

                tbody.insertAdjacentHTML('afterbegin', `
                    <tr class="order-row border-b border-slate-50">
                        <td class="py-6 px-4">
                            <p class="text-slate-900 font-black uppercase text-base">${o.customer || 'Unnamed'}</p>
                            <p class="text-[10px] text-slate-400">${o.phone || 'No Phone'}</p>
                        </td>
                        <td class="py-6 px-4">
                            <p class="text-xs uppercase font-bold text-slate-500 max-w-[200px] truncate">${o.address || 'No Address'}</p>
                        </td>
                        <td class="py-6 px-4">
                            <span class="px-4 py-2 rounded-xl text-[10px] font-black uppercase ${statusColors[o.status] || 'bg-slate-100'}">
                                ${o.status || 'Unknown'}
                            </span>
                        </td>
                        <td class="py-6 px-4 text-right font-black text-slate-900">€4.00</td>
                        <td class="py-6 px-4 text-center">
                            <button onclick="deleteOrder('${id}')" class="text-slate-300 hover:text-red-500 transition-colors font-bold text-lg">✕</button>
                        </td>
                    </tr>
                `);
            });

            document.getElementById('total-revenue').innerText = "€" + revenue.toFixed(2);
            document.getElementById('active-orders-count').innerText = activeCount;
        });

        function deleteOrder(id) {
            if(confirm("Permanently remove this order from the registry?")) {
                db.ref('orders/' + id).remove();
            }
        }
    </script>
</body>
</html>
