<script>
const firebaseConfig = { 
    apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
    authDomain: "we-kleo.firebaseapp.com", 
    databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", 
    projectId: "we-kleo", 
    storageBucket: "we-kleo.firebasestorage.app", 
    messagingSenderId: "87105321281", 
    appId: "1:87105321281:web:ec83e4472e5756182749c0" 
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let selectedItemName = "";
let basePrice = 0;
let selectedRestaurant = "";
let selectedPayment = "";
let emailSent = false;

const deliveryFee = 2.5;

// LOAD USER
window.onload = function() {
    if (localStorage.getItem('kleo_name')) {
        document.getElementById('onboarding-screen').style.display = 'none';
        document.getElementById('header-addr').innerText = localStorage.getItem('kleo_address');
    }
};

// ONBOARDING
function handleGateway() {
    const fields = document.getElementById('setup-fields');
    const btn = document.getElementById('gate-btn');

    if(fields.classList.contains('hidden')) {
        fields.classList.remove('hidden');
        btn.innerText = "Complete Profile";
        return;
    }

    const name = document.getElementById('userName').value.trim();
    const email = document.getElementById('userEmail').value.trim();
    const phone = document.getElementById('userPhone').value.trim();
    const addr = document.getElementById('userAddress').value.trim();

    if (!name || !email || !phone || !addr) {
        alert("Please fill all fields!");
        return;
    }

    if (!email.includes("@")) {
        alert("Enter valid email!");
        return;
    }

    if (phone.length < 7) {
        alert("Enter valid phone number!");
        return;
    }

    localStorage.setItem('kleo_name', name);
    localStorage.setItem('kleo_email', email);
    localStorage.setItem('kleo_phone', phone);
    localStorage.setItem('kleo_address', addr);

    document.getElementById('onboarding-screen').style.transform = 'translateY(-100%)';
    document.getElementById('header-addr').innerText = addr;
}

// SELECT ITEM
function selectItem(name, price, id, restaurant) {
    selectedItemName = name;
    basePrice = price;
    selectedRestaurant = restaurant;

    document.querySelectorAll('[id^="item-"]').forEach(el => el.classList.remove('active-item'));
    document.getElementById(id).classList.add('active-item');

    updateTotal();

    document.getElementById('orderBtn').innerText = "Order from " + restaurant;

    localStorage.setItem('last_item', name);
}

// TOTAL PRICE
function updateTotal() {
    if (!basePrice) return;
    const total = basePrice + deliveryFee;
    document.getElementById('priceDisplay').innerText = "€" + total.toFixed(2);
}

// PAYMENT
function setPayment(method) {
    selectedPayment = method;

    document.getElementById('pay-cash').classList.remove('active-item');
    document.getElementById('pay-card').classList.remove('active-item');

    if(method === 'Cash') {
        document.getElementById('pay-cash').classList.add('active-item');
    } else {
        document.getElementById('pay-card').classList.add('active-item');
    }
}

// DELIVERY TIME
function getDeliveryTime() {
    if (selectedRestaurant === "LUFT") return "~30 MIN";
    if (selectedRestaurant === "Ancora") return "~20 MIN";
    return "~25 MIN";
}

// SEND ORDER
function sendOrder() {
    if (!selectedItemName) {
        alert("Select a dish first!");
        return;
    }

    if (!selectedPayment) {
        alert("Please select Cash or Card!");
        return;
    }

    // Anti-spam
    const lastOrderTime = localStorage.getItem('lastOrderTime');
    const now = Date.now();

    if (lastOrderTime && now - lastOrderTime < 30000) {
        alert("Please wait before placing another order!");
        return;
    }

    localStorage.setItem('lastOrderTime', now);

    const btn = document.getElementById('orderBtn');
    btn.innerText = "Processing...";
    btn.disabled = true;

    const orderId = db.ref('orders').push().key;

    db.ref('orders/' + orderId).set({
        customer: localStorage.getItem('kleo_name'),
        email: localStorage.getItem('kleo_email'),
        address: localStorage.getItem('kleo_address'),
        phone: localStorage.getItem('kleo_phone'),
        item: selectedItemName,
        restaurant: selectedRestaurant,
        basePrice: basePrice,
        deliveryFee: deliveryFee,
        totalPrice: basePrice + deliveryFee,
        paymentType: selectedPayment,
        timestamp: Date.now(),
        status: 'New'
    }).then(() => {
        btn.innerText = "Order Sent!";
        startTracking(orderId);
    }).catch(() => {
        btn.innerText = "Try Again";
        btn.disabled = false;
    });
}

// TRACKING
function startTracking(orderId) {
    document.getElementById('order-tracking-overlay').style.display = 'flex';
    document.getElementById('tracking-id').innerText = "ID: " + orderId;

    // Update delivery time
    document.querySelector('.glass h3').innerText = getDeliveryTime();

    db.ref('orders/' + orderId).on('value', (snap) => {
        const o = snap.val();
        if(!o) return;

        const dot1 = document.getElementById('step-new');
        const dot2 = document.getElementById('step-kitchen');
        const dot3 = document.getElementById('step-delivery');
        const text2 = document.getElementById('text-kitchen');
        const text3 = document.getElementById('text-delivery');

        if (o.status === "New") {
            dot1.classList.add('active');
        }

        if (o.status === "Preparing") {
            dot1.classList.add('active');
            dot2.classList.add('active');
            text2.classList.replace('text-slate-500', 'text-blue-500');
        }

        if (o.status === "Delivering") {
            dot1.classList.add('active');
            dot2.classList.add('active');
            dot3.classList.add('active');

            text2.classList.replace('text-slate-500', 'text-blue-500');
            text3.classList.replace('text-slate-500', 'text-blue-500');
        }

        if(o.status === "Completed" && !emailSent) {
            emailSent = true;

            emailjs.send("service_i0905hd", "template_5gwvu9l", {
                to_name: o.customer,
                to_email: o.email,
                item_name: o.item + " (" + o.restaurant + ")",
                total_price: "€" + o.totalPrice,
                delivery_address: o.address
            }).then(() => {
                document.getElementById('success-email-text').innerText = "Receipt sent to " + o.email;
                document.getElementById('success-msg').style.display = 'flex';
            });
        }
    });
}

// LOGOUT
function resetUser() {
    if(confirm("Logout?")) {
        localStorage.clear();
        location.reload();
    }
}
</script>
