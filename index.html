<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLEO | MY ORDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Outfit', sans-serif; }
        .step { opacity: 0.2; transition: 0.5s; }
        .step-active { opacity: 1; transform: scale(1.05); }
        .progress-line { width: 2px; height: 40px; background: #222; margin-left: 14px; }
        .line-active { background: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #222; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .dot-active { border-color: #3b82f6; background: #3b82f6; color: white; box-shadow: 0 0 20px rgba(59,130,246,0.5); }
    </style>
</head>
<body class="p-8">

    <header class="mb-12">
        <h1 class="text-3xl font-black italic">ORDER <span class="text-blue-500">TRACKER</span></h1>
        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-1">Order ID: <span id="displayID">#----</span></p>
    </header>

    <div id="tracker" class="space-y-0">
        <div id="s-Placed" class="step flex items-center gap-6">
            <div class="dot" id="d-Placed">1</div>
            <div><p class="font-black italic text-lg uppercase">Order Placed</p><p class="text-xs text-slate-500">Waiting for restaurant...</p></div>
        </div>
        <div class="progress-line" id="l-Placed"></div>

        <div id="s-Preparing" class="step flex items-center gap-6">
            <div class="dot" id="d-Preparing">2</div>
            <div><p class="font-black italic text-lg uppercase">Preparing Food</p><p class="text-xs text-slate-500">Chef is working on your meal</p></div>
        </div>
        <div class="progress-line" id="l-Preparing"></div>

        <div id="s-Ready" class="step flex items-center gap-6">
            <div class="dot" id="d-Ready">3</div>
            <div><p class="font-black italic text-lg uppercase">Ready for Pickup</p><p class="text-xs text-slate-500">Waiting for a courier</p></div>
        </div>
        <div class="progress-line" id="l-Ready"></div>

        <div id="s-Delivering" class="step flex items-center gap-6">
            <div class="dot" id="d-Delivering">4</div>
            <div><p class="font-black italic text-lg uppercase">Out for Delivery</p><p class="text-xs text-slate-500">Courier is on the way</p></div>
        </div>
    </div>

    <div id="order-details" class="mt-16 pt-8 border-t border-white/10">
        <h2 id="item-name" class="text-4xl font-black italic uppercase mb-2">---</h2>
        <p id="item-price" class="text-blue-500 font-bold text-xl">€0.00</p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // For this demo, we fetch the LAST order placed. 
        // In a real app, you would save the ID in 'localStorage' after checkout.
        db.ref('orders').limitToLast(1).on('value', (snap) => {
            snap.forEach(child => {
                const o = child.val();
                document.getElementById('displayID').innerText = "#" + child.key.substring(0,6).toUpperCase();
                document.getElementById('item-name').innerText = o.item;
                document.getElementById('item-price').innerText = o.totalPrice;
                
                updateUI(o.status);
            });
        });

        function updateUI(status) {
            // Reset all
            document.querySelectorAll('.step').forEach(s => s.classList.remove('step-active'));
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('dot-active'));
            document.querySelectorAll('.progress-line').forEach(l => l.classList.remove('line-active'));

            const stages = ["Placed", "Preparing", "Ready", "Delivering", "Completed"];
            const currentIdx = stages.indexOf(status);

            stages.forEach((s, idx) => {
                if (idx <= currentIdx) {
                    const stepEl = document.getElementById('s-' + s);
                    const dotEl = document.getElementById('d-' + s);
                    const lineEl = document.getElementById('l-' + s);

                    if(stepEl) stepEl.classList.add('step-active');
                    if(dotEl) dotEl.classList.add('dot-active');
                    if(lineEl) lineEl.classList.add('line-active');
                    
                    if(s === "Completed") {
                        alert("Food Delivered! Enjoy your meal.");
                        window.location.reload(); // Reset for next order
                    }
                }
            });
        }
    </script>
</body>
</html>
