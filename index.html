<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KLEO | Premium Ordering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #0f172a; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); }
        .payment-sheet { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: white; border-radius: 32px 32px 0 0;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            z-index: 2000; box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        .payment-sheet.active { transform: translateY(0); }
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
            opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1500;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .method-card { border: 2px solid #f1f5f9; transition: 0.2s; cursor: pointer; }
        .method-card.selected { border-color: #3b82f6; background: #eff6ff; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center bg-white">
        <div>
            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Deliver to</p>
            <h1 class="text-sm font-extrabold flex items-center gap-1">Slovenska ulica 15 <span class="text-blue-500">▼</span></h1>
        </div>
        <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center">👤</div>
    </header>

    <main class="p-6 space-y-6">
        <h2 class="text-3xl font-black tracking-tighter italic">KLEO <span class="text-blue-500">MENU</span></h2>
        
        <div class="bg-white rounded-[32px] p-2 shadow-sm border border-slate-100 overflow-hidden">
            <div class="h-48 bg-slate-200 rounded-[28px] mb-4 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" class="w-full h-full object-cover" alt="Burger">
            </div>
            <div class="px-4 pb-4">
                <div class="flex justify-between items-center mb-1">
                    <h3 class="font-bold text-lg">Classic Beef Burger</h3>
                    <span class="font-black text-blue-600">€8.50</span>
                </div>
                <p class="text-slate-500 text-xs mb-4">100% Angus beef, cheddar, special KLEO sauce.</p>
                <button onclick="openCheckout()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all">Add to Order</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-20 glass-nav flex justify-around items-center px-8 z-[1000]">
        <button class="flex flex-col items-center gap-1 text-blue-500"><span class="text-xl">🏠</span><span class="text-[10px] font-bold">Discovery</span></button>
        <button class="flex flex-col items-center gap-1 text-slate-400"><span class="text-xl">🔍</span><span class="text-[10px] font-bold">Search</span></button>
        <button class="flex flex-col items-center gap-1 text-slate-400"><span class="text-xl">📄</span><span class="text-[10px] font-bold">Orders</span></button>
    </nav>

    <div id="overlay" class="overlay" onclick="closeCheckout()"></div>

    <div id="payment-sheet" class="payment-sheet p-8 pb-12">
        <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-8"></div>
        <h3 class="text-2xl font-black mb-6 tracking-tight">Payment Method</h3>
        
        <div class="space-y-3 mb-8">
            <div class="method-card p-5 rounded-2xl flex justify-between items-center" onclick="selectMethod(this, 'apple')">
                <div class="flex items-center gap-4">
                    <span class="text-2xl">🍎</span>
                    <span class="font-bold">Apple Pay</span>
                </div>
                <div class="w-5 h-5 rounded-full border-2 border-slate-200"></div>
            </div>

            <div class="method-card p-5 rounded-2xl flex justify-between items-center" onclick="selectMethod(this, 'card')">
                <div class="flex items-center gap-4">
                    <span class="text-2xl">💳</span>
                    <span class="font-bold">Credit or Debit Card</span>
                </div>
                <div class="w-5 h-5 rounded-full border-2 border-slate-200"></div>
            </div>

            <div class="method-card p-5 rounded-2xl flex justify-between items-center selected" onclick="selectMethod(this, 'cash')">
                <div class="flex items-center gap-4">
                    <span class="text-2xl">💶</span>
                    <span class="font-bold">Cash on Delivery</span>
                </div>
                <div id="check" class="w-5 h-5 rounded-full bg-blue-500 flex items-center justify-center text-[10px] text-white">✓</div>
            </div>
        </div>

        <button onclick="confirmOrder()" class="w-full bg-blue-600 text-white py-5 rounded-[24px] font-black text-lg shadow-xl shadow-blue-200">Place Order • €8.50</button>
    </div>

    <script>
        let selectedMethod = 'cash';

        function openCheckout() {
            document.getElementById('payment-sheet').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeCheckout() {
            document.getElementById('payment-sheet').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function selectMethod(el, method) {
            selectedMethod = method;
            // Clear selections
            document.querySelectorAll('.method-card').forEach(c => {
                c.classList.remove('selected');
                c.querySelector('div:last-child').innerHTML = '';
                c.querySelector('div:last-child').className = 'w-5 h-5 rounded-full border-2 border-slate-200';
            });
            // Apply new selection
            el.classList.add('selected');
            const check = el.querySelector('div:last-child');
            check.className = 'w-5 h-5 rounded-full bg-blue-500 flex items-center justify-center text-[10px] text-white';
            check.innerHTML = '✓';
        }

        function confirmOrder() {
            if(selectedMethod === 'card' || selectedMethod === 'apple') {
                alert("Stripe Integration Required for " + selectedMethod);
            } else {
                alert("Order Placed! (Cash Delivery)");
                closeCheckout();
            }
        }
    </script>
</body>
</html>
