<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WE KLEO | Maribor Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50 pb-32">
    <div class="bg-white p-6 border-b border-gray-100 sticky top-0 z-50">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-tighter">WE KLEO</h1>
            <div class="bg-blue-50 px-3 py-1 rounded-full text-blue-600 text-[10px] font-bold">MARIBOR</div>
        </div>
    </div>

    <div class="p-4">
        <div class="bg-white rounded-[24px] shadow-sm overflow-hidden border border-gray-100">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=800&q=80" class="w-full h-48 object-cover">
            <div class="p-6">
                <h2 class="text-xl font-bold">Margherita Speciale</h2>
                <p class="text-gray-400 text-xs mt-1">Mozzarella di bufala, fresh basil, olive oil</p>
                <div class="flex justify-between items-center mt-6">
                    <span class="text-2xl font-black text-blue-600">€9.50</span>
                    <button onclick="placeOrder('Margherita Speciale')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-blue-200">Order Now</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR SAME FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "PASTE_HERE",
            authDomain: "PASTE_HERE",
            databaseURL: "PASTE_HERE",
            projectId: "PASTE_HERE",
            storageBucket: "PASTE_HERE",
            messagingSenderId: "PASTE_HERE",
            appId: "PASTE_HERE"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function placeOrder(itemName) {
            const orderData = {
                item: itemName,
                address: "Maistrova ulica 24, Maribor",
                status: "Pending",
                timestamp: Date.now()
            };
            
            db.ref('orders').push(orderData).then(() => {
                alert("Pizza Ordered! WE KLEO Kitchen is notified.");
            });
        }
    </script>
</body>
</html>
