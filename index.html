<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WE KLEO | Premium Ordering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #060a11; color: white; }
        @keyframes text-shimmer {
            0%, 100% { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
            50% { color: #60a5fa; text-shadow: 0 0 25px rgba(96, 165, 250, 0.6); }
        }
        .we-kleo-title { animation: text-shimmer 3s infinite; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .active-item { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.1) !important; transform: scale(1.05); }
    </style>
</head>
<body class="pb-32">
    
    <div class="flex flex-col items-center pt-12 pb-8 border-b border-slate-900 mb-8">
        <h1 class="text-5xl font-[900] italic tracking-tighter uppercase we-kleo-title">WE KLEO</h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-2">Premium Delivery Maribor</p>
    </div>

    <div class="max-w-md mx-auto px-6 space-y-10">
        
        <section>
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 ml-2">Choose Your Base</h2>
            <div class="grid grid-cols-2 gap-5">
                <div id="card-Pizza" onclick="selectItem('Kleo Pizza', 9.50, 'Pizza')" class="glass p-6 rounded-[32px] text-center transition-all cursor-pointer">
                    <span class="text-3xl block mb-2">🍕</span>
                    <p class="font-bold text-sm">Pizza</p>
                    <p class="text-blue-400 font-black text-xs">€9.50</p>
                </div>
                <div id="card-Burger" onclick="selectItem('Kleo Burger', 8.90, 'Burger')" class="glass p-6 rounded-[32px] text-center transition-all cursor-pointer">
                    <span class="text-3xl block mb-2">🍔</span>
                    <p class="font-bold text-sm">Burger</p>
                    <p class="text-blue-400 font-black text-xs">€8.90</p>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 ml-2">Add Extra Flavor (+€1.00)</h2>
            <div class="space-y-3">
                <label class="glass flex items-center justify-between p-5 rounded-3xl cursor-pointer active:bg-white/5 transition-colors">
                    <span class="font-bold text-sm">🧀 Extra Cheese</span>
                    <input type="checkbox" class="w-6 h-6 accent-blue-500" onchange="updateTotal()" value="Extra Cheese">
                </label>
                <label class="glass flex items-center justify-between p-5 rounded-3xl cursor-pointer active:bg-white/5 transition-colors">
                    <span class="font-bold text-sm">🌶️ Hot Peppers</span>
                    <input type="checkbox" class="w-6 h-6 accent-blue-500" onchange="updateTotal()" value="Jalapeños">
                </label>
            </div>
        </section>

        <section class="bg-blue-600 rounded-[45px] p-8 shadow-2xl shadow-blue-900/40 relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <p class="text-[10px] font-black uppercase tracking-widest text-blue-200 opacity-70">Total Order</p>
                        <h3 id="priceDisplay" class="text-4xl font-[900] italic tracking-tighter">€0.00</h3>
                    </div>
                    <button onclick="clearSavedData()" class="text-[9px] font-black uppercase bg-blue-700/50 px-3 py-1 rounded-full border border-blue-400/30">Change Info</button>
                </div>

                <div id="dataForm" class="space-y-3 mb-8">
                    <input id="userName" type="text" placeholder="Full Name" class="w-full bg-white/10 rounded-2xl px-5 py-4 border border-white/10 placeholder:text-blue-200 outline-none focus:bg-white/20 font-bold transition-all">
                    <input id="userPhone" type="tel" placeholder="Phone Number" class="w-full bg-white/10 rounded-2xl px-5 py-4 border border-white/10 placeholder:text-blue-200 outline-none focus:bg-white/20 font-bold transition-all">
                    <input id="userAddress" type="text" placeholder="Delivery Address" class="w-full bg-white/10 rounded-2xl px-5 py-4 border border-white/10 placeholder:text-blue-200 outline-none focus:bg-white/20 font-bold transition-all">
                </div>

                <div id="welcomeBack" class="hidden mb-8 p-5 bg-white/10 rounded-[30px] border border-white/10">
                    <p class="text-[10px] uppercase font-bold text-blue-200 mb-1">Delivering To:</p>
                    <p id="savedDetail" class="text-lg font-black italic leading-tight"></p>
                </div>

                <button onclick="sendOrder()" class="w-full bg-white text-blue-600 font-[900] py-5 rounded-[28px] text-lg shadow-xl active:scale-95 transition-all uppercase italic tracking-tighter">
                    Confirm Order
                </button>
            </div>
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-blue-500 rounded-full blur-3xl opacity-30"></div>
        </section>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedItem = "";
        let basePrice = 0;

        window.onload = function() {
            const savedName = localStorage.getItem('kleo_name');
            const savedAddr = localStorage.getItem('kleo_address');
            if (savedName && savedAddr) {
                document.getElementById('userName').value = savedName;
                document.getElementById('userPhone').value = localStorage.getItem('kleo_phone');
                document.getElementById('userAddress').value = savedAddr;
                document.getElementById('dataForm').classList.add('hidden');
                document.getElementById('welcomeBack').classList.remove('hidden');
                document.getElementById('savedDetail').innerText = savedName + " • " + savedAddr;
            }
        };

        function clearSavedData() {
            document.getElementById('dataForm').classList.remove('hidden');
            document.getElementById('welcomeBack').classList.add('hidden');
        }

        function selectItem(name, price, id) {
            selectedItem = name;
            basePrice = price;
            document.querySelectorAll('.glass').forEach(el => el.classList.remove('active-item'));
            document.getElementById('card-' + id).classList.add('active-item');
            updateTotal();
        }

        function updateTotal() {
            let total = basePrice;
            const extras = document.querySelectorAll('input[type="checkbox"]:checked');
            total += extras.length * 1.00;
            document.getElementById('priceDisplay').innerText = "€" + total.toFixed(2);
        }

        function sendOrder() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const addr = document.getElementById('userAddress').value;
            const extras = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(el => el.value);

            if (!selectedItem || !name || !addr) { alert("Select food and fill details!"); return; }

            localStorage.setItem('kleo_name', name);
            localStorage.setItem('kleo_phone', phone);
            localStorage.setItem('kleo_address', addr);

            db.ref('orders').push({
                item: selectedItem,
                toppings: extras.join(", ") || "None",
                totalPrice: document.getElementById('priceDisplay').innerText,
                customer: name,
                phone: phone,
                address: addr,
                time: new Date().toLocaleString(),
                status: 'New'
            }).then(() => {
                alert('🚀 Your order is on its way to the kitchen!');
                location.reload();
            });
        }
    </script>
</body>
</html>
