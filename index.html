<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WE KLEO | Maribor Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#f3f4f5] pb-24 font-sans">
    
    <div class="bg-white px-4 py-3 border-b border-gray-100 flex items-center justify-between sticky top-0 z-50">
        <div>
            <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Delivery to</p>
            <h2 class="text-sm font-black italic">Maistrova ulica 24, Maribor ▼</h2>
        </div>
    </div>

    <div class="px-4 mt-6">
        <div class="bg-white rounded-[32px] shadow-lg overflow-hidden border border-gray-50">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800" class="w-full h-52 object-cover">
            <div class="p-6">
                <h2 class="text-2xl font-black italic text-blue-600">WE KLEO</h2>
                <p class="text-gray-500 text-sm mb-4">Fresh Wood-Fired Pizza</p>
                <div class="flex justify-between items-center">
                    <span class="text-2xl font-black text-gray-900">€9.50</span>
                    <button onclick="placeOrder('Kleo Pizza')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg shadow-blue-200 active:scale-95 transition-all">Order Now</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // THIS IS YOUR CORRECT CONFIG WITH THE DATABASE URL ADDED
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function placeOrder(itemName) {
            db.ref('orders').push({
                item: itemName,
                time: new Date().toLocaleString(),
                status: 'New'
            }).then(() => {
                alert('🚀 Order sent to WE KLEO! It is now in your database.');
            }).catch((error) => {
                alert('Error: Make sure you clicked "Enable" in Realtime Database!');
            });
        }
    </script>
</body>
</html>
