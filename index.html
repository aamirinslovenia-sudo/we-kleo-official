<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WE KLEO | MARIBOR</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("_yocJ8G-tQoBn2S80"); 
       })();
    </script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #060a11; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .we-kleo-title { animation: text-shimmer 3s infinite; }
        @keyframes text-shimmer {
            0%, 100% { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
            50% { color: #60a5fa; text-shadow: 0 0 25px rgba(96, 165, 250, 0.6); }
        }
        #onboarding-screen { 
            position: fixed; inset: 0; background: #060a11; z-index: 5000; 
            display: flex; flex-direction: column; justify-content: center; 
            padding: 40px; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
        }
        .input-box { 
            width: 100%; background: rgba(255,255,255,0.05); border-radius: 20px; 
            padding: 20px 24px; border: 1px solid rgba(255,255,255,0.1); 
            outline: none; transition: 0.3s; font-weight: 600; color: white;
        }
        .input-box:focus { border-color: #3b82f6; background: rgba(59,130,246,0.05); }
        .active-item { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.15) !important; transform: scale(1.02); }
        #order-tracking-overlay { position: fixed; inset: 0; background: #060a11; z-index: 2000; display: none; padding: 40px 24px; flex-direction: column; }
        .tracking-dot { width: 14px; height: 14px; border-radius: 50%; background: #1e293b; transition: 0.5s; }
        .tracking-dot.active { background: #3b82f6; box-shadow: 0 0 20px #3b82f6; }
    </style>
</head>
<body class="pb-10">

    <div id="onboarding-screen">
        <div class="mb-10 text-center">
            <h1 class="text-6xl font-[900] italic tracking-tighter uppercase we-kleo-title mb-4">WE KLEO</h1>
            <p class="text-slate-400 font-bold tracking-tight">Premium delivery <br>to your doorstep.</p>
        </div>
        <div id="setup-fields" class="space-y-3 mb-8 hidden">
            <input id="userName" type="text" placeholder="Full Name" class="input-box">
            <input id="userEmail" type="email" placeholder="Email (For Receipts)" class="input-box">
            <input id="userPhone" type="tel" placeholder="Phone Number" class="input-box">
            <input id="userAddress" type="text" placeholder="Address in Maribor" class="input-box">
        </div>
        <button id="gate-btn" onclick="handleGateway()" class="bg-white text-black font-black py-6 rounded-[30px] text-lg uppercase tracking-widest active:scale-95 transition-all shadow-2xl">Continue</button>
    </div>

    <header class="flex flex-col items-center pt-12 pb-6 border-b border-white/5 mb-8">
        <h1 class="text-4xl font-[900] italic tracking-tighter uppercase we-kleo-title">WE KLEO</h1>
        <div class="flex items-center gap-2 mt-2 glass px-4 py-1.5 rounded-full">
            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
            <p id="header-addr" class="text-[9px] font-black text-slate-400 uppercase tracking-widest"></p>
        </div>
    </header>

    <div class="max-w-md mx-auto px-6 space-y-10">
        <section>
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-5 ml-1">Selection</h2>
            <div class="grid grid-cols-2 gap-4">
                <div id="card-Pizza" onclick="selectItem('Kleo Pizza', 9.50, 'Pizza')" class="glass p-7 rounded-[35px] text-center transition-all cursor-pointer border border-white/5">
                    <span class="text-4xl block mb-3">🍕</span><p class="font-bold text-sm uppercase">Pizza</p><p class="text-blue-400 font-black text-xs">€9.50</p>
                </div>
                <div id="card-Burger" onclick="selectItem('Kleo Burger', 8.90, 'Burger')" class="glass p-7 rounded-[35px] text-center transition-all cursor-pointer border border-white/5">
                    <span class="text-4xl block mb-3">🍔</span><p class="font-bold text-sm uppercase">Burger</p><p class="text-blue-400 font-black text-xs">€8.90</p>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-5 ml-1">Extra Flavor (+€1.00)</h2>
            <div class="space-y-3">
                <label class="glass flex items-center justify-between p-6 rounded-[28px] cursor-pointer"><span class="font-bold text-sm">🧀 Extra Cheese</span><input type="checkbox" class="w-6 h-6 accent-blue-500" onchange="updateTotal()" value="Extra Cheese"></label>
                <label class="glass flex items-center justify-between p-6 rounded-[28px] cursor-pointer"><span class="font-bold text-sm">🌶️ Hot Peppers</span><input type="checkbox" class="w-6 h-6 accent-blue-500" onchange="updateTotal()" value="Jalapeños"></label>
            </div>
        </section>

        <div class="pt-4">
            <div class="flex justify-between items-end mb-8 px-2">
                <div><p class="text-[10px] font-black uppercase text-slate-500 mb-1">Total Mission Cost</p><h3 id="priceDisplay" class="text-5xl font-[900] italic tracking-tighter text-white">€0.00</h3></div>
                <button onclick="resetUser()" class="text-[9px] font-bold text-slate-600 uppercase underline tracking-widest">Logout</button>
            </div>
            <button onclick="sendOrder()" class="w-full bg-blue-600 text-white font-[900] py-7 rounded-[32px] text-xl shadow-2xl shadow-blue-900/40 active:scale-95 transition-all uppercase italic tracking-tighter">Confirm & Pay</button>
        </div>
    </div>

    <div id="order-tracking-overlay">
        <h2 class="text-4xl font-black italic tracking-tighter mb-2">MISSION <span class="text-blue-500">TRACKER</span></h2>
        <p id="tracking-id" class="text-[10px] font-mono text-slate-500 uppercase mb-12">REF: ---</p>
        <div class="space-y-12 relative">
            <div class="absolute left-[6px] top-2 bottom-2 w-[2px] bg-white/5"></div>
            <div class="flex gap-6 items-center"><div id="step-new" class="tracking-dot"></div><div><p class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Stage 1</p><h4 class="font-bold uppercase">Transmitted</h4></div></div>
            <div class="flex gap-6 items-center"><div id="step-kitchen" class="tracking-dot"></div><div><p id="text-kitchen" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Stage 2</p><h4 class="font-bold uppercase">Preparing</h4></div></div>
            <div class="flex gap-6 items-center"><div id="step-delivery" class="tracking-dot"></div><div><p id="text-delivery" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Stage 3</p><h4 class="font-bold uppercase">On the road</h4></div></div>
        </div>
        <div class="mt-auto glass p-8 text-center rounded-[35px]"><p class="text-[10px] text-slate-500 uppercase font-black mb-2 tracking-widest">KLEO Arrival</p><h3 class="text-4xl font-black">~20 MIN</h3></div>
        <button onclick="location.reload()" class="w-full mt-6 bg-white/5 py-5 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-400">Back to Store</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedItemName = ""; let basePrice = 0; let emailSent = false;

        window.onload = function() {
            if (localStorage.getItem('kleo_name')) {
                document.getElementById('onboarding-screen').style.display = 'none';
                document.getElementById('header-addr').innerText = localStorage.getItem('kleo_address');
            }
        };

        function handleGateway() {
            const fields = document.getElementById('setup-fields');
            const btn = document.getElementById('gate-btn');
            if(fields.classList.contains('hidden')) {
                fields.classList.remove('hidden'); btn.innerText = "Complete Profile";
            } else {
                const name = document.getElementById('userName').value;
                const email = document.getElementById('userEmail').value;
                const phone = document.getElementById('userPhone').value;
                const addr = document.getElementById('userAddress').value;
                if(!name || !email || !phone || !addr) { alert("Please fill all details!"); return; }
                localStorage.setItem('kleo_name', name);
                localStorage.setItem('kleo_email', email);
                localStorage.setItem('kleo_phone', phone);
                localStorage.setItem('kleo_address', addr);
                document.getElementById('onboarding-screen').style.transform = 'translateY(-100%)';
                document.getElementById('header-addr').innerText = addr;
            }
        }

        function selectItem(name, price, id) {
            selectedItemName = name; basePrice = price;
            document.querySelectorAll('#card-Pizza, #card-Burger').forEach(el => el.classList.remove('active-item'));
            document.getElementById('card-' + id).classList.add('active-item');
            updateTotal();
        }

        function updateTotal() {
            let total = basePrice;
            const extras = document.querySelectorAll('input[type="checkbox"]:checked');
            total += extras.length * 1.00;
            document.getElementById('priceDisplay').innerText = "€" + total.toFixed(2);
        }

        function sendOrder() {
            if (!selectedItemName) { alert("Select food first!"); return; }
            const extras = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(el => el.value);
            const orderId = db.ref('orders').push().key;
            db.ref('orders/' + orderId).set({
                customer: localStorage.getItem('kleo_name'),
                email: localStorage.getItem('kleo_email'),
                address: localStorage.getItem('kleo_address'),
                phone: localStorage.getItem('kleo_phone'),
                item: selectedItemName,
                toppings: extras.join(", ") || "None",
                totalPrice: document.getElementById('priceDisplay').innerText,
                timestamp: Date.now(),
                status: 'New'
            }).then(() => { startTracking(orderId); });
        }

        function startTracking(orderId) {
            document.getElementById('order-tracking-overlay').style.display = 'flex';
            document.getElementById('tracking-id').innerText = "ID: " + orderId;
            
            db.ref('orders/' + orderId).on('value', (snap) => {
                const o = snap.val(); if(!o) return;
                
                const dot1 = document.getElementById('step-new');
                const dot2 = document.getElementById('step-kitchen');
                const dot3 = document.getElementById('step-delivery');
                const text2 = document.getElementById('text-kitchen');
                const text3 = document.getElementById('text-delivery');

                // RESET VISUALS FOR CLEAN TRANSITIONS
                dot2.classList.remove('active');
                dot3.classList.remove('active');
                text2.classList.replace('text-blue-500', 'text-slate-500');
                text3.classList.replace('text-blue-500', 'text-slate-500');

                // STAGE 1: ALWAYS ON
                dot1.classList.add('active');

                // STAGE 2: ONLY IF "Preparing" OR HIGHER
                if (o.status === "Preparing" || o.status === "Ready" || o.status === "Delivering" || o.status === "Completed") {
                    dot2.classList.add('active');
                    text2.classList.replace('text-slate-500', 'text-blue-500');
                }
                
                // STAGE 3: ONLY IF "Ready", "Delivering", OR "Completed"
                if (o.status === "Ready" || o.status === "Delivering" || o.status === "Completed") {
                    dot3.classList.add('active');
                    text3.classList.replace('text-slate-500', 'text-blue-500');
                }

                // EMAIL & COMPLETION
                if(o.status === "Completed" && !emailSent) {
                    emailSent = true;
                    emailjs.send("service_i0905hd", "template_5gwvu9l", {
                        to_name: o.customer,
                        to_email: o.email,
                        item_name: o.item,
                        total_price: o.totalPrice,
                        delivery_address: o.address
                    }).then(() => {
                        alert("Mission Success! Your receipt has been sent to " + o.email);
                        location.reload();
                    });
                }
            });
        }
        function resetUser() { if(confirm("Clear profile data?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
