<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KLEO | KITCHEN COMMAND v4</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #000000; --card: #0a0a0a; --accent: #3b82f6; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background-color: var(--bg); color: white; }
        .top-nav { height: 80px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; background: var(--card); }
        .matrix-container { height: calc(100vh - 80px); display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); grid-auto-rows: 1fr; gap: 20px; padding: 20px; }
        .order-card { background: #111; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; padding: 25px; transition: all 0.3s ease; border-left: 8px solid var(--accent); }
        .card-warning { border-left-color: #f59e0b; background: linear-gradient(to right, rgba(245,158,11,0.05), transparent); }
        .card-urgent { border-left-color: #ef4444; animation: urgent-pulse 1.5s infinite; }
        @keyframes urgent-pulse { 0%, 100% { background: rgba(239, 68, 68, 0.05); } 50% { background: rgba(239, 68, 68, 0.15); } }
        .btn-dispatch { background: #fff; color: #000; font-weight: 900; text-transform: uppercase; border-radius: 16px; padding: 18px; font-size: 13px; margin-top: auto; transition: all 0.2s; }
        .driver-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-waiting { background: #10b981; } .dot-busy { background: #ef4444; }
        #history-sidebar { position: fixed; top: 0; right: 0; height: 100%; width: 420px; background: #080808; z-index: 2000; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .sidebar-open { transform: translateX(0) !important; }
        #historyList { flex: 1; overflow-y: auto; padding: 0 30px 100px 30px; }
        .qty-badge { background: #3b82f6; color: white; padding: 2px 8px; border-radius: 8px; font-size: 18px; margin-right: 10px; vertical-align: middle; }
    </style>
</head>
<body>

    <div id="sync-overlay" class="fixed inset-0 z-[3000] bg-black flex flex-col items-center justify-center text-center">
        <h1 class="text-7xl font-black italic tracking-tighter uppercase mb-4 text-white">WE KLEO</h1>
        <button onclick="startKitchen()" class="px-12 py-6 bg-blue-600 rounded-[20px] text-white font-black text-xl shadow-2xl uppercase italic">Start System</button>
    </div>

    <nav class="top-nav">
        <div class="flex items-center gap-10">
            <h1 class="text-3xl font-black italic tracking-tighter text-white">KLEO <span class="text-blue-500">KITCHEN</span></h1>
            <div id="driver-summary" class="flex gap-4 border-l border-white/10 pl-10"></div>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="glass px-4 py-2 rounded-xl border border-white/5 text-center">
                <p class="text-[8px] font-black text-slate-500 uppercase">Avg Prep</p>
                <p id="avg-prep" class="text-sm font-bold text-blue-400">--m</p>
            </div>
            <div class="text-right">
                <p id="clock" class="text-2xl font-black tabular-nums">00:00:00</p>
            </div>
            <button onclick="toggleHistory()" class="bg-white/5 border border-white/10 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">History</button>
        </div>
    </nav>

    <div id="orderList" class="matrix-container"></div>

    <div id="history-sidebar">
        <div class="p-10 flex justify-between items-center">
            <h2 class="text-2xl font-black italic uppercase text-blue-500">Production Log</h2>
            <button onclick="toggleHistory()" class="text-white text-3xl">✕</button>
        </div>
        <div id="historyList"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let audioCtx = null; let alarmInterval = null;

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('sl-SI');
            updateTimers();
        }, 1000);

        function startKitchen() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('sync-overlay').style.display = "none";
        }

        function playBell() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            [880, 1100].forEach((f, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, t + (i * 0.1));
                g.gain.setValueAtTime(0.05, t + (i * 0.1));
                g.gain.exponentialRampToValueAtTime(0.001, t + (i * 0.1) + 0.5);
                o.start(t + (i * 0.1)); o.stop(t + (i * 0.1) + 0.5);
            });
        }

        function toggleHistory() { document.getElementById('history-sidebar').classList.toggle('sidebar-open'); }

        db.ref('orders').on('value', (snap) => {
            const list = document.getElementById('orderList');
            const history = document.getElementById('historyList');
            const driverBox = document.getElementById('driver-summary');
            list.innerHTML = ""; history.innerHTML = "";
            let drivers = {}; let activeCount = 0; let prepTimes = [];

            snap.forEach((child) => {
                const o = child.val();
                if(o.claimedBy) drivers[o.claimedBy] = (o.status === "Delivering") ? "Busy" : "Waiting";
                if (o.status === "New") { activeCount++; renderOrder(child.key, o); }
                else { 
                    renderHistory(child.key, o); 
                    if(o.completedAt && o.timestamp) prepTimes.push((o.completedAt - o.timestamp) / 60000);
                }
            });

            // Improvement 3: Average Prep Time
            if(prepTimes.length > 0) {
                const avg = prepTimes.reduce((a,b) => a+b, 0) / prepTimes.length;
                document.getElementById('avg-prep').innerText = avg.toFixed(1) + "m";
            }

            driverBox.innerHTML = Object.keys(drivers).map(dId => `
                <div class="flex items-center text-[10px] font-bold uppercase tracking-tighter">
                    <span class="driver-dot ${drivers[dId] === 'Busy' ? 'dot-busy' : 'dot-waiting'}"></span>${dId}
                </div>
            `).join('') || '<span class="text-[10px] text-slate-600 font-bold uppercase">No Drivers Active</span>';

            if (activeCount > 0 && !alarmInterval) alarmInterval = setInterval(playBell, 5000);
            if (activeCount === 0) { clearInterval(alarmInterval); alarmInterval = null; }
        });

        function renderOrder(id, o) {
            const time = o.timestamp || Date.now();
            // Improvement 1: Grouping/Quantity Logic
            const qtyStr = o.quantity && o.quantity > 1 ? `<span class="qty-badge">${o.quantity}×</span>` : "";
            
            // Improvement 2: Driver Arrival Status
            const driverStatus = o.claimedBy ? 
                `<div class="bg-blue-500/10 text-blue-400 p-2 rounded-lg text-[9px] font-black uppercase mt-2">Driver ${o.claimedBy} is En Route</div>` : 
                `<div class="bg-white/5 text-slate-500 p-2 rounded-lg text-[9px] font-black uppercase mt-2 italic">Awaiting Courier...</div>`;

            const html = `
                <div id="card-${id}" data-time="${time}" class="order-card">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Active Task</span>
                        <span class="text-lg font-black text-white italic">${o.totalPrice}</span>
                    </div>
                    <h2 class="text-4xl font-black uppercase italic tracking-tighter mb-4 leading-none">${qtyStr}${o.item}</h2>
                    <div class="bg-black/40 p-4 rounded-xl border border-white/5 mb-4 flex-1">
                        <p class="text-[8px] font-black text-slate-600 uppercase mb-1">Kitchen Note</p>
                        <p class="text-sm italic text-slate-300 leading-tight">${o.toppings}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div><p class="text-[8px] font-black text-slate-600 uppercase mb-1">Prep Timer</p><p id="timer-${id}" class="text-3xl font-black tabular-nums leading-none">00:00</p></div>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-slate-600 uppercase mb-1">Customer Info</p>
                            <p class="text-xs font-bold truncate uppercase text-blue-400 leading-none">${o.customer}</p>
                            ${driverStatus}
                        </div>
                    </div>
                    <button onclick="setStatus('${id}', 'Ready')" class="btn-dispatch">Ready for Courier</button>
                </div>
            `;
            document.getElementById('orderList').insertAdjacentHTML('beforeend', html);
        }

        function updateTimers() {
            document.querySelectorAll('[id^="card-"]').forEach(card => {
                const id = card.id.replace('card-', '');
                const start = parseInt(card.getAttribute('data-time'));
                const elapsed = Math.floor((Date.now() - start) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                document.getElementById(`timer-${id}`).innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                if (mins >= 20) card.classList.add('card-urgent');
                else if (mins >= 10) card.classList.add('card-warning');
            });
        }

        function renderHistory(id, o) {
            const html = `
                <div class="bg-white/5 p-6 rounded-2xl border border-white/5 mb-4">
                    <div class="flex justify-between items-center mb-2"><p class="font-black italic uppercase text-white text-lg">${o.item}</p></div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase mb-4">${o.customer}</p>
                    <button onclick="setStatus('${id}', 'New')" class="text-blue-500 text-[9px] font-black uppercase tracking-widest">↩ Re-open</button>
                </div>
            `;
            document.getElementById('historyList').insertAdjacentHTML('afterbegin', html);
        }

        function setStatus(id, s) { 
            const updates = { status: s };
            if (s === 'Ready') updates.completedAt = Date.now();
            db.ref('orders/' + id).update(updates); 
        }
    </script>
</body>
</html>
