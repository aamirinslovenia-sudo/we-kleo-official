<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KLEO | KITCHEN DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #000; color: white; overflow-x: hidden; }
        .order-card { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 28px; 
            transition: all 0.3s ease;
        }
        .driver-accepted { 
            border: 2px solid #3b82f6; 
            background: rgba(59, 130, 246, 0.05);
        }
        .btn-ready { 
            background: #10b981; 
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); 
        }
        .btn-time { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .pulse-driver {
            animation: pulse-blue 2s infinite;
        }
        @keyframes pulse-blue {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter">KLEO <span class="text-blue-500">KITCHEN</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">Live Order Management</p>
        </div>
        <div id="conn-status" class="px-4 py-2 rounded-full bg-green-500/10 text-green-500 text-[10px] font-black uppercase tracking-widest border border-green-500/20">
            System Online
        </div>
    </div>

    <div id="orders-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "we-kleo.firebaseapp.com", 
            databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "we-kleo", 
            storageBucket: "we-kleo.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // LISTEN TO DATABASE
        db.ref('orders').on('value', (snap) => {
            const container = document.getElementById('orders-container');
            container.innerHTML = "";
            
            let hasOrders = false;
            snap.forEach(child => {
                const order = child.val();
                order.id = child.key;

                // CRITICAL LOGIC: 
                // We show the order if it is NOT marked as Food Ready yet.
                // Even if a driver accepts (status: Delivering), it stays on the screen.
                if (order.status !== "Completed" && order.isFoodReady !== true) {
                    renderOrderCard(order);
                    hasOrders = true;
                }
            });

            if (!hasOrders) {
                container.innerHTML = `<div class="col-span-full py-20 text-center opacity-30 font-bold uppercase tracking-widest">No Active Orders</div>`;
            }
        });

        function renderOrderCard(o) {
            const container = document.getElementById('orders-container');
            
            // Driver Badge
            const driverBadge = o.claimedBy ? 
                `<div class="flex items-center gap-2 mb-4 pulse-driver">
                    <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                    <span class="text-[10px] font-black text-blue-500 uppercase">Driver ${o.claimedBy} Accepted</span>
                </div>` : "";

            const html = `
                <div class="order-card p-6 ${o.claimedBy ? 'driver-accepted' : ''}">
                    ${driverBadge}
                    
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-2xl font-black truncate pr-4">${o.customer}</h3>
                        <span class="text-blue-500 font-mono text-xs font-bold">#${o.id.slice(-4)}</span>
                    </div>
                    
                    <p class="text-slate-500 text-sm font-bold mb-6 truncate">${o.address}</p>
                    
                    <div class="space-y-4">
                        ${!o.readyTimestamp ? `
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Set Preparation Time</p>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="setTimer('${o.id}', 10)" class="btn-time py-4 rounded-2xl font-black text-lg hover:bg-white/20 transition-all">10M</button>
                                <button onclick="setTimer('${o.id}', 20)" class="btn-time py-4 rounded-2xl font-black text-lg hover:bg-white/20 transition-all">20M</button>
                            </div>
                        ` : `
                            <div class="bg-white/5 rounded-2xl p-4 text-center">
                                <p class="text-[9px] font-black text-slate-500 uppercase mb-1">Pick-Up In</p>
                                <div class="text-4xl font-black italic countdown" data-time="${o.readyTimestamp}">--:--</div>
                            </div>
                            <button onclick="markReady('${o.id}')" class="btn-ready w-full py-5 rounded-2xl font-black uppercase text-lg tracking-tighter hover:scale-[1.02] transition-all">
                                Mark Food Ready
                            </button>
                        `}
                    </div>
                </div>
            `;
            container.innerHTML += html;
        }

        // KITCHEN ACTIONS
        function setTimer(id, mins) {
            const readyTime = Date.now() + (mins * 60000);
            db.ref('orders/' + id).update({
                readyTimestamp: readyTime,
                status: "Preparing",
                isFoodReady: false // Reset state just in case
            });
        }

        function markReady(id) {
            // This button triggers the Driver App's "READY" status
            db.ref('orders/' + id).update({
                isFoodReady: true,
                status: "Ready", // Official status becomes Ready
                readyAt: Date.now()
            });
            // The order will now disappear from the Kitchen container because of the filter in line 67
        }

        // TIMER SYNC
        setInterval(() => {
            document.querySelectorAll('.countdown').forEach(el => {
                const target = parseInt(el.dataset.time);
                const diff = target - Date.now();
                const abs = Math.abs(diff);
                const mins = Math.floor(abs / 60000);
                const secs = Math.floor((abs % 60000) / 1000).toString().padStart(2, '0');
                
                el.innerText = (diff < 0 ? "-" : "") + mins + ":" + secs;
                if (diff < 0) el.classList.add('text-red-500');
                else el.classList.remove('text-red-500');
            });
        }, 1000);

        // Connection Monitor
        db.ref(".info/connected").on("value", (snap) => {
            const status = document.getElementById('conn-status');
            if (snap.val() === true) {
                status.innerText = "System Online";
                status.className = "px-4 py-2 rounded-full bg-green-500/10 text-green-500 text-[10px] font-black uppercase tracking-widest border border-green-500/20";
            } else {
                status.innerText = "System Offline";
                status.className = "px-4 py-2 rounded-full bg-red-500/10 text-red-500 text-[10px] font-black uppercase tracking-widest border border-red-500/20";
            }
        });
    </script>
</body>
</html>
