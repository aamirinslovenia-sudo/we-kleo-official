<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WE KLEO | KITCHEN COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #060a11; color: white; margin: 0; padding: 0; }
        
        .shimmer-text {
            color: #3b82f6;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.8);
            font-style: italic;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 400px;
        }

        .timer-badge {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-8" onclick="startAudio()">

    <div class="flex flex-col items-center justify-center mb-10 border-b border-white/5 pb-10">
        <h1 class="text-7xl font-[900] tracking-tighter uppercase shimmer-text">WE KLEO</h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.5em] mt-3">Kitchen Production Line</p>
    </div>

    <div id="order-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
        </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "we-kleo.firebaseapp.com", 
            databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "we-kleo", 
            storageBucket: "we-kleo.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let audioCtx = null;
        function startAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.frequency.value = 800;
            g.gain.value = 0.1;
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        // Live Timer calculation
        setInterval(() => {
            document.querySelectorAll('.live-timer').forEach(span => {
                const startTime = parseInt(span.dataset.start);
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const mins = Math.floor(diff / 60);
                const secs = diff % 60;
                span.innerText = `${mins}m ${secs}s`;
            });
        }, 1000);

        let lastCount = 0;
        let initialLoad = true;

        db.ref('orders').on('value', (snap) => {
            const grid = document.getElementById('order-grid');
            grid.innerHTML = "";
            let currentActive = 0;

            snap.forEach(child => {
                const o = child.val();
                // Showing everything except Completed orders
                if(o.status !== "Completed") {
                    currentActive++;
                    const timestamp = o.timestamp || Date.now();
                    
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="glass-card shadow-2xl">
                            <div>
                                <div class="flex justify-between items-center mb-6">
                                    <div class="timer-badge">
                                        Waiting: <span class="live-timer" data-start="${timestamp}">0m 0s</span>
                                    </div>
                                    <span class="text-blue-500 font-black text-[10px] uppercase tracking-widest">${o.status}</span>
                                </div>
                                
                                <h2 class="text-3xl font-[900] italic uppercase text-white mb-1 tracking-tighter">${o.customer || 'Unknown'}</h2>
                                <p class="text-slate-500 font-bold uppercase text-[10px] tracking-widest mb-8 border-l-2 border-blue-500 pl-3">${o.address || 'No Address'}</p>
                                
                                <div class="bg-white/5 p-6 rounded-[30px] border border-white/5">
                                    <p class="text-blue-400 font-black text-xl mb-1 uppercase">${o.item || "Standard Order"}</p>
                                    <p class="text-slate-400 text-sm italic font-medium">${o.toppings || "No extras"}</p>
                                </div>
                            </div>

                            <button onclick="readyOrder('${child.key}')" class="w-full mt-8 bg-blue-600 hover:bg-blue-500 text-white py-6 rounded-[24px] font-[900] uppercase italic tracking-tighter text-xl transition-all active:scale-95 shadow-lg shadow-blue-900/20">
                                Mark Ready
                            </button>
                        </div>
                    `);
                }
            });

            if (!initialLoad && currentActive > lastCount) {
                playBeep();
            }
            lastCount = currentActive;
            initialLoad = false;
        });

        function readyOrder(id) {
            db.ref('orders/' + id).update({ status: "Ready" });
        }
    </script>
</body>
</html>
