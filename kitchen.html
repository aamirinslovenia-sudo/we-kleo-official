<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLEO KITCHEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; }
        .order-card { background: #1e293b; border-radius: 25px; border-left: 10px solid #3b82f6; }
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-8">
    <div id="login-overlay">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-md text-center">
            <h2 class="text-3xl font-black mb-2 italic text-blue-600">KLEO KITCHEN</h2>
            <input type="password" id="pass-input" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 text-center font-bold text-black outline-none border-2 border-transparent focus:border-blue-500 transition-all">
            <button onclick="checkPass()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest">Login</button>
        </div>
    </div>
    <h1 class="text-6xl font-black italic mb-12 tracking-tighter">KITCHEN<span class="text-blue-500">LIVE</span></h1>
    <div id="order-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    <script>
        const PASS = "KLEO2026";
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        function checkPass() { if(document.getElementById('pass-input').value === PASS) document.getElementById('login-overlay').style.display='none'; else alert("Wrong Pass"); }
        db.ref('orders').on('value', (snap) => {
            const grid = document.getElementById('order-grid'); grid.innerHTML = "";
            snap.forEach(c => {
                const o = c.val(); if(o.status === "Pending") {
                    grid.insertAdjacentHTML('beforeend', `<div class="order-card p-8">
                        <h2 class="text-2xl font-black uppercase mb-2">${o.customer}</h2>
                        <p class="text-slate-400 mb-6 font-bold uppercase text-xs">${o.address}</p>
                        <button onclick="readyOrder('${c.key}')" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-sm">Mark Ready</button>
                    </div>`);
                }
            });
        });
        function readyOrder(id) { db.ref('orders/' + id).update({ status: "Ready" }); }
    </script>
</body>
</html>
