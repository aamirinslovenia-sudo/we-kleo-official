<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WE KLEO | KITCHEN COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #060a11; color: white; }
        @keyframes text-shimmer {
            0%, 100% { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
            50% { color: #60a5fa; text-shadow: 0 0 25px rgba(96, 165, 250, 0.6); }
        }
        .we-kleo-title { animation: text-shimmer 3s infinite; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 40px; }
        .timer-badge { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="p-8">

    <div class="flex flex-col items-center mb-12 border-b border-slate-900 pb-8">
        <h1 class="text-6xl font-[900] italic tracking-tighter uppercase we-kleo-title">WE KLEO</h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-2">Kitchen Production Line</p>
    </div>

    <div id="order-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
        </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "we-kleo.firebaseapp.com", 
            databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "we-kleo", 
            storageBucket: "we-kleo.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Update timers every second
        setInterval(() => {
            document.querySelectorAll('.live-timer').forEach(span => {
                const start = parseInt(span.dataset.start);
                const diff = Math.floor((Date.now() - start) / 1000);
                const mins = Math.floor(diff / 60);
                const secs = diff % 60;
                span.innerText = `${mins}m ${secs}s`;
            });
        }, 1000);

        db.ref('orders').on('value', (snap) => {
            const grid = document.getElementById('order-grid');
            grid.innerHTML = "";

            snap.forEach(child => {
                const o = child.val();
                // Filter for New or Pending orders
                if(o.status === "Pending" || o.status === "New") {
                    const orderTime = o.timestamp || Date.now();
                    
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="glass-card p-8 flex flex-col justify-between shadow-2xl">
                            <div>
                                <div class="flex justify-between items-start mb-6">
                                    <div class="timer-badge px-4 py-2 rounded-2xl text-[10px] font-black uppercase">
                                        Waiting: <span class="live-timer" data-start="${orderTime}">0m 0s</span>
                                    </div>
                                    <span class="text-blue-500 font-black text-xs uppercase tracking-widest">Priority</span>
                                </div>
                                
                                <h2 class="text-3xl font-black italic uppercase text-white mb-2 leading-tight">${o.customer}</h2>
                                <p class="text-slate-500 font-bold uppercase text-[10px] tracking-widest mb-6">${o.address}</p>
                                
                                <div class="bg-white/5 p-5 rounded-3xl border border-white/5 mb-8">
                                    <p class="text-blue-400 font-black text-xl mb-1">${o.item || "Standard Order"}</p>
                                    <p class="text-slate-400 text-sm font-medium italic">${o.toppings || "No extra flavors"}</p>
                                </div>
                            </div>

                            <button onclick="readyOrder('${child.key}')" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-[24px] font-black uppercase italic tracking-tighter text-lg transition-all active:scale-95 shadow-xl shadow-blue-900/20">
                                Mark Ready
                            </button>
                        </div>
                    `);
                }
            });
        });

        function readyOrder(id) {
            db.ref('orders/' + id).update({ status: "Ready" });
        }
    </script>
</body>
</html>
