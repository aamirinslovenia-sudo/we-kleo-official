<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLEO COMMAND | KITCHEN</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #000000; color: white; margin: 0; padding: 0; }
        
        /* Premium Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .we-kleo-title { animation: text-shimmer 3s infinite; }
        
        @keyframes text-shimmer {
            0%, 100% { color: #3b82f6; text-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
            50% { color: #ffffff; text-shadow: 0 0 25px rgba(255, 255, 255, 0.5); }
        }

        /* Order State Styles */
        .order-card { border-radius: 30px; transition: all 0.4s ease; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); }
        .order-card-warning { border: 2px solid #f59e0b; box-shadow: 0 0 30px rgba(245, 158, 11, 0.15); }
        
        @keyframes urgent-pulse {
            0% { border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }
            50% { border-color: #7f1d1d; box-shadow: 0 0 40px rgba(239, 68, 68, 0.5); }
            100% { border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }
        }
        .order-card-urgent { animation: urgent-pulse 1s infinite; border-width: 3px; }

        .driver-badge { font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .driver-busy { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .driver-waiting { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }

        #history-sidebar { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000; }
        .sidebar-open { transform: translateX(0) !important; }

        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen overflow-y-auto scroll-hide">

    <div id="sync-overlay" class="fixed inset-0 z-[3000] bg-black flex flex-col items-center justify-center">
        <h1 class="text-7xl font-black italic tracking-tighter uppercase mb-2 we-kleo-title">WE KLEO</h1>
        <p class="text-slate-500 font-bold uppercase tracking-[0.5em] text-[10px] mb-12">Production Command</p>
        <button onclick="startKitchen()" class="px-14 py-7 bg-blue-600 rounded-[30px] text-white font-black text-xl shadow-2xl hover:bg-blue-500 transition-all uppercase italic">
            Activate System
        </button>
    </div>

    <div class="max-w-[1600px] mx-auto px-6 pt-10">
        <div class="glass p-6 rounded-[35px] flex items-center justify-between">
            <div class="flex items-center gap-6">
                <div class="flex flex-col">
                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">System Status</span>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-sm font-bold uppercase tracking-tighter">Live Logistics</span>
                    </div>
                </div>
                <div id="driver-status-container" class="flex gap-2 border-l border-white/10 pl-6"></div>
            </div>
            <div class="text-right">
                <span id="clock" class="text-3xl font-black tabular-nums text-white">00:00:00</span>
            </div>
        </div>
    </div>

    <div class="max-w-[1600px] mx-auto p-6 mt-4">
        <div class="flex justify-between items-end mb-10 pb-10 border-b border-white/5">
            <div>
                <h1 class="text-6xl font-black italic tracking-tighter uppercase we-kleo-title leading-none">Orders</h1>
                <p class="text-slate-500 font-bold text-xs uppercase tracking-[0.3em] mt-3">Maribor Production Unit</p>
            </div>
            <button onclick="toggleHistory()" class="glass px-8 py-4 rounded-[20px] text-[10px] font-black uppercase tracking-widest hover:bg-white/5 transition-all">
                📜 Production History
            </button>
        </div>

        <div id="orderList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20"></div>
    </div>

    <div id="history-sidebar" class="fixed top-0 right-0 h-full w-[400px] bg-black z-[2000] p-10 transform translate-x-full border-l border-white/10 shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black italic uppercase text-blue-500">History</h2>
            <button onclick="toggleHistory()" class="text-white text-2xl">✕</button>
        </div>
        <div id="historyList" class="space-y-4 overflow-y-auto h-[80vh] scroll-hide"></div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let audioCtx = null;
        let alarmInterval = null;
        let activeCount = 0;

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('sl-SI');
            updateTimers();
        }, 1000);

        function startKitchen() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            playKitchenBell(); 
            document.getElementById('sync-overlay').style.display = "none";
        }

        function playKitchenBell() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            [880, 1100].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(freq, t + (i * 0.12));
                gain.gain.setValueAtTime(0.08, t + (i * 0.12));
                gain.gain.exponentialRampToValueAtTime(0.001, t + (i * 0.12) + 0.6);
                osc.start(t + (i * 0.12)); osc.stop(t + (i * 0.12) + 0.6);
            });
        }

        function startAlarm() { if (!alarmInterval) alarmInterval = setInterval(playKitchenBell, 5000); }
        function stopAlarm() { clearInterval(alarmInterval); alarmInterval = null; }

        function toggleHistory() { document.getElementById('history-sidebar').classList.toggle('sidebar-open'); }

        db.ref('orders').on('value', (snapshot) => {
            const orderList = document.getElementById('orderList');
            const historyList = document.getElementById('historyList');
            const driverContainer = document.getElementById('driver-status-container');
            
            orderList.innerHTML = "";
            historyList.innerHTML = "";
            let drivers = {};
            activeCount = 0;

            snapshot.forEach((child) => {
                const order = child.val();
                if(order.claimedBy) drivers[order.claimedBy] = (order.status === "Delivering") ? "Busy" : "Waiting";
                if (order.status === "New") { activeCount++; renderOrder(child.key, order); }
                else { renderHistory(child.key, order); }
            });

            driverContainer.innerHTML = Object.keys(drivers).map(dId => `
                <div class="driver-badge ${drivers[dId] === 'Busy' ? 'driver-busy' : 'driver-waiting'}">${dId}</div>
            `).join('') || '<span class="text-[10px] text-slate-700 font-bold uppercase">No Drivers Active</span>';

            if (activeCount > 0 && !alarmInterval) startAlarm();
            if (activeCount === 0) stopAlarm();
        });

        function renderOrder(id, order) {
            const timestamp = order.timestamp || Date.now();
            const html = `
                <div id="card-${id}" data-time="${timestamp}" class="order-card p-6 flex flex-col h-full">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em]">Live Order</span>
                        <span class="text-sm font-black text-slate-400">${order.totalPrice}</span>
                    </div>
                    
                    <h2 class="text-2xl font-black uppercase italic tracking-tighter mb-4 leading-none">${order.item}</h2>
                    
                    <div class="bg-white/5 p-4 rounded-2xl mb-6 border border-white/5 flex-grow">
                        <p class="text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">Modifications</p>
                        <p class="text-sm italic font-medium text-slate-200">"${order.toppings}"</p>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="bg-white/5 p-3 rounded-xl">
                            <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Time</p>
                            <p id="timer-${id}" class="text-lg font-black tabular-nums">00:00</p>
                        </div>
                        <div class="bg-white/5 p-3 rounded-xl">
                            <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Customer</p>
                            <p class="text-[11px] font-bold truncate uppercase text-blue-400">${order.customer}</p>
                        </div>
                    </div>

                    <button onclick="setStatus('${id}', 'Ready')" class="w-full bg-white text-black font-black py-4 rounded-2xl text-xs uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">
                        Dispatch Ready
                    </button>
                </div>
            `;
            document.getElementById('orderList').insertAdjacentHTML('afterbegin', html);
        }

        function updateTimers() {
            document.querySelectorAll('[id^="card-"]').forEach(card => {
                const id = card.id.replace('card-', '');
                const startTime = parseInt(card.getAttribute('data-time'));
                const elapsedSec = Math.floor((Date.now() - startTime) / 1000);
                const mins = Math.floor(elapsedSec / 60);
                const secs = elapsedSec % 60;
                
                document.getElementById(`timer-${id}`).innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                if (mins >= 20) card.className = "order-card p-6 flex flex-col h-full order-card-urgent";
                else if (mins >= 10) card.className = "order-card p-6 flex flex-col h-full order-card-warning";
            });
        }

        function renderHistory(id, order) {
            const html = `
                <div class="glass p-5 rounded-3xl mb-3">
                    <div class="flex justify-between items-center mb-1">
                        <p class="font-black italic uppercase truncate text-sm">${order.item}</p>
                        <span class="text-[8px] text-blue-500 font-bold uppercase tracking-widest">${order.status}</span>
                    </div>
                    <p class="text-[9px] text-slate-500 mb-4 font-bold uppercase">${order.customer}</p>
                    <button onclick="setStatus('${id}', 'New')" class="w-full py-2 bg-white/5 rounded-xl text-[8px] font-black uppercase text-slate-400 hover:text-white transition-all">↩ Re-Dispatch</button>
                </div>
            `;
            document.getElementById('historyList').insertAdjacentHTML('afterbegin', html);
        }

        function setStatus(id, newStatus) { db.ref('orders/' + id).update({ status: newStatus }); }
    </script>
</body>
</html>
