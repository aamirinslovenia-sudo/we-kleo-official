<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITCHEN | WE KLEO Dashboard</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="WeKleo.png">
    <link rel="icon" href="WeKleo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        @keyframes pulse-red {
            0%, 100% { border-color: rgba(59, 130, 246, 0.3); }
            50% { border-color: #ef4444; box-shadow: 0 0 40px rgba(239, 68, 68, 0.5); }
        }
        @keyframes text-shimmer {
            0% { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
            50% { color: #60a5fa; text-shadow: 0 0 30px rgba(96, 165, 250, 0.8); }
            100% { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        }
        .urgent-card { animation: pulse-red 1s infinite; border-width: 4px; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .we-kleo-title { animation: text-shimmer 3s infinite; }
    </style>
</head>
<body class="bg-[#060a11] text-slate-100 min-h-screen pb-20">

    <div id="sync-overlay" class="fixed inset-0 z-[100] bg-[#060a11] flex flex-col items-center justify-center">
        <h1 class="text-7xl font-[900] italic tracking-tighter uppercase mb-12 we-kleo-title">WE KLEO</h1>
        <button onclick="startKitchen()" class="px-12 py-6 bg-blue-600 rounded-[32px] text-white font-black text-2xl shadow-2xl shadow-blue-500/20 hover:scale-105 active:scale-95 transition-all uppercase italic">
            Open Kitchen System
        </button>
    </div>

    <div class="max-w-7xl mx-auto p-6">
        <div class="flex flex-col items-center mb-12 py-10 border-b border-slate-900">
            <h1 class="text-6xl font-[900] italic tracking-tighter uppercase mb-2 we-kleo-title">WE KLEO</h1>
            <div class="flex items-center gap-3">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <p class="text-slate-500 font-bold text-xs uppercase tracking-[0.4em]">Maribor Kitchen Command</p>
            </div>
            <p id="clock" class="text-4xl font-black text-slate-200 tracking-tighter mt-6">00:00:00</p>
        </div>

        <div id="orderList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let audioCtx = null;
        let alarmInterval = null;
        let activeCount = 0;

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('sl-SI');
        }, 1000);

        function startKitchen() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            document.getElementById('sync-overlay').style.opacity = "0";
            setTimeout(() => { document.getElementById('sync-overlay').style.display = "none"; }, 500);
        }

        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "sine";
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function startAlarm() { if (!alarmInterval) alarmInterval = setInterval(playBeep, 1200); }
        function stopAlarm() { clearInterval(alarmInterval); alarmInterval = null; }

        let isFirstLoad = true;
        db.ref('orders').on('child_added', (snapshot) => {
            const order = snapshot.val();
            if (order.status === "New") {
                activeCount++;
                renderOrder(snapshot.key, order);
                if (!isFirstLoad) startAlarm();
            }
        });

        function renderOrder(id, order) {
            const html = `
                <div id="${id}" class="glass border border-slate-800 p-8 rounded-[40px] shadow-2xl urgent-card transition-all duration-500 scale-100">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="bg-red-600 text-[10px] px-3 py-1 rounded-full font-black uppercase mb-2 inline-block animate-pulse">New Order</span>
                            <h2 class="text-3xl font-[900] italic tracking-tighter uppercase text-white">${order.item}</h2>
                        </div>
                        <p class="text-2xl font-black text-blue-400">${order.totalPrice}</p>
                    </div>
                    <div class="bg-blue-600/10 rounded-3xl p-5 mb-8 border border-blue-500/20 text-center">
                        <p class="text-lg font-bold text-blue-100 uppercase italic tracking-tight">${order.toppings}</p>
                    </div>
                    <div class="space-y-4 mb-8 text-sm">
                        <div class="flex items-center gap-4">
                            <span class="text-slate-600 font-bold uppercase text-[9px] w-16">Customer</span>
                            <span class="font-bold text-slate-100">${order.customer}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-slate-600 font-bold uppercase text-[9px] w-16">Contact</span>
                            <span class="font-bold text-blue-400 underline">${order.phone}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-slate-600 font-bold uppercase text-[9px] w-16">Location</span>
                            <span class="font-bold text-slate-100">${order.address}</span>
                        </div>
                    </div>
                    <button onclick="completeOrder('${id}')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-[24px] text-lg transition-all shadow-xl shadow-blue-900/40 active:scale-95 uppercase italic">
                        Mark Dispatched
                    </button>
                </div>
            `;
            document.getElementById('orderList').insertAdjacentHTML('afterbegin', html);
        }

        function completeOrder(id) {
            db.ref('orders/' + id).update({ status: "Completed", completedAt: new Date().toLocaleString() });
            document.getElementById(id).classList.add('scale-0', 'opacity-0');
            setTimeout(() => {
                document.getElementById(id).remove();
                activeCount--;
                if (activeCount <= 0) stopAlarm();
            }, 500);
        }

        db.ref('orders').once('value', () => { isFirstLoad = false; });
    </script>
</body>
</html>
