<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLEO | KITCHEN COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; }
        .order-card { 
            background: linear-gradient(145deg, #111, #080808); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 32px; 
            padding: 28px; 
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .status-preparing { border-color: #eab308 !important; box-shadow: 0 0 20px rgba(234, 179, 8, 0.1); }
        .status-driver { border-color: #3b82f6 !important; box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
        .btn-ready { background: #3b82f6; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        
        /* Boot Screen */
        #boot-screen { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-6 lg:p-12">

    <div id="boot-screen">
        <h1 class="text-7xl font-black italic text-blue-500 mb-8">KLEO</h1>
        <button onclick="initSystem()" class="bg-blue-600 px-12 py-6 rounded-full font-black uppercase tracking-widest text-xl hover:scale-105 transition-all">Start Kitchen</button>
    </div>

    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
        <div>
            <h1 class="text-6xl font-black italic tracking-tighter text-blue-500">KLEO <span class="text-white">PRO</span></h1>
            <p class="text-slate-500 font-bold uppercase tracking-[0.4em] text-[10px] mt-2">Kitchen Management System</p>
        </div>
        <div class="flex gap-8">
            <div class="text-right">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Active Orders</p>
                <p id="active-count" class="text-4xl font-black italic">0</p>
            </div>
            <div class="h-12 w-[1px] bg-white/10"></div>
            <div class="text-right text-green-500">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">System</p>
                <p class="text-4xl font-black italic">ONLINE</p>
            </div>
        </div>
    </header>

    <main id="order-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "we-kleo.firebaseapp.com", 
            databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "we-kleo", 
            storageBucket: "we-kleo.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let audioCtx = null;
        let lastOrderCount = -1;

        function initSystem() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('boot-screen').style.display = 'none';
        }

        function playBell() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, t); // High A
            osc.frequency.exponentialRampToValueAtTime(440, t + 0.5);
            
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.2, t + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.8);
            
            osc.start(t);
            osc.stop(t + 0.8);
        }

        db.ref('orders').on('value', (snap) => {
            const grid = document.getElementById('order-grid');
            let currentCount = 0;
            let activeIDs = [];
            grid.innerHTML = "";

            snap.forEach((child) => {
                const order = child.val();
                order.id = child.key;

                if (order.status !== "Completed" && order.status !== "Ready") {
                    currentCount++;
                    activeIDs.push(order.id);
                    renderCard(order);
                }
            });

            // Trigger sound if the number of orders increased
            if (lastOrderCount !== -1 && currentCount > lastOrderCount) {
                playBell();
            }
            lastOrderCount = currentCount;
            document.getElementById('active-count').innerText = currentCount;
        });

        function renderCard(o) {
            let statusLabel = "New Order";
            let cardStyle = "";
            if (o.status === "Preparing") { statusLabel = `Cooking...`; cardStyle = "status-preparing"; }
            if (o.claimedBy) { statusLabel = `Driver ${o.claimedBy} incoming`; cardStyle = "status-driver"; }

            const html = `
                <div class="order-card ${cardStyle}">
                    <div class="flex justify-between mb-6">
                        <span class="text-[10px] font-black uppercase text-blue-400">${statusLabel}</span>
                        <span class="text-xs font-bold text-slate-500">${o.paymentType || 'CASH'}</span>
                    </div>
                    <h2 class="text-4xl font-black italic uppercase mb-2 tracking-tighter">${o.item}</h2>
                    <p class="text-blue-500 font-bold mb-6">${o.totalPrice}</p>
                    <div class="bg-white/5 p-4 rounded-2xl mb-8">
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-2">Instructions</p>
                        <p class="text-sm font-semibold">${o.toppings || "Standard"}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <button onclick="updateStatus('${o.id}', 'Preparing', 10)" class="bg-white/5 border border-white/10 py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-yellow-500 hover:text-black transition-all">10 Min</button>
                        <button onclick="updateStatus('${o.id}', 'Preparing', 20)" class="bg-white/5 border border-white/10 py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-orange-500 hover:text-black transition-all">20 Min</button>
                    </div>
                    <button onclick="markFinished('${o.id}')" class="btn-ready w-full py-5 rounded-2xl text-xs font-black uppercase tracking-widest">Food is Ready</button>
                </div>
            `;
            grid.insertAdjacentHTML('beforeend', html);
        }

        function updateStatus(id, status, mins) {
            db.ref('orders/' + id).update({ status: status, prepEstimate: mins, isFoodReady: false });
        }

        function markFinished(id) {
            db.ref('orders/' + id).update({ status: "Ready", isFoodReady: true, completedAt: Date.now() });
        }
    </script>
</body>
</html>
