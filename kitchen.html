<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE KLEO | Kitchen Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes pulse-red {
            0%, 100% { border-color: rgba(59, 130, 246, 0.5); }
            50% { border-color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
        }
        .urgent-card { animation: pulse-red 1.5s infinite; border-width: 3px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#0a0f18] text-slate-100 min-h-screen p-6" onclick="startKitchen()">

    <div class="max-w-7xl mx-auto flex justify-between items-end mb-10 border-b border-slate-800 pb-6">
        <div>
            <div class="flex items-center gap-3 mb-1">
                <span class="w-3 h-3 bg-blue-500 rounded-full animate-ping"></span>
                <h1 class="text-4xl font-black tracking-tighter italic uppercase">WE KLEO <span class="text-blue-500">Kitchen</span></h1>
            </div>
            <p class="text-slate-500 font-bold text-xs uppercase tracking-[0.2em]">Real-time Order Management • Maribor</p>
        </div>
        
        <div id="status" class="glass border border-slate-700 px-6 py-3 rounded-2xl text-xs font-black tracking-widest text-red-400 cursor-pointer hover:bg-slate-800 transition-all">
            OFFLINE • CLICK TO SYNC
        </div>
    </div>

    <div id="orderList" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let audioCtx = null;
        let alarmInterval = null;
        let activeCount = 0;

        function startKitchen() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('status').innerText = "LIVE KITCHEN ACTIVE";
            document.getElementById('status').className = "glass border border-green-500/30 px-6 py-3 rounded-2xl text-xs font-black tracking-widest text-green-400";
        }

        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "sine";
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function startAlarm() { if (!alarmInterval) alarmInterval = setInterval(playBeep, 1000); }
        function stopAlarm() { clearInterval(alarmInterval); alarmInterval = null; }

        let isFirstLoad = true;
        db.ref('orders').on('child_added', (snapshot) => {
            const order = snapshot.val();
            if (order.status === "New") {
                activeCount++;
                renderOrder(snapshot.key, order);
                if (!isFirstLoad) startAlarm();
            }
        });

        function renderOrder(id, order) {
            const html = `
                <div id="${id}" class="glass border border-slate-800 p-8 rounded-[40px] shadow-2xl urgent-card transition-all">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="bg-blue-600 text-[10px] px-3 py-1 rounded-full font-black uppercase mb-2 inline-block">New Order</span>
                            <h2 class="text-4xl font-black italic tracking-tighter uppercase text-white">${order.item}</h2>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-black text-blue-400">${order.totalPrice}</p>
                            <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">${order.time.split(',')[1]}</p>
                        </div>
                    </div>

                    <div class="bg-slate-900/50 rounded-3xl p-5 mb-8 border border-slate-800">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 text-center">Preparation Notes</p>
                        <p class="text-xl font-bold text-center text-blue-100">${order.toppings}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8 text-sm border-t border-slate-800 pt-6">
                        <div>
                            <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Customer</p>
                            <p class="font-bold text-slate-200">${order.customer}</p>
                            <p class="text-slate-400">${order.phone}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Address</p>
                            <p class="font-bold text-slate-200">${order.address}</p>
                            <p class="text-slate-400">Maribor Area</p>
                        </div>
                    </div>

                    <button onclick="completeOrder('${id}')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-[24px] text-lg transition-all shadow-xl shadow-blue-900/20 active:scale-95">
                        DISPATCH ORDER
                    </button>
                </div>
            `;
            document.getElementById('orderList').insertAdjacentHTML('afterbegin', html);
        }

        function completeOrder(id) {
            db.ref('orders/' + id).update({ status: "Completed", completedAt: new Date().toLocaleString() });
            document.getElementById(id).style.opacity = "0";
            setTimeout(() => {
                document.getElementById(id).remove();
                activeCount--;
                if (activeCount <= 0) stopAlarm();
            }, 300);
        }

        db.ref('orders').once('value', () => { isFirstLoad = false; });
    </script>
</body>
</html>
