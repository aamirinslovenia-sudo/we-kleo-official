<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WE KLEO | KITCHEN TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #060a11; color: white; padding: 20px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 30px; }
        .order-card { transition: all 0.3s ease; }
        .time-btn { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); color: #60a5fa; transition: 0.2s; }
        .time-btn:active { background: #3b82f6; color: white; transform: scale(0.95); }
        .ready-btn { background: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>

    <header class="flex justify-between items-center mb-10 px-4">
        <div>
            <h1 class="text-3xl font-[900] italic tracking-tighter text-blue-500">KITCHEN TERMINAL</h1>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Maribor Operations</p>
        </div>
        <div class="glass px-4 py-2 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            <span class="text-[10px] font-black uppercase tracking-widest">System Live</span>
        </div>
    </header>

    <div id="orders-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "we-kleo.firebaseapp.com", 
            databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "we-kleo", 
            storageBucket: "we-kleo.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Listen for Orders
        db.ref('orders').on('value', (snapshot) => {
            const container = document.getElementById('orders-grid');
            container.innerHTML = '';
            const orders = snapshot.val();

            if (!orders) return;

            Object.keys(orders).reverse().forEach(id => {
                const o = orders[id];
                
                // Don't show completed orders in the kitchen
                if (o.status === "Completed") return;

                const card = document.createElement('div');
                card.className = "glass p-6 order-card flex flex-col justify-between min-h-[280px]";

                let actionArea = "";

                // STEP 1: New Order - Must pick time (Wolt Logic)
                if (o.status === "New") {
                    actionArea = `
                        <div>
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 text-center">Set Preparation Time</p>
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="acceptWithTime('${id}', 10)" class="time-btn py-4 rounded-2xl font-black italic">10M</button>
                                <button onclick="acceptWithTime('${id}', 20)" class="time-btn py-4 rounded-2xl font-black italic">20M</button>
                                <button onclick="acceptWithTime('${id}', 30)" class="time-btn py-4 rounded-2xl font-black italic">30M</button>
                            </div>
                        </div>
                    `;
                } 
                // STEP 2: Preparing - Mark as Ready
                else if (o.status === "Preparing") {
                    actionArea = `
                        <button onclick="markReady('${id}')" class="ready-btn w-full py-5 rounded-2xl text-white font-[900] uppercase italic tracking-tighter text-lg active:scale-95 transition-all">
                            Food Ready
                        </button>
                    `;
                }
                // STEP 3: Ready - Waiting for Driver
                else if (o.status === "Ready") {
                    actionArea = `
                        <div class="w-full py-4 border border-blue-500/20 rounded-2xl text-center">
                            <p class="text-blue-400 font-black uppercase text-xs tracking-widest animate-pulse">Waiting for Pickup</p>
                        </div>
                    `;
                }
                // STEP 4: Delivering
                else if (o.status === "Delivering") {
                    actionArea = `
                        <div class="w-full py-4 bg-white/5 rounded-2xl text-center">
                            <p class="text-slate-500 font-black uppercase text-[10px] tracking-widest">Driver on the road</p>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-[900] italic tracking-tighter uppercase text-white">${o.item}</h3>
                                <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">${o.restaurant}</p>
                            </div>
                            <p class="text-[9px] font-mono text-slate-600">ID: ${id.slice(-4)}</p>
                        </div>
                        <div class="space-y-1 mb-6">
                            <p class="text-sm font-bold">👤 ${o.customer}</p>
                            <p class="text-xs text-slate-400 font-semibold italic">"${o.paymentType} Order"</p>
                        </div>
                    </div>
                    ${actionArea}
                `;
                container.appendChild(card);
            });
        });

        // ACTIONS
        function acceptWithTime(id, mins) {
            // Calculate when the food should be ready
            const readyTimestamp = Date.now() + (mins * 60000);
            
            db.ref('orders/' + id).update({
                status: "Preparing",
                prepMins: mins,
                readyTimestamp: readyTimestamp
            });
        }

        function markReady(id) {
            db.ref('orders/' + id).update({
                status: "Ready"
            });
        }
    </script>
</body>
</html>
