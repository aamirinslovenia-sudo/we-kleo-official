<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLEO | KITCHEN DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .order-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 25px; transition: all 0.4s ease; display: flex; flex-direction: column; }
        .btn-dispatch { background: #3b82f6; color: white; width: 100%; py: 20px; border-radius: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; }
        .btn-dispatch:hover { background: #2563eb; transform: scale(1.02); }
        .category-icon { font-size: 1.5rem; margin-right: 10px; }
    </style>
</head>
<body class="p-8">

    <div class="flex justify-between items-center mb-12">
        <h1 class="text-6xl font-black italic tracking-tighter text-blue-500">KLEO <span class="text-white">KITCHEN</span></h1>
        <div id="stats" class="flex gap-10 text-right">
            <div><p class="text-[10px] font-black uppercase text-slate-500">Active Tasks</p><p id="active-count" class="text-3xl font-black">0</p></div>
        </div>
    </div>

    <div id="orderList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('orders').on('value', (snap) => {
            const list = document.getElementById('orderList');
            let activeCount = 0;
            list.innerHTML = "";

            snap.forEach((child) => {
                const o = child.val();
                o.id = child.key;

                // Show orders that aren't finished yet
                if (o.status !== "Completed") {
                    activeCount++;
                    renderOrder(o.id, o);
                }
            });
            document.getElementById('active-count').innerText = activeCount;
        });

        function renderOrder(id, o) {
            let statusText = "New Order";
            let borderColor = "border-white/10";
            
            if (o.status === "Preparing") { statusText = "🍳 Cooking..."; borderColor = "border-yellow-500/50"; }
            if (o.claimedBy) { statusText = `🚚 Driver ${o.claimedBy} on the way`; borderColor = "border-blue-500/50"; }

            const html = `
                <div class="order-card ${borderColor}">
                    <div class="flex justify-between mb-4">
                        <span class="text-[10px] font-black text-blue-500 uppercase">${statusText}</span>
                        <span class="font-bold">${o.totalPrice}</span>
                    </div>
                    
                    <h2 class="text-3xl font-black italic mb-4 uppercase tracking-tighter">${o.item}</h2>
                    
                    <div class="bg-white/5 p-3 rounded-xl mb-6 flex-1">
                        <p class="text-[9px] text-slate-500 uppercase font-black mb-1">Customer Note</p>
                        <p class="text-sm">${o.toppings || 'Standard'}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button onclick="setTiming('${id}', 10)" class="bg-white/5 border border-white/10 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-yellow-500 transition-all">10 MIN</button>
                        <button onclick="setTiming('${id}', 20)" class="bg-white/5 border border-white/10 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-orange-500 transition-all">20 MIN</button>
                    </div>

                    <div class="mb-6">
                        <p class="text-[9px] text-slate-500 uppercase font-black">Delivery To</p>
                        <p class="text-xs font-bold truncate">${o.address}</p>
                    </div>

                    <button onclick="markReady('${id}')" class="btn-dispatch py-4">Food is Ready</button>
                </div>
            `;
            document.getElementById('orderList').insertAdjacentHTML('beforeend', html);
        }

        function setTiming(id, mins) {
            // Tell the database we are preparing the food
            db.ref('orders/' + id).update({ 
                status: "Preparing",
                prepEstimate: mins,
                isFoodReady: false 
            });
        }

        function markReady(id) {
            // This signals the Driver App that they can now click "End Mission"
            db.ref('orders/' + id).update({ 
                status: "Ready",
                isFoodReady: true 
            });
        }
    </script>
</body>
</html>
