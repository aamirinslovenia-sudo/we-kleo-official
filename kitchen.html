<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITCHEN | WE KLEO Command</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="WeKleo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #060a11; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        @keyframes pulse-red { 0%, 100% { border-color: #1e293b; } 50% { border-color: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.3); } }
        .urgent-card { animation: pulse-red 1.5s infinite; border-width: 2px; }
        #history-sidebar { transition: transform 0.4s ease-in-out; z-index: 1000; }
        .sidebar-open { transform: translateX(0) !important; }
        .we-kleo-title { color: #3b82f6; text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>

    <div id="sync-overlay" class="fixed inset-0 z-[2000] bg-[#060a11] flex flex-col items-center justify-center">
        <h1 class="text-6xl font-[900] italic uppercase mb-10 we-kleo-title">WE KLEO</h1>
        <button onclick="startKitchen()" class="px-10 py-5 bg-blue-600 rounded-full text-white font-black text-xl uppercase italic shadow-2xl">Start System</button>
    </div>

    <div id="history-sidebar" class="fixed top-0 right-0 h-full w-80 bg-[#0a101a] border-l border-white/10 p-6 transform translate-x-full shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black italic text-blue-400 uppercase">Recent History</h3>
            <button onclick="toggleHistory()" class="text-xl">✕</button>
        </div>
        <div id="historyList" class="space-y-4 overflow-y-auto h-[90%]">
            </div>
    </div>

    <div class="max-w-6xl mx-auto p-6">
        <div class="flex justify-between items-center mb-10 py-8 border-b border-white/5">
            <div class="w-32"></div> <h1 class="text-5xl font-[900] italic tracking-tighter uppercase we-kleo-title">WE KLEO</h1>
            <button onclick="toggleHistory()" class="bg-white/5 px-4 py-2 rounded-full border border-white/10 text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition-all">
                📜 History
            </button>
        </div>

        <div id="orderList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let audioCtx = null;

        function startKitchen() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('sync-overlay').style.display = 'none';
        }

        function toggleHistory() {
            document.getElementById('history-sidebar').classList.toggle('sidebar-open');
        }

        // --- THE ENGINE ---
        db.ref('orders').on('value', (snapshot) => {
            const orderList = document.getElementById('orderList');
            const historyList = document.getElementById('historyList');
            orderList.innerHTML = "";
            historyList.innerHTML = "";

            snapshot.forEach((child) => {
                const order = child.val();
                const id = child.key;

                if (order.status === "New") {
                    renderOrder(id, order);
                } else {
                    renderHistory(id, order);
                }
            });
        });

        function renderOrder(id, order) {
            const html = `
                <div class="glass p-6 rounded-[30px] urgent-card">
                    <div class="flex justify-between mb-4">
                        <span class="text-[10px] font-black bg-red-600 px-2 py-0.5 rounded text-white uppercase">New</span>
                        <span class="text-[10px] font-bold text-slate-500">${order.time.split(',')[1]}</span>
                    </div>
                    <h2 class="text-2xl font-black italic uppercase text-white mb-2">${order.item}</h2>
                    <p class="text-blue-400 font-bold text-sm mb-4 italic">"${order.toppings}"</p>
                    <div class="text-[11px] text-slate-400 space-y-1 mb-6 border-t border-white/5 pt-4">
                        <p><b class="text-slate-200">CLIENT:</b> ${order.customer}</p>
                        <p><b class="text-slate-200">ADDR:</b> ${order.address}</p>
                    </div>
                    <button onclick="setStatus('${id}', 'Ready')" class="w-full bg-blue-600 py-4 rounded-2xl font-black italic uppercase text-sm shadow-lg shadow-blue-900/20 active:scale-95 transition-all">
                        Ready for Driver
                    </button>
                </div>`;
            document.getElementById('orderList').insertAdjacentHTML('afterbegin', html);
        }

        function renderHistory(id, order) {
            const html = `
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-xs">
                    <div class="flex justify-between font-bold mb-1">
                        <span class="text-white">${order.item}</span>
                        <span class="text-blue-500 uppercase">${order.status}</span>
                    </div>
                    <p class="text-slate-500 mb-2">${order.customer}</p>
                    <button onclick="setStatus('${id}', 'New')" class="text-blue-400 font-bold hover:underline">↩ Undo</button>
                </div>`;
            document.getElementById('historyList').insertAdjacentHTML('afterbegin', html);
        }

        function setStatus(id, newStatus) {
            db.ref('orders/' + id).update({ status: newStatus });
        }
    </script>
</body>
</html>
