<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITCHEN | WE KLEO Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        @keyframes pulse-red {
            0%, 100% { border-color: rgba(59, 130, 246, 0.5); }
            50% { border-color: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.6); }
        }
        .urgent-card { animation: pulse-red 1s infinite; border-width: 4px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); }
        #sync-overlay { transition: all 0.5s ease; }
    </style>
</head>
<body class="bg-[#0a0f18] text-slate-100 min-h-screen pb-20">

    <div id="sync-overlay" class="fixed inset-0 z-[100] bg-[#0a0f18]/95 flex items-center justify-center backdrop-blur-md">
        <button onclick="startKitchen()" class="group relative px-12 py-6 bg-blue-600 rounded-[32px] text-white font-black text-2xl shadow-2xl shadow-blue-500/40 hover:scale-105 active:scale-95 transition-all">
            <span class="relative z-10 uppercase italic tracking-tighter">▶ Start WE KLEO Kitchen</span>
            <div class="absolute inset-0 bg-blue-400 rounded-[32px] animate-ping opacity-20"></div>
        </button>
    </div>

    <div class="max-w-7xl mx-auto flex justify-between items-end p-6 mb-4 border-b border-slate-800">
        <div>
            <div class="flex items-center gap-3">
                <span class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></span>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">WE KLEO <span class="text-blue-500">Kitchen</span></h1>
            </div>
            <p class="text-slate-500 font-bold text-[10px] uppercase tracking-widest mt-1">Maribor Hub • Live System</p>
        </div>
        <div class="text-right">
            <p id="clock" class="text-2xl font-black text-slate-300 tracking-tighter">00:00:00</p>
        </div>
    </div>

    <div id="orderList" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 p-6">
        </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68",
          authDomain: "we-kleo.firebaseapp.com",
          databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "we-kleo",
          storageBucket: "we-kleo.firebasestorage.app",
          messagingSenderId: "87105321281",
          appId: "1:87105321281:web:ec83e4472e5756182749c0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let audioCtx = null;
        let alarmInterval = null;
        let activeCount = 0;

        // CLOCK
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('sl-SI');
        }, 1000);

        function startKitchen() {
            // UNLOCK AUDIO
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            
            // HIDE OVERLAY
            document.getElementById('sync-overlay').style.opacity = "0";
            setTimeout(() => { document.getElementById('sync-overlay').style.display = "none"; }, 500);
        }

        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "triangle"; // Sharper sound
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function startAlarm() { if (!alarmInterval) alarmInterval = setInterval(playBeep, 1200); }
        function stopAlarm() { clearInterval(alarmInterval); alarmInterval = null; }

        let isFirstLoad = true;
        db.ref('orders').on('child_added', (snapshot) => {
            const order = snapshot.val();
            if (order.status === "New") {
                activeCount++;
                renderOrder(snapshot.key, order);
                if (!isFirstLoad) startAlarm();
            }
        });

        function renderOrder(id, order) {
            const html = `
                <div id="${id}" class="glass border border-slate-800 p-8 rounded-[40px] shadow-2xl urgent-card transition-all duration-500 scale-100">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="bg-red-600 text-[10px] px-3 py-1 rounded-full font-black uppercase mb-2 inline-block animate-pulse">Action Required</span>
                            <h2 class="text-4xl font-black italic tracking-tighter uppercase text-white">${order.item}</h2>
                        </div>
                        <p class="text-2xl font-black text-blue-400 tracking-tighter">${order.totalPrice}</p>
                    </div>

                    <div class="bg-blue-600/10 rounded-3xl p-5 mb-8 border border-blue-500/20 text-center">
                        <p class="text-xl font-bold text-blue-100 italic">"${order.toppings}"</p>
                    </div>

                    <div class="space-y-4 mb-8 text-sm">
                        <div class="flex items-center gap-4">
                            <span class="text-slate-500 font-bold uppercase text-[9px] w-16">Customer</span>
                            <span class="font-bold text-slate-100">${order.customer}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-slate-500 font-bold uppercase text-[9px] w-16">Contact</span>
                            <span class="font-bold text-blue-400">${order.phone}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-slate-500 font-bold uppercase text-[9px] w-16">Address</span>
                            <span class="font-bold text-slate-100 underline decoration-blue-500/50">${order.address}</span>
                        </div>
                    </div>

                    <button onclick="completeOrder('${id}')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-[24px] text-lg transition-all shadow-xl shadow-blue-900/40 active:scale-95 uppercase italic tracking-tighter">
                        Mark as Dispatched
                    </button>
                </div>
            `;
            document.getElementById('orderList').insertAdjacentHTML('afterbegin', html);
        }

        function completeOrder(id) {
            db.ref('orders/' + id).update({ status: "Completed", completedAt: new Date().toLocaleString() });
            document.getElementById(id).classList.add('scale-0', 'opacity-0');
            setTimeout(() => {
                document.getElementById(id).remove();
                activeCount--;
                if (activeCount <= 0) stopAlarm();
            }, 500);
        }

        db.ref('orders').once('value', () => { isFirstLoad = false; });
    </script>
</body>
</html>
