<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLEO KITCHEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; }
        .order-card { background: #1e293b; border-radius: 25px; border-left: 10px solid #3b82f6; transition: all 0.3s ease; }
        .order-card:hover { transform: translateY(-5px); background: #24334d; }
    </style>
</head>
<body class="p-8">
    <div class="flex justify-between items-center mb-12">
        <h1 class="text-6xl font-black italic tracking-tighter">KITCHEN<span class="text-blue-500">LIVE</span></h1>
        <div class="text-right">
            <p id="pending-count" class="text-4xl font-black text-blue-500">0</p>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Orders Waiting</p>
        </div>
    </div>

    <div id="order-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "we-kleo.firebaseapp.com", 
            databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "we-kleo", 
            storageBucket: "we-kleo.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('orders').on('value', (snap) => {
            const grid = document.getElementById('order-grid');
            grid.innerHTML = "";
            let count = 0;

            snap.forEach(child => {
                const o = child.val();
                if(o.status === "Pending" || o.status === "New") {
                    count++;
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="order-card p-8 shadow-2xl">
                            <div class="flex justify-between items-start mb-4">
                                <h2 class="text-2xl font-black uppercase tracking-tight">${o.customer}</h2>
                                <span class="text-[10px] bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full font-black uppercase">Active</span>
                            </div>
                            <div class="space-y-1 mb-6">
                                <p class="text-slate-400 font-bold uppercase text-xs">Address: ${o.address}</p>
                                <p class="text-blue-400 font-black text-lg">${o.item || "Standard Order"}</p>
                                <p class="text-slate-500 text-xs italic">${o.toppings || ""}</p>
                            </div>
                            <button onclick="readyOrder('${child.key}')" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black uppercase text-sm transition-all active:scale-95 shadow-lg shadow-blue-900/20">
                                Mark as Ready
                            </button>
                        </div>
                    `);
                }
            });
            document.getElementById('pending-count').innerText = count;
        });

        function readyOrder(id) {
            db.ref('orders/' + id).update({ status: "Ready" });
        }
    </script>
</body>
</html>
