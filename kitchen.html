<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLEO | KITCHEN COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; }
        .order-card { 
            background: linear-gradient(145deg, #111, #080808); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 32px; 
            padding: 28px; 
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .status-preparing { border-color: #eab308 !important; box-shadow: 0 0 20px rgba(234, 179, 8, 0.1); }
        .status-driver { border-color: #3b82f6 !important; box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
        
        .timer-badge { background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 99px; font-weight: 800; font-size: 12px; }
        .btn-ready { 
            background: #3b82f6; 
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }
        .btn-ready:active { transform: scale(0.96); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="p-6 lg:p-12">

    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
        <div>
            <h1 class="text-6xl font-black italic tracking-tighter text-blue-500">KLEO <span class="text-white">PRO</span></h1>
            <p class="text-slate-500 font-bold uppercase tracking-[0.4em] text-[10px] mt-2">Kitchen Management System</p>
        </div>
        <div class="flex gap-8">
            <div class="text-right">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Active Orders</p>
                <p id="active-count" class="text-4xl font-black italic">0</p>
            </div>
            <div class="h-12 w-[1px] bg-white/10"></div>
            <div class="text-right">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Status</p>
                <p class="text-4xl font-black italic text-green-500">LIVE</p>
            </div>
        </div>
    </header>

    <main id="order-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        </main>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "we-kleo.firebaseapp.com", 
            databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "we-kleo", 
            storageBucket: "we-kleo.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- Real-time Listener ---
        db.ref('orders').on('value', (snap) => {
            const grid = document.getElementById('order-grid');
            let activeCount = 0;
            grid.innerHTML = "";

            snap.forEach((child) => {
                const order = child.val();
                order.id = child.key;

                // Only show orders that are not finished (New, Preparing, or Delivering)
                if (order.status !== "Completed" && order.status !== "Ready") {
                    activeCount++;
                    renderCard(order);
                }
            });
            document.getElementById('active-count').innerText = activeCount;
        });

        // --- Render Function ---
        function renderCard(o) {
            let statusLabel = "New Order";
            let cardStyle = "";
            
            if (o.status === "Preparing") {
                statusLabel = `Cooking (~${o.prepEstimate || 10}m)`;
                cardStyle = "status-preparing";
            }
            
            if (o.claimedBy) {
                statusLabel = `Driver ${o.claimedBy} Is Coming`;
                cardStyle = "status-driver";
            }

            const html = `
                <div class="order-card ${cardStyle} flex flex-col">
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-[10px] font-black uppercase tracking-widest text-blue-400">${statusLabel}</span>
                        <div class="timer-badge">NEW</div>
                    </div>

                    <h2 class="text-4xl font-black italic uppercase tracking-tighter mb-2 leading-none">
                        ${o.item}
                    </h2>
                    <p class="text-blue-500 font-bold text-lg mb-6">${o.totalPrice}</p>

                    <div class="bg-white/5 border border-white/5 p-4 rounded-2xl mb-8 flex-1">
                        <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-2">Instructions</p>
                        <p class="text-sm font-semibold leading-relaxed text-slate-300">
                            ${o.toppings || "Standard Recipe"}
                        </p>
                    </div>

                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="updateStatus('${o.id}', 'Preparing', 10)" 
                                class="bg-white/5 border border-white/10 py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-yellow-500 hover:text-black transition-all">
                                10 Min
                            </button>
                            <button onclick="updateStatus('${o.id}', 'Preparing', 20)" 
                                class="bg-white/5 border border-white/10 py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-orange-500 hover:text-black transition-all">
                                20 Min
                            </button>
                        </div>
                        
                        <button onclick="markFinished('${o.id}')" 
                            class="btn-ready w-full py-5 rounded-2xl text-xs font-black uppercase tracking-widest mt-2">
                            Food is Ready
                        </button>
                    </div>

                    <div class="mt-6 pt-6 border-t border-white/5 flex justify-between items-center">
                        <div class="text-left">
                            <p class="text-[8px] font-black text-slate-600 uppercase">Client</p>
                            <p class="text-[10px] font-bold">${o.customer}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-slate-600 uppercase">Method</p>
                            <p class="text-[10px] font-bold text-yellow-500">${o.paymentType || 'Card'}</p>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('order-grid').insertAdjacentHTML('beforeend', html);
        }

        // --- Logic Functions ---
        function updateStatus(id, status, mins) {
            db.ref('orders/' + id).update({
                status: status,
                prepEstimate: mins,
                isFoodReady: false // Ensures Driver App stays locked
            });
        }

        function markFinished(id) {
            // "Ready" state tells the Driver App: "You can now finish the mission"
            db.ref('orders/' + id).update({
                status: "Ready",
                isFoodReady: true,
                completedAt: Date.now()
            });
        }
    </script>
</body>
</html>
